<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Adventure Game</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to bottom,#0f172a,#1e293b); color:white; text-align:center; padding:20px; min-height:100vh; }
  h1 { font-size:2.5rem; margin-bottom:10px; }
  .back-link { display:inline-block; margin-bottom:18px; color:#7c8fa6; text-decoration:none; font-size:0.85rem; background:rgba(255,255,255,0.05); padding:5px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); }
  .back-link:hover { color:#ccc; }
  #gameBox { max-width:750px; margin:auto; background:rgba(255,255,255,0.08); border-radius:20px; padding:25px; box-shadow:0 8px 20px rgba(0,0,0,0.4); text-align:left; }
  #story-log { margin-bottom:16px; display:flex; flex-direction:column; gap:2px; }
  .log-event  { padding:8px 0 8px 14px; border-left:3px solid #4a3080; color:#cbd5e1; font-size:1rem; line-height:1.6; animation:fadeIn 0.35s ease; }
  .log-choice { padding:6px 0 6px 14px; border-left:3px solid #7c3aed; color:#a78bfa; font-style:italic; font-size:0.95rem; animation:fadeIn 0.35s ease; }
  .log-outcome{ padding:8px 0 8px 14px; border-left:3px solid #2563eb; color:#e2e8f0; font-size:1rem; line-height:1.6; animation:fadeIn 0.35s ease; }
  .final-entry{ padding:12px 0 12px 14px; border-left:3px solid #fbbf24; color:#fde68a; font-size:1.05rem; font-weight:bold; line-height:1.6; animation:fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
  #prompt-box { background:rgba(124,58,237,0.18); border:1px solid rgba(124,58,237,0.4); border-radius:12px; padding:16px; margin-bottom:16px; font-size:1.05rem; line-height:1.6; color:#e8f4ff; }
  .choiceBtn { display:block; width:100%; margin:7px 0; padding:12px 16px; border:none; border-radius:10px; font-size:0.95rem; cursor:pointer; transition:transform 0.15s,background 0.2s; background:#5b21b6; color:white; text-align:left; }
  .choiceBtn:hover { transform:scale(1.02); background:#6d28d9; }
  #restartBtn { display:block; width:100%; margin-top:16px; padding:14px; background:#dc2626; border:none; border-radius:12px; font-size:1rem; color:white; cursor:pointer; font-weight:bold; }
  #restartBtn:hover { background:#b91c1c; }
  #score { text-align:center; margin-top:12px; font-size:0.9rem; opacity:0.7; }
  .step-bar { display:flex; justify-content:center; gap:6px; margin-bottom:18px; }
  .pip { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.12); transition:background 0.3s; }
  .pip.done    { background:#7c3aed; }
  .pip.current { background:#a78bfa; box-shadow:0 0 6px #7c3aed; }
</style>
</head>

    setup: "You've come out the other side of the mountain. New territory. Different air.",
    choices: [
      { label: "Head downhill",         outcome: "Downhill always leads somewhere.",              next: "valley" },
      { label: "Find high ground",      outcome: "You climb until you can see far.",             next: "ridge_view" },
      { label: "Look for shelter",      outcome: "There's a structure in the distance.",         next: "mysterious_camp" },
      { label: "Follow a stream",       outcome: "Water leads to life.",                         next: "across_stream" },
    ]
  },
};

const OPENINGS = ["cave_bear","forest_wolf","spaceship","castle"];
const ENDINGS  = [
  "You emerged victorious — a true legend of the realm.",
  "Against all odds, you made it through.",
  "The world is saved, mostly because of you.",
  "Whatever that was — you survived it. That's enough.",
  "You walk back into the light, changed forever.",
  "History will remember this day. Probably.",
  "You made it. And honestly? You'd do it again.",
];

function rand(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

const logEl=document.getElementById('story-log'),
      promptEl=document.getElementById('prompt-box'),
      choicesEl=document.getElementById('choices'),
      restartBtn=document.getElementById('restartBtn'),
      scoreEl=document.getElementById('score'),
      stepBar=document.getElementById('step-bar');

let step=0,score=0;

function addLog(text,cls){
  const d=document.createElement('div');
  d.className=cls; d.textContent=text;
  logEl.appendChild(d);
  d.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function updateBar(){
  stepBar.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const p=document.createElement('div');
    p.className='pip'+(i<step?' done':i===step?' current':'');
    stepBar.appendChild(p);
  }
}

function showScene(key){
  updateBar();
  choicesEl.innerHTML='';

  if(step>=TOTAL||key==='__end__'){
    promptEl.style.display='none';
    addLog('🏆 '+rand(ENDINGS),'final-entry');
    restartBtn.style.display='block';
    scoreEl.textContent='Final Score: '+score+' points';
    return;
  }

  const scene=SCENES[key]||SCENES['safe_zone'];
  promptEl.style.display='block';
  promptEl.textContent=scene.setup+' What do you do?';

  shuffle(scene.choices).slice(0,4).forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='choiceBtn';
    btn.textContent=ch.label;
    btn.onclick=()=>{
      score+=Math.floor(Math.random()*20)+10;
      scoreEl.textContent='Score: '+score;
      addLog(scene.setup,'log-event');
      addLog('➤ You decide to '+ch.label+'...','log-choice');
      addLog(ch.outcome,'log-outcome');
      promptEl.style.display='none';
      choicesEl.innerHTML='';
      step++;
      setTimeout(()=>showScene(ch.next),400);
    };
    choicesEl.appendChild(btn);
  });
}

function startGame(){
  step=0;score=0;
  logEl.innerHTML='';
  restartBtn.style.display='none';
  scoreEl.textContent='';
  showScene(rand(OPENINGS));
}

startGame();
</script>
</body>
</html>
