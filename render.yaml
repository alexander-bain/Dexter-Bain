services:
  - type: web
    name: dexter-bain
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dexterbain-minigames-db
          property: connectionString
  - type: cron
    name: dexter-bain-minigame-results
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: npm install
    startCommand: node scripts/check-daily-weather-results.mjs

databases:
  - name: dexterbain-minigames-db
    plan: free
