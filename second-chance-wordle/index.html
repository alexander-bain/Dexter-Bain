<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Second Chance Wordle | DexterBain</title>
  <style>
    :root {
      color-scheme: light;
      --correct: #6aaa64;
      --present: #c9b458;
      --absent: #787c7e;
      --empty: #d3d6da;
      --key: #d3d6da;
      --text: #111;
      --bg: #fff;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }
    .game {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-content: start;
      gap: 14px;
      padding: 8px 12px 24px;
    }
    .topbar {
      width: min(640px, calc(100vw - 24px));
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #d3d6da;
    }
    .brand {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 900;
      text-transform: uppercase;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .button {
      border: 2px solid #111;
      border-radius: 999px;
      background: #fff;
      color: #111;
      padding: 8px 14px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }
    .board-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .board {
      --tile-size: min(88px, calc((100vw - 72px) / 5), calc((100svh - 390px) / 6));
      display: grid;
      grid-template-rows: repeat(6, var(--tile-size));
      gap: 8px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(5, var(--tile-size));
      gap: 8px;
    }
    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      display: grid;
      place-items: center;
      border: 3px solid var(--empty);
      background: var(--bg);
      color: #000;
      font-size: calc(var(--tile-size) * 0.56);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }
    .tile.filled { border-color: #878a8c; }
    .tile.correct, .tile.present, .tile.absent {
      border-color: transparent;
      color: #fff;
    }
    .tile.correct { background: var(--correct); }
    .tile.present { background: var(--present); }
    .tile.absent { background: var(--absent); }
    .tile.pop { animation: pop 100ms ease-out; }
    .tile.flip { animation: flip 900ms ease-in-out; }
    .row.shake { animation: shake 340ms ease-in-out; }
    .row.win .tile { animation: win-hop 620ms ease-out; }
    .row.win .tile:nth-child(2) { animation-delay: 70ms; }
    .row.win .tile:nth-child(3) { animation-delay: 140ms; }
    .row.win .tile:nth-child(4) { animation-delay: 210ms; }
    .row.win .tile:nth-child(5) { animation-delay: 280ms; }
    .keyboard {
      width: min(900px, calc(100vw - 24px));
      display: grid;
      gap: 8px;
    }
    .key-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .key {
      height: 62px;
      min-width: 0;
      flex: 1 1 0;
      border: 0;
      border-radius: 6px;
      background: var(--key);
      color: #000;
      font: inherit;
      font-size: clamp(1.1rem, 5vw, 1.65rem);
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
    }
    .key.wide {
      flex: 1.55 1 0;
      font-size: clamp(0.72rem, 3vw, 0.92rem);
    }
    .key.correct, .key.present, .key.absent { color: #fff; }
    .key.correct { background: var(--correct); }
    .key.present { background: var(--present); }
    .key.absent { background: var(--absent); }
    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      z-index: 5;
      min-width: 160px;
      padding: 12px 18px;
      border-radius: 4px;
      background: #000;
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.expand { animation: toast-expand 520ms ease-out; }
    .celebration {
      position: fixed;
      inset: 0;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
    }
    .confetti {
      position: absolute;
      top: -18px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      animation: confetti-fall 1600ms cubic-bezier(0.12, 0.6, 0.3, 1) forwards;
    }
    .stats-panel {
      position: fixed;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(255,255,255,0.76);
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }
    .stats-panel.open {
      opacity: 1;
      pointer-events: auto;
    }
    .stats-card {
      position: relative;
      width: min(440px, 100%);
      border: 3px solid #111;
      border-radius: 14px;
      background: #fff;
      padding: 24px 18px 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }
    .stats-card h2, .stats-card h3 {
      margin: 0;
      text-align: center;
      text-transform: uppercase;
    }
    .stats-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: #f1f2f3;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .stat-box {
      display: grid;
      gap: 4px;
      place-items: center;
      min-height: 72px;
      border: 2px solid #d3d6da;
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .stat-box strong {
      font-size: clamp(1.1rem, 5vw, 1.8rem);
      font-weight: 900;
      line-height: 1;
    }
    .stat-box span {
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .stats-bars {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }
    .bar-track {
      position: relative;
      height: 24px;
      background: #edeff1;
    }
    .bar-fill {
      display: block;
      height: 100%;
      background: var(--absent);
      min-width: 0;
    }
    .bar-count {
      position: absolute;
      top: 50%;
      left: 8px;
      transform: translateY(-50%);
      color: #111;
      font-size: 0.86rem;
    }
    @keyframes pop { from { transform: scale(0.9); } to { transform: scale(1); } }
    @keyframes toast-expand {
      0% { transform: translateX(-50%) translateY(0) scale(0.78); }
      58% { transform: translateX(-50%) translateY(0) scale(1.16); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }
    @keyframes flip {
      0% { transform: rotateX(0); }
      48% { transform: rotateX(90deg); }
      52% { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }
    @keyframes win-hop {
      0%, 100% { transform: translateY(0) scale(1); }
      32% { transform: translateY(-18px) scale(1.04); }
      64% { transform: translateY(4px) scale(0.98); }
    }
    @keyframes confetti-fall {
      0% { opacity: 1; transform: translate3d(0,0,0) rotate(0deg); }
      100% { opacity: 0; transform: translate3d(var(--drift),112vh,0) rotate(var(--spin)); }
    }
    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-8px); }
      40%, 60% { transform: translateX(8px); }
    }
    @media (max-width: 720px) {
      .stats-summary { grid-template-columns: repeat(2, 1fr); }
      .button { padding: 7px 10px; font-size: 0.75rem; }
    }
  </style>

      let progress = loadProgress();

      function pacificDateParts(date = new Date()) {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "America/Los_Angeles",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).formatToParts(date);
        const lookup = Object.fromEntries(parts.filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
        return {
          year: Number(lookup.year),
          month: Number(lookup.month),
          day: Number(lookup.day),
          id: `${lookup.year}-${lookup.month}-${lookup.day}`,
        };
      }

      function todayKey() {
        return pacificDateParts().id;
      }

      function daysSincePacificDate(anchorId, currentId) {
        const anchorDate = new Date(`${anchorId}T12:00:00Z`);
        const currentDate = new Date(`${currentId}T12:00:00Z`);
        return Math.round((currentDate - anchorDate) / 86400000);
      }

      function wrapIndex(index, length) {
        return ((index % length) + length) % length;
      }

      function getDailyPuzzle() {
        const today = pacificDateParts();
        const overrideWord = DAILY_WORD_OVERRIDES[today.id];
        const anchorIndex = DAILY_ANSWER_WORDS.indexOf(DAILY_WORD_ANCHOR);
        const safeAnchorIndex = anchorIndex >= 0 ? anchorIndex : 0;
        const dayOffset = daysSincePacificDate(DAILY_WORD_ANCHOR_DATE, today.id);
        const word = overrideWord || DAILY_ANSWER_WORDS[wrapIndex(safeAnchorIndex + dayOffset * DAILY_WORD_STEP, DAILY_ANSWER_WORDS.length)];
        return { id: `${today.id}-${word.toLowerCase()}`, word };
      }

      function isJohnPuzzleId(puzzleId) {
        return typeof puzzleId === "string" && puzzleId.startsWith(JOHN_PUZZLE_PREFIX);
      }

      function johnPuzzleAt(index) {
        const normalizedIndex = wrapIndex(index, JOHN_WORDS.length);
        return {
          id: `${JOHN_PUZZLE_PREFIX}-${normalizedIndex}`,
          word: JOHN_WORDS[normalizedIndex],
          johnIndex: normalizedIndex,
        };
      }

      function getPuzzleById(puzzleId) {
        if (puzzleId === DAILY_PUZZLE.id) return DAILY_PUZZLE;
        if (puzzleId === JOHN_PUZZLE_PREFIX) return johnPuzzleAt(0);
        if (!isJohnPuzzleId(puzzleId)) return null;
        const suffix = Number.parseInt(puzzleId.slice(JOHN_PUZZLE_PREFIX.length + 1), 10);
        return johnPuzzleAt(Number.isFinite(suffix) ? suffix : 0);
      }

      function blankStats() {
        return {
          played: 0,
          wins: 0,
          streak: 0,
          bestStreak: 0,
          distribution: Array(ROWS).fill(0),
          results: [],
        };
      }

      function loadStats() {
        try {
          const saved = JSON.parse(localStorage.getItem(STATS_KEY) || "null");
          if (saved && Array.isArray(saved.results)) {
            return {
              played: Number(saved.played) || 0,
              wins: Number(saved.wins) || 0,
              streak: Number(saved.streak) || 0,
              bestStreak: Number(saved.bestStreak) || 0,
              distribution: Array(ROWS).fill(0).map((_, index) => Number(saved.distribution?.[index]) || 0),
              results: saved.results,
            };
          }
          const legacy = JSON.parse(localStorage.getItem(LEGACY_STATS_KEY) || "null");
          if (!legacy) return blankStats();
          return {
            played: Number(legacy.played) || 0,
            wins: Number(legacy.wins) || 0,
            streak: Number(legacy.streak) || 0,
            bestStreak: Number(legacy.bestStreak) || 0,
            distribution: Array(ROWS).fill(0).map((_, index) => Number(legacy.distribution?.[index]) || 0),
            results: [],
          };
        } catch {
          return blankStats();
        }
      }

      function saveStats() {
        try {
          localStorage.setItem(STATS_KEY, JSON.stringify(stats));
        } catch {}
      }

      function resetStats() {
        stats = blankStats();
        try {
          localStorage.removeItem(STATS_KEY);
          localStorage.removeItem(LEGACY_STATS_KEY);
        } catch {}
        updateStatsPanel();
        showToast("Stats reset", 1500, true);
      }

      function recordGame(won, attempts = 0) {
        if (stats.results.some((result) => result.puzzleId === currentPuzzle.id)) return;
        stats.results.push({ puzzleId: currentPuzzle.id, won, attempts });
        stats.played += 1;
        if (won) {
          stats.wins += 1;
          stats.streak += 1;
          stats.bestStreak = Math.max(stats.bestStreak, stats.streak);
          if (attempts >= 1 && attempts <= ROWS) stats.distribution[attempts - 1] += 1;
        } else {
          stats.streak = 0;
        }
        saveStats();
        updateStatsPanel();
      }

      function removeCurrentResultFromStats() {
        const existing = stats.results.find((result) => result.puzzleId === currentPuzzle.id);
        if (!existing) return;
        stats.results = stats.results.filter((result) => result.puzzleId !== currentPuzzle.id);
        stats.played = Math.max(0, stats.played - 1);
        if (existing.won) {
          stats.wins = Math.max(0, stats.wins - 1);
          if (existing.attempts >= 1 && existing.attempts <= ROWS) {
            stats.distribution[existing.attempts - 1] = Math.max(0, stats.distribution[existing.attempts - 1] - 1);
          }
        }
        saveStats();
        stats = loadStats();
        updateStatsPanel();
      }

      function loadActivePuzzle() {
        try {
          const saved = JSON.parse(localStorage.getItem(ACTIVE_PUZZLE_KEY) || "null");
          if (saved?.version !== PUZZLE_STATE_VERSION && !isJohnPuzzleId(saved?.puzzleId)) {
            return DAILY_PUZZLE;
          }
          const savedPuzzle = getPuzzleById(saved?.puzzleId);
          if (!savedPuzzle) return DAILY_PUZZLE;
          if (saved?.word && saved.word !== savedPuzzle.word) return DAILY_PUZZLE;
          return savedPuzzle;
        } catch {
          return DAILY_PUZZLE;
        }
      }

      function saveActivePuzzle(puzzle = currentPuzzle) {
        try {
          localStorage.setItem(ACTIVE_PUZZLE_KEY, JSON.stringify({
            puzzleId: puzzle?.id || DAILY_PUZZLE.id,
            word: puzzle?.word || DAILY_PUZZLE.word,
            version: PUZZLE_STATE_VERSION,
          }));
        } catch {}
      }

      function freshProgress(puzzle = currentPuzzle) {
        return {
          puzzleId: puzzle.id,
          word: puzzle.word,
          version: PUZZLE_STATE_VERSION,
          guesses: [],
          done: false,
          won: false,
        };
      }

      function replaceWithFreshProgress(puzzle = DAILY_PUZZLE) {
        const nextProgress = freshProgress(puzzle);
        currentPuzzle = puzzle;
        answer = puzzle.word;
        saveActivePuzzle(puzzle);
        try {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(nextProgress));
        } catch {}
        return nextProgress;
      }

      function loadProgress(activePuzzle = loadActivePuzzle()) {
        try {
          const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "null");
          if (saved?.version !== PUZZLE_STATE_VERSION && !isJohnPuzzleId(saved?.puzzleId)) {
            return replaceWithFreshProgress(activePuzzle);
          }
          const savedPuzzle = getPuzzleById(saved?.puzzleId);
          const restoreDaily = saved?.puzzleId === DAILY_PUZZLE.id && saved?.word === DAILY_PUZZLE.word;
          const restoreJohn = isJohnPuzzleId(saved?.puzzleId) && savedPuzzle && saved?.word === savedPuzzle.word;
          if (!restoreDaily && !restoreJohn) return replaceWithFreshProgress(activePuzzle);
          currentPuzzle = savedPuzzle;
          answer = currentPuzzle.word;
          const guesses = (saved.guesses || []).filter((guess) => /^[A-Z]{5}$/.test(guess)).slice(0, ROWS);
          const lastGuess = guesses[guesses.length - 1] || "";
          const won = lastGuess === currentPuzzle.word;
          const doneGame = Boolean(saved.done || won || guesses.length >= ROWS);
          return {
            puzzleId: currentPuzzle.id,
            word: currentPuzzle.word,
            version: PUZZLE_STATE_VERSION,
            guesses,
            done: doneGame,
            won: doneGame ? Boolean(saved.won || won) : false,
          };
        } catch {
          return replaceWithFreshProgress(activePuzzle);
        }
      }

      function saveProgress() {
        saveActivePuzzle(currentPuzzle);
        try {
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
        } catch {}
      }

      function nextJohnPuzzle() {
        const currentIndex = isJohnPuzzleId(currentPuzzle.id) ? currentPuzzle.johnIndex || 0 : -1;
        return johnPuzzleAt(currentIndex + 1);
      }

      function buildBoard() {
        board.innerHTML = "";
        tiles = [];
        for (let row = 0; row < ROWS; row += 1) {
          const rowEl = document.createElement("div");
          rowEl.className = "row";
          const rowTiles = [];
          for (let col = 0; col < COLS; col += 1) {
            const tile = document.createElement("div");
            tile.className = "tile";
            rowEl.appendChild(tile);
            rowTiles.push(tile);
          }
          board.appendChild(rowEl);
          tiles.push(rowTiles);
        }
      }

      function buildKeyboard() {
        keyboard.innerHTML = "";
        keys = {};
        keyRows.forEach((letters) => {
          const row = document.createElement("div");
          row.className = "key-row";
          for (let index = 0; index < letters.length; index += 1) {
            let label = letters[index];
            if (letters.startsWith("ENTER") && index === 0) {
              label = "ENTER";
              index = 4;
            }
            const key = document.createElement("button");
            key.className = label === "ENTER" || label === "<" ? "key wide" : "key";
            key.type = "button";
            key.textContent = label === "<" ? "⌫" : label;
            key.dataset.key = label;
            key.addEventListener("click", () => press(label));
            row.appendChild(key);
            if (/^[A-Z]$/.test(label)) keys[label] = key;
          }
          keyboard.appendChild(row);
        });
      }

      function showToast(message, linger = 1100, expand = false) {
        toast.textContent = message;
        toast.classList.remove("expand");
        void toast.offsetWidth;
        toast.classList.add("show");
        if (expand) toast.classList.add("expand");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show", "expand"), linger);
      }

      function openStats() {
        updateStatsPanel();
        statsPanel.classList.add("open");
        statsPanel.setAttribute("aria-hidden", "false");
      }

      function closeStats() {
        statsPanel.classList.remove("open");
        statsPanel.setAttribute("aria-hidden", "true");
      }

      function updateStatsPanel() {
        const winRate = stats.played ? Math.round((stats.wins / stats.played) * 100) : 0;
        const maxCount = Math.max(1, ...stats.distribution);
        statsRecord.textContent = `${stats.wins}/${stats.played}`;
        statsWinRate.textContent = `${winRate}%`;
        statsStreak.textContent = stats.streak;
        statsBestStreak.textContent = stats.bestStreak;
        statsBars.innerHTML = "";
        stats.distribution.forEach((count, index) => {
          const width = count ? Math.max(8, Math.round((count / maxCount) * 100)) : 0;
          const row = document.createElement("div");
          row.className = "bar-row";
          row.innerHTML = `<span>${index + 1}</span><div class="bar-track"><span class="bar-fill" style="width:${width}%"></span><span class="bar-count">${count}</span></div>`;
          statsBars.appendChild(row);
        });
      }

      function celebrateWin() {
        celebration.innerHTML = "";
        for (let index = 0; index < 72; index += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = confettiColors[index % confettiColors.length];
          piece.style.animationDelay = `${Math.random() * 260}ms`;
          piece.style.setProperty("--drift", `${Math.random() * 240 - 120}px`);
          piece.style.setProperty("--spin", `${Math.random() * 720 + 240}deg`);
          celebration.appendChild(piece);
        }
        setTimeout(() => { celebration.innerHTML = ""; }, 2100);
      }

      function paintKey(letter, status) {
        if (!keys[letter]) return;
        if ((rank[keyState[letter]] || 0) >= rank[status]) return;
        keyState[letter] = status;
        keys[letter].className = `key ${status}`;
      }

      function scoreGuess(guess, target) {
        const result = Array(COLS).fill("absent");
        const leftovers = {};
        for (let index = 0; index < COLS; index += 1) {
          if (guess[index] === target[index]) {
            result[index] = "correct";
          } else {
            leftovers[target[index]] = (leftovers[target[index]] || 0) + 1;
          }
        }
        for (let index = 0; index < COLS; index += 1) {
          if (result[index] === "correct") continue;
          const letter = guess[index];
          if (leftovers[letter] > 0) {
            result[index] = "present";
            leftovers[letter] -= 1;
          }
        }
        return result;
      }

      function renderProgress() {
        Object.keys(keyState).forEach((letter) => delete keyState[letter]);
        progress.guesses.forEach((guess, rowIndex) => {
          const result = scoreGuess(guess, answer);
          result.forEach((status, colIndex) => {
            const tile = tiles[rowIndex][colIndex];
            tile.textContent = guess[colIndex];
            tile.className = `tile ${status}`;
            paintKey(guess[colIndex], status);
          });
        });
        currentRow = progress.guesses.length;
        currentGuess = "";
        done = progress.done;
        if (progress.won && progress.guesses.length) {
          board.children[progress.guesses.length - 1]?.classList.add("win");
        }
        if (progress.done) {
          recordGame(progress.won, progress.won ? progress.guesses.length : 0);
        }
      }

      function beginPuzzle(puzzle, toastMessage = "Fresh start", clearRecordedResult = true) {
        currentPuzzle = puzzle;
        answer = currentPuzzle.word;
        progress = freshProgress(currentPuzzle);
        if (clearRecordedResult) removeCurrentResultFromStats();
        saveActivePuzzle(currentPuzzle);
        saveProgress();
        Object.keys(keyState).forEach((letter) => delete keyState[letter]);
        currentRow = 0;
        currentGuess = "";
        done = false;
        revealing = false;
        doneSecretBuffer = "";
        celebration.innerHTML = "";
        buildBoard();
        buildKeyboard();
        updateStatsPanel();
        showToast(toastMessage, 1300, true);
      }

      function resetCurrentPuzzle() {
        beginPuzzle(currentPuzzle, "Fresh start", true);
      }

      function switchToJohnPuzzle() {
        beginPuzzle(nextJohnPuzzle(), "New word", false);
      }

      function latestPuzzleForSession() {
        const activePuzzle = loadActivePuzzle();
        if (isJohnPuzzleId(activePuzzle?.id)) return activePuzzle;
        return getDailyPuzzle();
      }

      function syncPuzzleState(forceToast = false) {
        const latestPuzzle = latestPuzzleForSession();
        const puzzleChanged = currentPuzzle?.id !== latestPuzzle.id || answer !== latestPuzzle.word;
        const progressChanged = progress?.puzzleId !== latestPuzzle.id || progress?.word !== latestPuzzle.word;
        if (!puzzleChanged && !progressChanged) return;
        beginPuzzle(latestPuzzle, forceToast ? "Word refreshed" : "Fresh start", false);
      }

      function shake() {
        const row = board.children[currentRow];
        row.classList.remove("shake");
        requestAnimationFrame(() => row.classList.add("shake"));
      }

      function addLetter(letter) {
        if (currentGuess.length >= COLS) return;
        const tile = tiles[currentRow][currentGuess.length];
        currentGuess += letter;
        tile.textContent = letter;
        tile.classList.add("filled", "pop");
        setTimeout(() => tile.classList.remove("pop"), 120);
      }

      function removeLetter() {
        if (!currentGuess) return;
        currentGuess = currentGuess.slice(0, -1);
        const tile = tiles[currentRow][currentGuess.length];
        tile.textContent = "";
        tile.className = "tile";
      }

      function isAcceptedGuess(guess) {
        if (WORD_LIST.has(guess)) return true;
        return guess.endsWith("S") && FOUR_LETTER_BASES.has(guess.slice(0, -1));
      }

      function finishGuess(guess) {
        if (guess === answer) {
          const attempts = currentRow + 1;
          done = true;
          progress.done = true;
          progress.won = true;
          saveProgress();
          board.children[currentRow]?.classList.add("win");
          recordGame(true, attempts);
          celebrateWin();
          showToast(`Won in ${attempts} - Streak ${stats.streak}`, 2800, true);
          return;
        }
        currentRow += 1;
        currentGuess = "";
        if (currentRow >= ROWS) {
          done = true;
          progress.done = true;
          progress.won = false;
          saveProgress();
          recordGame(false);
          showToast(`${answer} - Streak ended`, 2800, true);
        }
      }

      function revealGuess(guess, result) {
        const flipDelay = 420;
        const flipDuration = 900;
        revealing = true;
        result.forEach((status, index) => {
          const tile = tiles[currentRow][index];
          const delay = index * flipDelay;
          setTimeout(() => tile.classList.add("flip"), delay);
          setTimeout(() => {
            tile.classList.remove("filled");
            tile.classList.add(status);
            paintKey(guess[index], status);
          }, delay + flipDuration / 2);
          setTimeout(() => tile.classList.remove("flip"), delay + flipDuration);
        });
        setTimeout(() => {
          revealing = false;
          finishGuess(guess);
        }, (COLS - 1) * flipDelay + flipDuration + 60);
      }

      function submitGuess() {
        if (currentGuess === RESET_CODE) return resetCurrentPuzzle();
        if (currentGuess === ALT_WORD_CODE) return switchToJohnPuzzle();
        if (currentGuess === RESET_STATS_CODE) return resetStats();
        if (currentGuess.length !== COLS) {
          shake();
          showToast("Not enough letters");
          return;
        }
        if (!isAcceptedGuess(currentGuess)) {
          shake();
          showToast("Not on word list", 1400, true);
          return;
        }
        const guess = currentGuess;
        const result = scoreGuess(guess, answer);
        progress.guesses.push(guess);
        saveProgress();
        revealGuess(guess, result);
      }

      function press(key) {
        if (revealing) return;
        if (done) {
          if (/^[A-Z]$/.test(key)) {
            doneSecretBuffer = `${doneSecretBuffer}${key}`.slice(-SECRET_BUFFER_LIMIT);
            return;
          }
          if (key === "ENTER" && doneSecretBuffer === RESET_CODE) return resetCurrentPuzzle();
          if (key === "ENTER" && doneSecretBuffer === ALT_WORD_CODE) return switchToJohnPuzzle();
          if (key === "ENTER" && doneSecretBuffer === RESET_STATS_CODE) return resetStats();
          if (key === "<") doneSecretBuffer = "";
          showToast(progress.won ? "Already solved" : answer, 1400, true);
          return;
        }
        if (/^[A-Z]$/.test(key)) addLetter(key);
        if (key === "<") removeLetter();
        if (key === "ENTER") submitGuess();
      }

      function startGame() {
        currentPuzzle = loadActivePuzzle();
        answer = currentPuzzle.word;
        progress = loadProgress(currentPuzzle);
        saveActivePuzzle(currentPuzzle);
        saveProgress();
        buildBoard();
        buildKeyboard();
        renderProgress();
        updateStatsPanel();
      }

      statsButton.addEventListener("click", openStats);
      statsClose.addEventListener("click", closeStats);
      statsPanel.addEventListener("click", (event) => {
        if (event.target === statsPanel) closeStats();
      });
      addEventListener("keydown", (event) => {
        if (event.key === "Escape") return closeStats();
        const key = event.key.toUpperCase();
        if (/^[A-Z]$/.test(key)) press(key);
        if (event.key === "Backspace") press("<");
        if (event.key === "Enter") press("ENTER");
      });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") syncPuzzleState(true);
      });
      addEventListener("focus", () => syncPuzzleState(true));
      addEventListener("pageshow", (event) => {
        if (event.persisted) {
          location.reload();
          return;
        }
        syncPuzzleState(true);
      });

      startGame();
    })();
  </script>
</body>
</html>
