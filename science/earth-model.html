<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Earth Layers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111111; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lighting
    const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
    light1.position.set(5, 5, 5);
    scene.add(light1);
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    // Earth layers group
    const earthGroup = new THREE.Group();

    const layers = [
      { radius: 2.5, color: 0x3366ff, name: "Crust" },
      { radius: 2.1, color: 0xff9933, name: "Mantle" },
      { radius: 1.4, color: 0x999999, name: "Outer Core" },
      { radius: 0.8, color: 0xffffcc, name: "Inner Core" }
    ];

    layers.forEach(layer => {
      const geometry = new THREE.SphereGeometry(layer.radius, 64, 64, 0, Math.PI * 1.5, 0, Math.PI);
      const material = new THREE.MeshStandardMaterial({
        color: layer.color,
        transparent: true,
        opacity: 0.85
      });
      earthGroup.add(new THREE.Mesh(geometry, material));
    });

    scene.add(earthGroup);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
