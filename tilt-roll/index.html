<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tilt Roll 3D | DexterBain</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.16);
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --accent: #0f766e;
      --accent-ink: #f8fafc;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      user-select: none;
      touch-action: none;
    }

    button,
    a {
      font: inherit;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #ffffff;
      outline: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }

    .hud {
      position: fixed;
      inset: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) auto max(12px, env(safe-area-inset-left));
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(142px, 1fr) auto minmax(142px, 1fr);
      gap: 10px;
      align-items: start;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .brand {
      width: max-content;
      max-width: 100%;
      padding: 10px 12px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(0.96rem, 2vw, 1.08rem);
      line-height: 1;
      font-weight: 900;
    }

    .theme-name {
      display: block;
      margin-top: 5px;
      max-width: 240px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats {
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      pointer-events: auto;
    }

    .stat {
      min-width: 76px;
      padding: 9px 11px;
      text-align: center;
    }

    .stat b {
      display: block;
      font-size: 1.15rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .actions {
      justify-self: end;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      pointer-events: auto;
    }

    .button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--panel-strong);
      color: var(--ink);
      text-decoration: none;
      font-weight: 850;
      cursor: pointer;
    }

    .button.primary {
      border-color: transparent;
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: 0 12px 30px rgba(15, 118, 110, 0.18);
    }

    .button:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .center-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 5;
      width: min(320px, calc(100vw - 32px));
      padding: 18px;
      transform: translate(-50%, -50%);
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .center-panel.is-hidden {
      display: none;
    }

    .center-panel h2 {
      font-size: 1.4rem;
      line-height: 1.1;
    }

    .center-panel p {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 750;
    }

    .status-line {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 4;
      min-width: 132px;
      max-width: calc(100vw - 28px);
      padding: 9px 12px;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .status-line.is-visible {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    .quick-restart {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 4;
      min-width: 104px;
      pointer-events: auto;
    }

    .fatal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: #ffffff;
      color: var(--danger);
      font-weight: 900;
      text-align: center;
    }

    .fatal.is-visible {
      display: grid;
    }

    @media (max-width: 720px) {
      .hud {
        grid-template-columns: 1fr;
      }

      .brand,
      .stats,
      .actions {
        justify-self: stretch;
      }

      .brand {
        width: auto;
      }

      .stats,
      .actions {
        justify-content: space-between;
      }

      .stat {
        min-width: 0;
        flex: 1 1 72px;
      }

      .button {
        flex: 1 1 auto;
        min-width: 84px;
      }
    }

    @media (max-width: 420px) {
      .hud {
        gap: 7px;
      }

      .brand,
      .stat,
      .button {
        padding: 8px;
      }

      .theme-name {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" id="gameShell" tabindex="0" aria-label="Tilt Roll 3D">
    <canvas id="sceneCanvas"></canvas>

    <section class="hud" aria-label="Game status">
      <div class="brand panel">
        <h1>Tilt Roll 3D</h1>
        <span class="theme-name" id="themeName">Loading</span>
      </div>

      <div class="stats">
        <div class="stat panel">
          <b id="levelText">1</b>
          <span>Level</span>
        </div>
        <div class="stat panel">
          <b id="bestText">1</b>
          <span>Best</span>
        </div>
        <div class="stat panel">
          <b id="fallsText">0</b>
          <span>Falls</span>
        </div>
      </div>

      <div class="actions">
        <button class="button primary" id="tiltButton" type="button">Recenter Tilt</button>
        <button class="button" id="restartButton" type="button">Restart</button>
        <button class="button" id="previewButton" type="button">Preview</button>
        <button class="button" id="rebirthButton" type="button">Rebirth</button>
        <button class="button" id="adminCodeButton" type="button">Admin Code</button>
        <a class="button" href="../index.html">Arcade</a>
      </div>
    </section>

    <div class="center-panel panel" id="startPanel">
      <h2 id="panelTitle">Level 1</h2>
      <p id="panelTheme">Sky Glass</p>
      <button class="button primary" id="startButton" type="button">Start</button>
    </div>

    <button class="button quick-restart" id="quickRestartButton" type="button">Restart</button>
    <div class="status-line panel" id="statusLine">Ready</div>
    <div class="fatal" id="fatal">Tilt Roll 3D could not load the 3D engine.</div>
  </main>

  <script type="module">
    const engineUrls = [
      "../highway/vendor/three.module.js",
      "https://unpkg.com/three@0.165.0/build/three.module.js",
    ];

    let THREE = null;
    let lastEngineError = null;

    for (const engineUrl of engineUrls) {
      try {
        THREE = await import(engineUrl);
        break;
      } catch (error) {
        lastEngineError = error;
      }
    }

    if (THREE) {
      try {
        startGame(THREE);
      } catch (error) {
        document.getElementById("fatal").classList.add("is-visible");
        console.error(error);
      }
    } else {
      document.getElementById("fatal").classList.add("is-visible");
      console.error(lastEngineError);
    }

    function startGame(THREE) {
      const canvas = document.getElementById("sceneCanvas");
      const gameShell = document.getElementById("gameShell");
      const hud = {
        themeName: document.getElementById("themeName"),
        level: document.getElementById("levelText"),
        best: document.getElementById("bestText"),
        falls: document.getElementById("fallsText"),
        startPanel: document.getElementById("startPanel"),
        panelTitle: document.getElementById("panelTitle"),
        panelTheme: document.getElementById("panelTheme"),
        startButton: document.getElementById("startButton"),
        restartButton: document.getElementById("restartButton"),
        quickRestartButton: document.getElementById("quickRestartButton"),
        previewButton: document.getElementById("previewButton"),
        rebirthButton: document.getElementById("rebirthButton"),
        adminCodeButton: document.getElementById("adminCodeButton"),
        tiltButton: document.getElementById("tiltButton"),
        statusLine: document.getElementById("statusLine"),
      };

      const BALL_RADIUS = 0.42;
      const PLATFORM_TOP = 0;
      const PLATFORM_THICKNESS = 0.14;
      const GRAVITY = 15;
      const LANDING_SNAP_DEPTH = 0.24;
      const OFF_TRACK_GRAVITY_MULTIPLIER = 8.5;
      const OFF_TRACK_DRAG = 0.82;
      const BASE_ACCELERATION = 13.8;
      const REVERSE_ACCELERATION_BOOST = 2.45;
      const REVERSE_BRAKE_FRICTION = 0.66;
      const MOTION_SIDE_POLARITY = 1;
      const MOTION_FORWARD_POLARITY = -1;
      const ORIENTATION_SIDE_POLARITY = 1;
      const ORIENTATION_FORWARD_POLARITY = -1;
      const ORIENTATION_FALLBACK_DELAY = 2500;
      const ADMIN_CODE = "John";
      const MAX_PIXEL_RATIO = 2;
      const clamp = THREE.MathUtils.clamp;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);
      const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 170);
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
        preserveDrawingBuffer: true,
      });
      renderer.setClearColor(0xffffff, 1);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, MAX_PIXEL_RATIO));
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;

      const clock = new THREE.Clock();
      const platformGroup = new THREE.Group();
      const decorGroup = new THREE.Group();
      const goalGroup = new THREE.Group();
      const lightRig = new THREE.Group();
      scene.add(platformGroup, decorGroup, goalGroup, lightRig);

      const hemi = new THREE.HemisphereLight(0xffffff, 0xdbeafe, 2.2);
      const sun = new THREE.DirectionalLight(0xffffff, 2.8);
      sun.position.set(-6, 12, -7);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1536, 1536);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 52;
      sun.shadow.camera.left = -18;
      sun.shadow.camera.right = 18;
      sun.shadow.camera.top = 18;
      sun.shadow.camera.bottom = -18;
      lightRig.add(hemi, sun);

      const fill = new THREE.DirectionalLight(0xeff6ff, 1.2);
      fill.position.set(8, 8, 8);
      lightRig.add(fill);

      const ball = new THREE.Mesh(
        new THREE.SphereGeometry(BALL_RADIUS, 48, 32),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 0.32,
          metalness: 0.02,
        })
      );
      ball.castShadow = true;
      ball.receiveShadow = true;
      scene.add(ball);

      const ballVelocity = new THREE.Vector3();
      const cameraTarget = new THREE.Vector3();
      const cameraGoal = new THREE.Vector3();
      const lookTarget = new THREE.Vector3();
      const cameraForward = new THREE.Vector3();
      const cameraRight = new THREE.Vector3();
      const previewPoint = new THREE.Vector3();
      const previewAhead = new THREE.Vector3();

      const state = {
        level: readStoredNumber("tiltRollLevel", 1),
        best: readStoredNumber("tiltRollBest", 1),
        falls: 0,
        running: false,
        grounded: true,
        slabs: [],
        pathPoints: [],
        pathSegments: [],
        pathLength: 0,
        previewActive: false,
        previewDistance: 0,
        previewSpeed: 7,
        previewAtEnd: false,
        wasRunningBeforePreview: false,
        startPanelWasVisibleBeforePreview: true,
        spawn: { x: 0, z: -8 },
        goal: { x: 0, z: 8 },
        levelBounds: { minX: -6, maxX: 6, minZ: -8, maxZ: 8 },
        currentTheme: null,
        platformMaterial: null,
        keys: new Set(),
        pointerActive: false,
        pointerId: null,
        pointerStart: { x: 0, y: 0 },
        pointerInput: { x: 0, z: 0 },
        motionInput: { x: 0, z: 0 },
        viewInput: { x: 0, z: 0 },
        motionReady: false,
        motionSeen: false,
        motionNeutral: null,
        motionNeedsRecenter: true,
        motionListening: false,
        lastOrientation: null,
        lastAcceleration: null,
        lastMotionAt: 0,
        lastOrientationAt: 0,
        activeSensor: "none",
        statusTimer: null,
      };

      function readStoredNumber(key, fallback) {
        const value = Number(localStorage.getItem(key));
        return Number.isFinite(value) && value >= 1 ? Math.floor(value) : fallback;
      }

      function saveProgress() {
        localStorage.setItem("tiltRollLevel", String(state.level));
        localStorage.setItem("tiltRollBest", String(Math.max(state.best, state.level)));
      }

      function makeRng(seed) {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let result = Math.imul(t ^ (t >>> 15), 1 | t);
          result ^= result + Math.imul(result ^ (result >>> 7), 61 | result);
          return ((result ^ (result >>> 14)) >>> 0) / 4294967296;
        };
      }

      function makeCssColor(hex) {
        return `#${new THREE.Color(hex).getHexString()}`;
      }

      function hslColor(hue, saturation, lightness) {
        const color = new THREE.Color().setHSL(hue / 360, saturation, lightness);
        return {
          hex: color.getHex(),
          css: `#${color.getHexString()}`,
        };
      }

      function snapToGrid(value) {
        return Math.round(value * 2) / 2;
      }

      function themeForLevel(level) {
        const decade = Math.floor(level / 10);
        const fixedThemes = {
          0: {
            name: "Sky Glass",
            base: 0x64d8ff,
            accent: 0x0f766e,
            trim: 0x1d4ed8,
            kind: "clean",
            light: 0xe0f2fe,
          },
          1: {
            name: "10s Candy Circuit",
            base: 0xff8ab3,
            accent: 0x38bdf8,
            trim: 0xffffff,
            kind: "candy",
            light: 0xffe4f1,
          },
          2: {
            name: "20s Rainbow Unicorn",
            base: 0xffffff,
            accent: 0xff4fd8,
            trim: 0x7c3aed,
            kind: "rainbow",
            light: 0xfdf4ff,
          },
          3: {
            name: "30s Ocean Glow",
            base: 0x0284c7,
            accent: 0x22d3ee,
            trim: 0x164e63,
            kind: "ocean",
            light: 0xe0f7ff,
          },
          4: {
            name: "40s Dark Lava",
            base: 0x16110f,
            accent: 0xff3d00,
            trim: 0xffb703,
            kind: "lava",
            light: 0xffedd5,
          },
          5: {
            name: "50s Moon Lab",
            base: 0xcbd5e1,
            accent: 0x6366f1,
            trim: 0x1e293b,
            kind: "moon",
            light: 0xf8fafc,
          },
          6: {
            name: "60s Jungle Quartz",
            base: 0x22c55e,
            accent: 0xfacc15,
            trim: 0x166534,
            kind: "jungle",
            light: 0xecfccb,
          },
          7: {
            name: "70s Ice Signal",
            base: 0xcffafe,
            accent: 0x0891b2,
            trim: 0x0f172a,
            kind: "ice",
            light: 0xf0fdff,
          },
          8: {
            name: "80s Solar Dune",
            base: 0xfbbf24,
            accent: 0x14b8a6,
            trim: 0x7c2d12,
            kind: "dune",
            light: 0xfffbeb,
          },
          9: {
            name: "90s Neon Grid",
            base: 0x111827,
            accent: 0x22d3ee,
            trim: 0xff4fd8,
            kind: "neon",
            light: 0xf5f3ff,
          },
        };

        if (fixedThemes[decade]) {
          const theme = fixedThemes[decade];
          return {
            ...theme,
            cssAccent: makeCssColor(theme.accent),
          };
        }

        const hue = (decade * 47 + level * 11) % 360;
        const base = hslColor(hue, 0.68, 0.48);
        const accent = hslColor((hue + 132) % 360, 0.78, 0.54);
        const trim = hslColor((hue + 248) % 360, 0.62, 0.34);
        const names = ["Prism Run", "Comet Glass", "Crystal Drift", "Voltage Bloom", "Aurora Stone"];
        return {
          name: `${decade * 10}s ${names[decade % names.length]}`,
          base: base.hex,
          accent: accent.hex,
          trim: trim.hex,
          kind: ["clean", "neon", "ice", "candy", "ocean"][decade % 5],
          light: 0xffffff,
          cssAccent: accent.css,
        };
      }

      function clearGroup(group) {
        for (let i = group.children.length - 1; i >= 0; i -= 1) {
          const child = group.children[i];
          group.remove(child);
          child.traverse?.((node) => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) {
              const materials = Array.isArray(node.material) ? node.material : [node.material];
              materials.forEach((material) => {
                if (material.map) material.map.dispose();
                material.dispose();
              });
            }
          });
        }
      }

      function makePlatformTexture(theme, level) {
        const textureCanvas = document.createElement("canvas");
        textureCanvas.width = 512;
        textureCanvas.height = 512;
        const ctx = textureCanvas.getContext("2d");
        const base = makeCssColor(theme.base);
        const accent = makeCssColor(theme.accent);
        const trim = makeCssColor(theme.trim);
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, 512, 512);

        if (theme.kind === "rainbow") {
          const gradient = ctx.createLinearGradient(0, 0, 512, 0);
          ["#ff4fd8", "#ff8a3d", "#facc15", "#4ade80", "#22d3ee", "#8b5cf6"].forEach((color, index, list) => {
            gradient.addColorStop(index / (list.length - 1), color);
          });
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 512, 512);
          ctx.strokeStyle = "rgba(255,255,255,0.42)";
          ctx.lineWidth = 4;
          for (let y = 48; y < 512; y += 72) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else if (theme.kind === "lava") {
          ctx.fillStyle = "#15100f";
          ctx.fillRect(0, 0, 512, 512);
          ctx.strokeStyle = "#ff4d00";
          ctx.lineWidth = 5;
          for (let y = 36; y < 512; y += 66) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
          ctx.strokeStyle = "#ffb703";
          ctx.lineWidth = 2;
          for (let y = 68; y < 512; y += 132) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else if (theme.kind === "ocean") {
          ctx.strokeStyle = "rgba(255,255,255,0.38)";
          ctx.lineWidth = 5;
          for (let y = 38; y < 512; y += 58) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else if (theme.kind === "ice") {
          ctx.strokeStyle = "rgba(8,145,178,0.34)";
          ctx.lineWidth = 3;
          for (let x = 0; x <= 512; x += 86) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, 512);
            ctx.stroke();
          }
          for (let y = 0; y <= 512; y += 86) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else if (theme.kind === "neon") {
          ctx.fillStyle = "#111827";
          ctx.fillRect(0, 0, 512, 512);
          ctx.strokeStyle = accent;
          ctx.lineWidth = 3;
          for (let x = 0; x <= 512; x += 64) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, 512);
            ctx.stroke();
          }
          ctx.strokeStyle = trim;
          for (let y = 0; y <= 512; y += 64) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else if (theme.kind === "candy") {
          ctx.fillStyle = base;
          ctx.fillRect(0, 0, 512, 512);
          ctx.strokeStyle = "rgba(255,255,255,0.66)";
          ctx.lineWidth = 18;
          for (let y = 36; y < 512; y += 74) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        } else {
          ctx.strokeStyle = "rgba(255,255,255,0.34)";
          ctx.lineWidth = 5;
          for (let y = 42; y < 512; y += 82) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(512, y);
            ctx.stroke();
          }
        }

        ctx.fillStyle = "rgba(255,255,255,0.14)";
        ctx.fillRect(0, 0, 512, 10);
        ctx.fillStyle = "rgba(15,23,42,0.08)";
        ctx.fillRect(0, 502, 512, 10);

        const texture = new THREE.CanvasTexture(textureCanvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(1, 1);
        return texture;
      }

      function makeLevelPlan(level, rng, corridorWidth) {
        const difficulty = Math.min(1, Math.max(0, (level - 1) / 95));
        const turnCount = 3 + Math.floor(difficulty * 9) + (level > 18 && rng() > 0.42 ? 1 : 0);
        const maxX = 11 + difficulty * 10;
        const points = [{ x: 0, z: -7.5 }];
        let x = 0;
        let z = -7.5;
        let horizontalSign = rng() > 0.5 ? 1 : -1;

        for (let index = 0; index < turnCount; index += 1) {
          if (index % 2 === 0) {
            const forward = 9 - difficulty * 1.7 + rng() * (3.1 - difficulty * 0.9);
            z = snapToGrid(z + forward);
          } else {
            const minimumSideGap = corridorWidth + 4.6 + difficulty * 3.2;
            const sideways = minimumSideGap + rng() * (2.6 + difficulty * 3.4);
            let nextX = x + horizontalSign * sideways;
            if (Math.abs(nextX) > maxX) {
              horizontalSign *= -1;
              nextX = x + horizontalSign * sideways;
            }
            x = snapToGrid(clamp(nextX, -maxX, maxX));
            if (rng() > 0.18) horizontalSign *= -1;
          }
          points.push({ x, z });
        }

        if (points[points.length - 1].z < 16 + difficulty * 8) {
          z = snapToGrid(z + 9 - difficulty * 1.8 + rng() * 3.2);
          points.push({ x, z });
        }

        return {
          points,
          corridorWidth,
        };
      }

      function addCorridorSlab(slabs, start, end, corridorWidth, index) {
        const dx = end.x - start.x;
        const dz = end.z - start.z;
        if (Math.abs(dx) >= Math.abs(dz)) {
          slabs.push({
            x: (start.x + end.x) / 2,
            z: start.z,
            width: Math.abs(dx) + corridorWidth,
            length: corridorWidth,
            index,
          });
          return;
        }

        slabs.push({
          x: start.x,
          z: (start.z + end.z) / 2,
          width: corridorWidth,
          length: Math.abs(dz) + corridorWidth,
          index,
        });
      }

      function nearlyEqual(a, b) {
        return Math.abs(a - b) < 0.001;
      }

      function uniqueSorted(values) {
        return [...values]
          .sort((a, b) => a - b)
          .filter((value, index, list) => index === 0 || !nearlyEqual(value, list[index - 1]));
      }

      function slabContainsPoint(slab, x, z) {
        return (
          x >= slab.x - slab.width / 2 - 0.001 &&
          x <= slab.x + slab.width / 2 + 0.001 &&
          z >= slab.z - slab.length / 2 - 0.001 &&
          z <= slab.z + slab.length / 2 + 0.001
        );
      }

      function unionSlabs(rawSlabs) {
        const xEdges = [];
        const zEdges = [];
        rawSlabs.forEach((slab) => {
          xEdges.push(slab.x - slab.width / 2, slab.x + slab.width / 2);
          zEdges.push(slab.z - slab.length / 2, slab.z + slab.length / 2);
        });

        const xs = uniqueSorted(xEdges);
        const zs = uniqueSorted(zEdges);
        const width = xs.length - 1;
        const height = zs.length - 1;
        const occupied = Array.from({ length: height }, () => Array(width).fill(false));
        const used = Array.from({ length: height }, () => Array(width).fill(false));

        for (let row = 0; row < height; row += 1) {
          for (let col = 0; col < width; col += 1) {
            const x = (xs[col] + xs[col + 1]) / 2;
            const z = (zs[row] + zs[row + 1]) / 2;
            occupied[row][col] = rawSlabs.some((slab) => slabContainsPoint(slab, x, z));
          }
        }

        const merged = [];
        for (let row = 0; row < height; row += 1) {
          for (let col = 0; col < width; col += 1) {
            if (!occupied[row][col] || used[row][col]) continue;

            let endCol = col;
            while (endCol < width && occupied[row][endCol] && !used[row][endCol]) {
              endCol += 1;
            }

            let endRow = row + 1;
            let canGrow = true;
            while (endRow < height && canGrow) {
              for (let scanCol = col; scanCol < endCol; scanCol += 1) {
                if (!occupied[endRow][scanCol] || used[endRow][scanCol]) {
                  canGrow = false;
                  break;
                }
              }
              if (canGrow) endRow += 1;
            }

            for (let markRow = row; markRow < endRow; markRow += 1) {
              for (let markCol = col; markCol < endCol; markCol += 1) {
                used[markRow][markCol] = true;
              }
            }

            const x1 = xs[col];
            const x2 = xs[endCol];
            const z1 = zs[row];
            const z2 = zs[endRow];
            merged.push({
              x: (x1 + x2) / 2,
              z: (z1 + z2) / 2,
              width: x2 - x1,
              length: z2 - z1,
              index: merged.length,
            });
          }
        }

        return merged;
      }

      function updateLevelBounds() {
        state.levelBounds = state.slabs.reduce((bounds, slab) => {
          bounds.minX = Math.min(bounds.minX, slab.x - slab.width / 2);
          bounds.maxX = Math.max(bounds.maxX, slab.x + slab.width / 2);
          bounds.minZ = Math.min(bounds.minZ, slab.z - slab.length / 2);
          bounds.maxZ = Math.max(bounds.maxZ, slab.z + slab.length / 2);
          return bounds;
        }, {
          minX: Infinity,
          maxX: -Infinity,
          minZ: Infinity,
          maxZ: -Infinity,
        });
      }

      function updatePathMetrics() {
        state.pathSegments = [];
        state.pathLength = 0;
        for (let index = 0; index < state.pathPoints.length - 1; index += 1) {
          const start = state.pathPoints[index];
          const end = state.pathPoints[index + 1];
          const length = Math.hypot(end.x - start.x, end.z - start.z);
          if (length <= 0.001) continue;
          state.pathSegments.push({
            start,
            end,
            length,
            startDistance: state.pathLength,
          });
          state.pathLength += length;
        }
        state.previewSpeed = clamp(state.pathLength / 9, 4.8, 10.5);
      }

      function samplePath(distance) {
        if (state.pathSegments.length === 0) {
          return state.spawn;
        }

        const clampedDistance = clamp(distance, 0, state.pathLength);
        let segment = state.pathSegments[state.pathSegments.length - 1];
        for (const candidate of state.pathSegments) {
          if (clampedDistance <= candidate.startDistance + candidate.length) {
            segment = candidate;
            break;
          }
        }

        const t = clamp((clampedDistance - segment.startDistance) / segment.length, 0, 1);
        return {
          x: THREE.MathUtils.lerp(segment.start.x, segment.end.x, t),
          z: THREE.MathUtils.lerp(segment.start.z, segment.end.z, t),
        };
      }

      function addPlatformMesh(slab, platformMaterial, theme) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(slab.width, PLATFORM_THICKNESS, slab.length),
          platformMaterial
        );
        mesh.position.set(slab.x, PLATFORM_TOP - PLATFORM_THICKNESS / 2, slab.z);
        mesh.receiveShadow = true;
        mesh.castShadow = theme.kind === "lava" || theme.kind === "neon";
        platformGroup.add(mesh);
      }

      function loadLevel() {
        clearGroup(platformGroup);
        clearGroup(decorGroup);
        clearGroup(goalGroup);
        if (state.platformMaterial) {
          if (state.platformMaterial.map) state.platformMaterial.map.dispose();
          state.platformMaterial.dispose();
        }

        const theme = themeForLevel(state.level);
        const rng = makeRng((state.level * 2654435761) ^ 0x9e3779b9);
        const texture = makePlatformTexture(theme, state.level);
        const emissiveStrength = theme.kind === "lava" || theme.kind === "neon" ? 0.25 : 0.04;
        const platformMaterial = new THREE.MeshStandardMaterial({
          color: theme.base,
          map: texture,
          roughness: theme.kind === "moon" || theme.kind === "ice" ? 0.42 : 0.72,
          metalness: theme.kind === "moon" ? 0.18 : 0.04,
          emissive: theme.kind === "lava" || theme.kind === "neon" ? theme.accent : 0x000000,
          emissiveIntensity: emissiveStrength,
        });
        state.platformMaterial = platformMaterial;
        state.currentTheme = theme;
        const rawSlabs = [];

        const difficulty = Math.min(1, Math.max(0, (state.level - 1) / 100));
        const corridorWidth = snapToGrid(clamp(5.6 - difficulty * 3.25 - Math.log10(state.level + 1) * 0.05, 2, 5.6));
        const plan = makeLevelPlan(state.level, rng, corridorWidth);
        state.pathPoints = plan.points.map((point) => ({ x: point.x, z: point.z }));
        updatePathMetrics();

        for (let index = 0; index < plan.points.length - 1; index += 1) {
          addCorridorSlab(rawSlabs, plan.points[index], plan.points[index + 1], corridorWidth, index);
        }

        state.slabs = unionSlabs(rawSlabs);
        updateLevelBounds();

        for (const slab of state.slabs) {
          addPlatformMesh(slab, platformMaterial, theme);
        }

        const first = plan.points[0];
        const last = plan.points[plan.points.length - 1];
        state.spawn = {
          x: first.x,
          z: first.z,
        };
        state.goal = {
          x: last.x,
          z: last.z,
        };

        makeGoal(theme);
        makeDecor(theme, rng);
        updateHud();
        updateAccent(theme);
      }

      function makeGoal(theme) {
        const goalMaterial = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: theme.accent,
          emissiveIntensity: 0.62,
          roughness: 0.32,
          metalness: 0.08,
          transparent: true,
          opacity: 0.92,
        });
        const ringMaterial = new THREE.MeshBasicMaterial({
          color: theme.accent,
          transparent: true,
          opacity: 0.92,
        });
        const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.94, 0.94, 0.055, 64), goalMaterial);
        pad.position.set(state.goal.x, PLATFORM_TOP + 0.035, state.goal.z);
        pad.receiveShadow = true;
        goalGroup.add(pad);

        for (let i = 0; i < 3; i += 1) {
          const ring = new THREE.Mesh(new THREE.TorusGeometry(1.05 + i * 0.22, 0.018, 8, 96), ringMaterial);
          ring.position.set(state.goal.x, PLATFORM_TOP + 0.08 + i * 0.014, state.goal.z);
          ring.rotation.x = Math.PI / 2;
          ring.userData.spin = i % 2 === 0 ? 1 : -1;
          goalGroup.add(ring);
        }

        const light = new THREE.PointLight(theme.accent, 1.4, 8);
        light.position.set(state.goal.x, 1.2, state.goal.z);
        goalGroup.add(light);
      }

      function makeDecor(theme, rng) {
        const bounds = state.levelBounds;
        const startZ = bounds.minZ - 1.5;
        const endZ = bounds.maxZ + 2.5;
        const count = 12 + Math.min(18, Math.floor(state.level / 3));
        const accentMaterial = new THREE.MeshStandardMaterial({
          color: theme.accent,
          emissive: theme.kind === "lava" || theme.kind === "neon" ? theme.accent : 0x000000,
          emissiveIntensity: theme.kind === "lava" || theme.kind === "neon" ? 0.85 : 0.08,
          roughness: 0.44,
          metalness: theme.kind === "moon" ? 0.32 : 0.04,
        });
        const trimMaterial = new THREE.MeshStandardMaterial({
          color: theme.trim,
          emissive: theme.kind === "lava" ? theme.trim : 0x000000,
          emissiveIntensity: theme.kind === "lava" ? 0.65 : 0.04,
          roughness: 0.52,
        });

        for (let i = 0; i < count; i += 1) {
          const side = rng() > 0.5 ? 1 : -1;
          const z = startZ + (endZ - startZ) * rng();
          const outsideEdge = side > 0 ? bounds.maxX : Math.abs(bounds.minX);
          const x = side * (outsideEdge + 2.2 + rng() * 3.2);
          const y = 0.34 + rng() * 1.8;
          let mesh;
          if (theme.kind === "rainbow") {
            mesh = new THREE.Mesh(new THREE.ConeGeometry(0.18 + rng() * 0.09, 0.82 + rng() * 0.35, 5), i % 2 ? accentMaterial : trimMaterial);
            mesh.rotation.z = rng() * Math.PI;
          } else if (theme.kind === "lava") {
            mesh = new THREE.Mesh(new THREE.ConeGeometry(0.12 + rng() * 0.14, 0.6 + rng() * 0.7, 3), i % 2 ? accentMaterial : trimMaterial);
            mesh.rotation.x = rng() * Math.PI;
            mesh.rotation.z = rng() * Math.PI;
          } else if (theme.kind === "ocean") {
            mesh = new THREE.Mesh(new THREE.TorusGeometry(0.22 + rng() * 0.14, 0.025, 8, 32), accentMaterial);
            mesh.rotation.x = rng() * Math.PI;
          } else if (theme.kind === "ice") {
            mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.2 + rng() * 0.16, 0), i % 2 ? accentMaterial : trimMaterial);
          } else {
            mesh = new THREE.Mesh(new THREE.BoxGeometry(0.22 + rng() * 0.36, 0.08 + rng() * 0.18, 0.22 + rng() * 0.36), i % 2 ? accentMaterial : trimMaterial);
            mesh.rotation.y = rng() * Math.PI;
          }
          mesh.position.set(x, y, z);
          mesh.userData.spin = (rng() > 0.5 ? 1 : -1) * (0.25 + rng() * 0.85);
          decorGroup.add(mesh);
        }
      }

      function updateAccent(theme) {
        document.documentElement.style.setProperty("--accent", theme.cssAccent);
        document.documentElement.style.setProperty("--accent-ink", theme.kind === "lava" || theme.kind === "neon" ? "#ffffff" : "#f8fafc");
      }

      function updateHud() {
        state.best = Math.max(state.best, state.level);
        hud.level.textContent = state.level.toLocaleString();
        hud.best.textContent = state.best.toLocaleString();
        hud.falls.textContent = state.falls.toLocaleString();
        hud.themeName.textContent = state.currentTheme?.name || "Loading";
        hud.panelTitle.textContent = `Level ${state.level.toLocaleString()}`;
        hud.panelTheme.textContent = state.currentTheme?.name || "";
      }

      function setStatus(message) {
        hud.statusLine.textContent = message;
        hud.statusLine.classList.add("is-visible");
        clearTimeout(state.statusTimer);
        state.statusTimer = window.setTimeout(() => {
          hud.statusLine.classList.remove("is-visible");
        }, 1300);
      }

      function resetBall() {
        ball.position.set(state.spawn.x, BALL_RADIUS + 0.02, state.spawn.z);
        ball.rotation.set(0, 0, 0);
        ballVelocity.set(0, 0, 0);
        state.grounded = true;
        state.pointerInput.x = 0;
        state.pointerInput.z = 0;
        state.motionInput.x = 0;
        state.motionInput.z = 0;
        state.viewInput.x = 0;
        state.viewInput.z = 0;
        state.motionNeedsRecenter = true;
        camera.position.set(ball.position.x, 6.4, ball.position.z - 8.4);
        cameraTarget.set(ball.position.x, 0.4, ball.position.z + 3);
        camera.lookAt(cameraTarget);
        recenterTilt(false);
      }

      function startPreview() {
        if (state.pathLength <= 0) return;
        state.wasRunningBeforePreview = state.running;
        state.startPanelWasVisibleBeforePreview = !hud.startPanel.classList.contains("is-hidden");
        state.previewActive = true;
        state.previewDistance = 0;
        state.previewAtEnd = false;
        state.running = false;
        state.pointerActive = false;
        state.pointerInput.x = 0;
        state.pointerInput.z = 0;
        ballVelocity.set(0, 0, 0);
        hud.startPanel.classList.add("is-hidden");
        hud.previewButton.textContent = "Stop Preview";
        gameShell.focus({ preventScroll: true });
        setStatus("Preview");
      }

      function stopPreview(showStatus = true, restoreRunState = true) {
        const wasPreviewing = state.previewActive;
        state.previewActive = false;
        state.previewDistance = 0;
        state.previewAtEnd = false;
        hud.previewButton.textContent = "Preview";
        if (wasPreviewing && restoreRunState) {
          state.running = state.wasRunningBeforePreview;
          if (state.startPanelWasVisibleBeforePreview && !state.running) {
            hud.startPanel.classList.remove("is-hidden");
          }
        }
        if (wasPreviewing && showStatus) {
          setStatus("Preview Off");
        }
      }

      function togglePreview() {
        if (state.previewActive) {
          stopPreview();
        } else {
          startPreview();
        }
      }

      function startRun() {
        stopPreview(false, false);
        state.running = true;
        hud.startPanel.classList.add("is-hidden");
        resetBall();
        gameShell.focus({ preventScroll: true });
        setStatus(`Level ${state.level.toLocaleString()}`);
      }

      function restartLevel() {
        stopPreview(false, false);
        resetBall();
        state.running = true;
        hud.startPanel.classList.add("is-hidden");
        gameShell.focus({ preventScroll: true });
        setStatus("Restarted");
      }

      function advanceLevel() {
        stopPreview(false, false);
        state.level += 1;
        state.best = Math.max(state.best, state.level);
        saveProgress();
        loadLevel();
        resetBall();
        state.running = true;
        setStatus(`Level ${state.level.toLocaleString()}`);
      }

      function goToLevel(level) {
        stopPreview(false, false);
        state.level = level;
        state.best = Math.max(state.best, state.level);
        saveProgress();
        loadLevel();
        resetBall();
        state.running = true;
        hud.startPanel.classList.add("is-hidden");
        gameShell.focus({ preventScroll: true });
        setStatus(`Level ${state.level.toLocaleString()}`);
      }

      function rebirth() {
        if (!window.confirm("Are you sure?")) return;
        if (!window.confirm("Are you positive?")) return;
        if (!window.confirm("This nukes your progress: level 1, best score 1.")) return;
        if (!window.confirm("Final call?")) return;

        stopPreview(false, false);
        state.level = 1;
        state.best = 1;
        state.falls = 0;
        saveProgress();
        loadLevel();
        resetBall();
        state.running = false;
        hud.startPanel.classList.remove("is-hidden");
        updateHud();
        gameShell.focus({ preventScroll: true });
        setStatus("Rebirthed");
      }

      function openAdminCode() {
        const code = window.prompt("Admin code");
        if (code === null) return;
        if (code !== ADMIN_CODE) {
          setStatus("Wrong Code");
          return;
        }

        const levelText = window.prompt("Level");
        if (levelText === null) return;
        const level = Math.floor(Number(levelText));
        if (!Number.isFinite(level) || level < 1) {
          setStatus("Bad Level");
          return;
        }
        goToLevel(level);
      }

      function getGroundSlab(x, z) {
        for (const slab of state.slabs) {
          const insideX = Math.abs(x - slab.x) <= slab.width / 2 + BALL_RADIUS * 0.2;
          const insideZ = Math.abs(z - slab.z) <= slab.length / 2 + BALL_RADIUS * 0.18;
          if (insideX && insideZ) return slab;
        }
        return null;
      }

      function getKeyboardInput() {
        let x = 0;
        let z = 0;
        if (state.keys.has("ArrowLeft") || state.keys.has("KeyA")) x -= 1;
        if (state.keys.has("ArrowRight") || state.keys.has("KeyD")) x += 1;
        if (state.keys.has("ArrowUp") || state.keys.has("KeyW")) z += 1;
        if (state.keys.has("ArrowDown") || state.keys.has("KeyS")) z -= 1;
        return { x, z };
      }

      function getInput() {
        const keyInput = getKeyboardInput();
        let screenX = state.motionInput.x + state.pointerInput.x + keyInput.x;
        let screenZ = state.motionInput.z + state.pointerInput.z + keyInput.z;
        const screenLength = Math.hypot(screenX, screenZ);
        if (screenLength > 1) {
          screenX /= screenLength;
          screenZ /= screenLength;
        }

        cameraForward.subVectors(cameraTarget, camera.position);
        cameraForward.y = 0;
        if (cameraForward.lengthSq() < 0.001) {
          cameraForward.set(0, 0, 1);
        } else {
          cameraForward.normalize();
        }
        cameraRight.set(cameraForward.z, 0, -cameraForward.x).normalize();

        let x = cameraRight.x * screenX + cameraForward.x * screenZ;
        let z = cameraRight.z * screenX + cameraForward.z * screenZ;
        const worldLength = Math.hypot(x, z);
        if (worldLength > 1) {
          x /= worldLength;
          z /= worldLength;
        }

        state.viewInput.x += (screenX - state.viewInput.x) * 0.12;
        state.viewInput.z += (screenZ - state.viewInput.z) * 0.12;
        return { x, z };
      }

      function stepPhysics(dt) {
        const ground = getGroundSlab(ball.position.x, ball.position.z);
        const canLand = (
          ground &&
          ball.position.y <= BALL_RADIUS + 0.08 &&
          ball.position.y >= BALL_RADIUS - LANDING_SNAP_DEPTH &&
          ballVelocity.y <= 0
        );
        if (canLand) {
          ball.position.y = BALL_RADIUS;
          ballVelocity.y = 0;
          state.grounded = true;
        } else {
          state.grounded = false;
        }

        const input = getInput();
        const inputStrength = Math.hypot(input.x, input.z);
        const acceleration = BASE_ACCELERATION + Math.min(state.level, 140) * 0.018;
        const speedAgainstInput = inputStrength > 0.01
          ? (ballVelocity.x * input.x + ballVelocity.z * input.z) / inputStrength
          : 0;
        const reversing = inputStrength > 0.1 && speedAgainstInput < -0.05;
        const moveAcceleration = acceleration * (reversing ? REVERSE_ACCELERATION_BOOST : 1);

        if (state.grounded) {
          ballVelocity.x += input.x * moveAcceleration * dt;
          ballVelocity.z += input.z * moveAcceleration * dt;
          const friction = Math.pow(reversing ? REVERSE_BRAKE_FRICTION : inputStrength > 0.05 ? 0.986 : 0.82, dt * 60);
          ballVelocity.x *= friction;
          ballVelocity.z *= friction;
        } else {
          const offTrack = !ground;
          const gravity = offTrack ? GRAVITY * OFF_TRACK_GRAVITY_MULTIPLIER : GRAVITY;
          const airControl = offTrack ? 0.02 : 0.14;
          const airDrag = offTrack ? OFF_TRACK_DRAG : 0.995;
          ballVelocity.y -= gravity * dt;
          ballVelocity.x += input.x * acceleration * airControl * dt;
          ballVelocity.z += input.z * acceleration * airControl * dt;
          ballVelocity.x *= Math.pow(airDrag, dt * 60);
          ballVelocity.z *= Math.pow(airDrag, dt * 60);
        }

        const maxSpeed = 6.4 + Math.min(state.level, 180) * 0.008;
        const horizontalSpeed = Math.hypot(ballVelocity.x, ballVelocity.z);
        if (horizontalSpeed > maxSpeed) {
          const scale = maxSpeed / horizontalSpeed;
          ballVelocity.x *= scale;
          ballVelocity.z *= scale;
        }

        ball.position.addScaledVector(ballVelocity, dt);
        ball.rotation.x -= (ballVelocity.z * dt) / BALL_RADIUS;
        ball.rotation.z += (ballVelocity.x * dt) / BALL_RADIUS;

        if (state.grounded) {
          const goalDistance = Math.hypot(ball.position.x - state.goal.x, ball.position.z - state.goal.z);
          if (goalDistance < 0.98 || (ball.position.z > state.goal.z - 0.38 && Math.abs(ball.position.x - state.goal.x) < 1.02)) {
            advanceLevel();
            return;
          }
        }

        if (ball.position.y < -8) {
          state.falls += 1;
          updateHud();
          resetBall();
          setStatus("Try Again");
        }
      }

      function updateCamera(dt) {
        const viewX = state.viewInput.x;
        const viewZ = state.viewInput.z;
        cameraGoal.set(
          ball.position.x * 0.68 + viewX * 1.4,
          5.8 + Math.min(2.4, state.level * 0.006) + Math.abs(viewZ) * 0.45,
          ball.position.z - 8.5 - viewZ * 1.15
        );
        const cameraEase = 1 - Math.pow(0.002, dt);
        camera.position.lerp(cameraGoal, cameraEase);
        lookTarget.set(
          ball.position.x * 0.72 + viewX * 2.2,
          0.38,
          ball.position.z + 2.3 + viewZ * 2.4
        );
        cameraTarget.lerp(lookTarget, 1 - Math.pow(0.001, dt));
        camera.lookAt(cameraTarget);
        camera.rotateZ(-viewX * 0.055);
      }

      function updatePreviewCamera(dt) {
        if (state.previewDistance < state.pathLength) {
          state.previewDistance = Math.min(state.pathLength, state.previewDistance + state.previewSpeed * dt);
          if (state.previewDistance >= state.pathLength && !state.previewAtEnd) {
            state.previewAtEnd = true;
            setStatus("End Preview");
          }
        }

        const current = samplePath(state.previewDistance);
        const ahead = samplePath(Math.min(state.pathLength, state.previewDistance + 5.5));
        previewPoint.set(current.x, PLATFORM_TOP + 2.4, current.z);
        previewAhead.set(ahead.x, PLATFORM_TOP + 0.35, ahead.z);

        const dx = previewAhead.x - previewPoint.x;
        const dz = previewAhead.z - previewPoint.z;
        const directionLength = Math.hypot(dx, dz) || 1;
        cameraGoal.set(
          previewPoint.x - (dx / directionLength) * 2.3,
          PLATFORM_TOP + 3.2,
          previewPoint.z - (dz / directionLength) * 2.3
        );
        const cameraEase = 1 - Math.pow(0.0008, dt);
        camera.position.lerp(cameraGoal, cameraEase);
        cameraTarget.lerp(previewAhead, 1 - Math.pow(0.0008, dt));
        camera.lookAt(cameraTarget);
      }

      function animateDecor(dt, elapsed) {
        goalGroup.children.forEach((child) => {
          if (child.userData.spin) {
            child.rotation.z += child.userData.spin * dt * 1.5;
          }
        });
        decorGroup.children.forEach((child, index) => {
          child.rotation.x += child.userData.spin * dt * 0.55;
          child.rotation.y += child.userData.spin * dt;
          child.position.y += Math.sin(elapsed * 1.2 + index) * dt * 0.08;
        });
      }

      function loop() {
        const dt = Math.min(clock.getDelta(), 0.034);
        const elapsed = clock.elapsedTime;
        if (state.running && !state.previewActive) {
          stepPhysics(dt);
        }
        if (state.previewActive) {
          updatePreviewCamera(dt);
        } else {
          updateCamera(dt);
        }
        animateDecor(dt, elapsed);
        renderer.render(scene, camera);
      }

      function handleResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, MAX_PIXEL_RATIO));
        renderer.setSize(window.innerWidth, window.innerHeight, false);
      }

      function normalizeKey(event) {
        return event.code || event.key;
      }

      function handleKeyDown(event) {
        const code = normalizeKey(event);
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "KeyW", "KeyA", "KeyS", "KeyD", "Space", "Enter"].includes(code)) {
          event.preventDefault();
          gameShell.focus({ preventScroll: true });
        }
        if (code === "Space" || code === "Enter") {
          if (!state.running) startRun();
          return;
        }
        state.keys.add(code);
      }

      function handleKeyUp(event) {
        state.keys.delete(normalizeKey(event));
      }

      function handlePointerDown(event) {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        if (state.previewActive) stopPreview(false, false);
        gameShell.focus({ preventScroll: true });
        if (!state.running && hud.startPanel.classList.contains("is-hidden")) state.running = true;
        state.pointerActive = true;
        state.pointerId = event.pointerId;
        state.pointerStart.x = event.clientX;
        state.pointerStart.y = event.clientY;
        state.pointerInput.x = 0;
        state.pointerInput.z = 0;
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch {
          // Older embedded browsers can miss pointer capture without breaking play.
        }
      }

      function handlePointerMove(event) {
        if (!state.pointerActive || event.pointerId !== state.pointerId) return;
        const x = clamp((event.clientX - state.pointerStart.x) / 92, -1, 1);
        const z = clamp((state.pointerStart.y - event.clientY) / 92, -1, 1);
        state.pointerInput.x = x;
        state.pointerInput.z = z;
      }

      function handlePointerUp(event) {
        if (event.pointerId !== state.pointerId) return;
        state.pointerActive = false;
        state.pointerId = null;
        state.pointerInput.x = 0;
        state.pointerInput.z = 0;
      }

      function applyTiltDeadzone(value, deadzone = 1.15) {
        const magnitude = Math.abs(value);
        if (magnitude <= deadzone) return 0;
        return Math.sign(value) * (magnitude - deadzone);
      }

      function supportsDeviceMotion() {
        return typeof DeviceMotionEvent !== "undefined";
      }

      function supportsDeviceOrientation() {
        return typeof DeviceOrientationEvent !== "undefined";
      }

      function supportsTiltSensors() {
        return supportsDeviceMotion() || supportsDeviceOrientation();
      }

      function needsSensorPermission() {
        return [globalThis.DeviceMotionEvent, globalThis.DeviceOrientationEvent].some((EventCtor) => (
          typeof EventCtor !== "undefined" && typeof EventCtor.requestPermission === "function"
        ));
      }

      function normalizeScreenAngle(value) {
        if (!Number.isFinite(value)) return 0;
        const snapped = Math.round(value / 90) * 90;
        return ((snapped % 360) + 360) % 360;
      }

      function getScreenAngle() {
        const legacyAngle = Number(window.orientation);
        if (Number.isFinite(legacyAngle)) return normalizeScreenAngle(legacyAngle);

        const modernAngle = Number(screen.orientation?.angle);
        if (Number.isFinite(modernAngle)) return normalizeScreenAngle(modernAngle);

        return 0;
      }

      function rotateDeviceTiltToScreen(side, forward) {
        const angle = getScreenAngle();
        if (angle === 90) {
          return { side: forward, forward: -side };
        }
        if (angle === 270) {
          return { side: -forward, forward: side };
        }
        if (angle === 180) {
          return { side: -side, forward: -forward };
        }
        return { side, forward };
      }

      function smoothMotionInput(targetX, targetZ, amount = 0.34) {
        state.motionInput.x += (targetX - state.motionInput.x) * amount;
        state.motionInput.z += (targetZ - state.motionInput.z) * amount;
      }

      function syncSensorDebug() {
        gameShell.dataset.sensor = state.activeSensor;
        gameShell.dataset.tiltX = state.motionInput.x.toFixed(3);
        gameShell.dataset.tiltZ = state.motionInput.z.toFixed(3);
        gameShell.dataset.screenAngle = String(getScreenAngle());
        gameShell.dataset.neutral = state.motionNeutral?.kind ?? "none";
      }

      function updateTiltButton() {
        if (!supportsTiltSensors()) {
          hud.tiltButton.textContent = "Drag";
          hud.tiltButton.disabled = true;
          return;
        }

        hud.tiltButton.disabled = false;
        hud.tiltButton.textContent = state.motionReady ? "Recenter Tilt" : "Start Tilt";
      }

      function ensureMotionListener() {
        if (state.motionListening || !supportsTiltSensors()) return;
        if (supportsDeviceMotion()) {
          window.addEventListener("devicemotion", handleDeviceMotion, true);
        }
        if (supportsDeviceOrientation()) {
          window.addEventListener("deviceorientation", handleDeviceOrientation, true);
        }
        state.motionListening = true;
      }

      function recenterTilt(showStatus = true) {
        state.motionInput.x = 0;
        state.motionInput.z = 0;
        state.viewInput.x = 0;
        state.viewInput.z = 0;
        state.motionNeutral = null;
        state.motionNeedsRecenter = true;
        state.activeSensor = "none";
        syncSensorDebug();
        if (showStatus) setStatus("Hold Level");
      }

      function handleDeviceMotion(event) {
        const acceleration = event.accelerationIncludingGravity;
        const x = Number(acceleration?.x);
        const y = Number(acceleration?.y);
        const z = Number(acceleration?.z);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;

        state.motionSeen = true;
        state.lastAcceleration = { x, y, z: Number.isFinite(z) ? z : null };
        state.lastMotionAt = performance.now();
        if (!state.motionReady) return;

        if (!state.motionNeutral || state.motionNeedsRecenter || state.motionNeutral.kind !== "motion") {
          state.motionNeutral = { kind: "motion", x, y };
          state.motionNeedsRecenter = false;
        }

        const rawSide = x - state.motionNeutral.x;
        const rawForward = y - state.motionNeutral.y;
        const tilt = rotateDeviceTiltToScreen(rawSide, rawForward);
        const targetX = clamp((MOTION_SIDE_POLARITY * applyTiltDeadzone(tilt.side, 0.18)) / 4.8, -1, 1);
        const targetZ = clamp((MOTION_FORWARD_POLARITY * applyTiltDeadzone(tilt.forward, 0.18)) / 4.8, -1, 1);
        state.activeSensor = "motion";
        smoothMotionInput(targetX, targetZ, 0.32);
        syncSensorDebug();
      }

      function handleDeviceOrientation(event) {
        const beta = Number(event.beta);
        const gamma = Number(event.gamma);
        if (!Number.isFinite(beta) || !Number.isFinite(gamma)) return;
        state.motionSeen = true;
        state.lastOrientation = { beta, gamma };
        state.lastOrientationAt = performance.now();
        if (!state.motionReady) return;

        if (state.lastMotionAt > 0 && performance.now() - state.lastMotionAt < ORIENTATION_FALLBACK_DELAY) return;

        if (!state.motionNeutral || state.motionNeedsRecenter || state.motionNeutral.kind !== "orientation") {
          state.motionNeutral = { kind: "orientation", beta, gamma };
          state.motionNeedsRecenter = false;
        }

        const rawSide = gamma - state.motionNeutral.gamma;
        const rawForward = beta - state.motionNeutral.beta;
        const tilt = rotateDeviceTiltToScreen(rawSide, rawForward);
        const targetX = clamp((ORIENTATION_SIDE_POLARITY * applyTiltDeadzone(tilt.side)) / 13, -1, 1);
        const targetZ = clamp((ORIENTATION_FORWARD_POLARITY * applyTiltDeadzone(tilt.forward)) / 13, -1, 1);
        state.activeSensor = "orientation";
        smoothMotionInput(targetX, targetZ);
        syncSensorDebug();
      }

      async function enableTilt(options = {}) {
        const quiet = options.quiet === true;
        try {
          if (!supportsTiltSensors()) {
            updateTiltButton();
            if (!quiet) setStatus("Drag Works");
            return false;
          }

          const sensorSeenAtStart = Math.max(state.lastMotionAt, state.lastOrientationAt);
          const [motionAllowed, orientationAllowed] = await Promise.all([
            requestSensorAccess(globalThis.DeviceMotionEvent),
            requestSensorAccess(globalThis.DeviceOrientationEvent),
          ]);
          if (!motionAllowed && !orientationAllowed) {
            state.motionReady = false;
            updateTiltButton();
            setStatus("Tilt Blocked");
            return false;
          }

          state.motionReady = true;
          ensureMotionListener();
          recenterTilt(false);
          updateTiltButton();
          window.setTimeout(() => {
            const latestSensorAt = Math.max(state.lastMotionAt, state.lastOrientationAt);
            if (state.motionReady && latestSensorAt <= sensorSeenAtStart) setStatus("Tilt Waiting");
          }, 1200);
          if (!quiet) setStatus("Tilt On");
          return true;
        } catch {
          state.motionReady = false;
          updateTiltButton();
          setStatus("Tilt Blocked");
          return false;
        }
      }

      async function requestSensorAccess(EventCtor) {
        if (typeof EventCtor === "undefined") return false;
        if (typeof EventCtor.requestPermission !== "function") return true;
        try {
          return await EventCtor.requestPermission() === "granted";
        } catch {
          return false;
        }
      }

      function initializeTilt() {
        if (!supportsTiltSensors()) {
          updateTiltButton();
          return;
        }

        ensureMotionListener();
        state.motionReady = !needsSensorPermission();
        updateTiltButton();
      }

      hud.startButton.addEventListener("click", async (event) => {
        event.preventDefault();
        await enableTilt({ quiet: true });
        startRun();
      });
      hud.restartButton.addEventListener("click", async (event) => {
        event.preventDefault();
        await enableTilt({ quiet: true });
        restartLevel();
      });
      hud.quickRestartButton.addEventListener("click", async (event) => {
        event.preventDefault();
        await enableTilt({ quiet: true });
        restartLevel();
      });
      hud.previewButton.addEventListener("click", (event) => {
        event.preventDefault();
        togglePreview();
      });
      hud.rebirthButton.addEventListener("click", (event) => {
        event.preventDefault();
        rebirth();
      });
      hud.adminCodeButton.addEventListener("click", (event) => {
        event.preventDefault();
        openAdminCode();
      });
      hud.tiltButton.addEventListener("click", async (event) => {
        event.preventDefault();
        if (state.motionReady) {
          recenterTilt();
        } else {
          await enableTilt();
        }
      });
      window.addEventListener("keydown", handleKeyDown, { passive: false });
      window.addEventListener("keyup", handleKeyUp);
      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      window.addEventListener("resize", handleResize);
      window.addEventListener("orientationchange", () => {
        state.motionNeutral = null;
        state.motionNeedsRecenter = true;
        state.activeSensor = "none";
        state.viewInput.x = 0;
        state.viewInput.z = 0;
        syncSensorDebug();
        handleResize();
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          gameShell.focus({ preventScroll: true });
          state.motionNeedsRecenter = true;
        }
      });

      initializeTilt();
      loadLevel();
      resetBall();
      updateHud();
      window.tiltRollDebug = () => ({
        motionReady: state.motionReady,
        motionSeen: state.motionSeen,
        activeSensor: state.activeSensor,
        screenAngle: getScreenAngle(),
        input: { ...state.motionInput },
        previewActive: state.previewActive,
        previewDistance: state.previewDistance,
        pathLength: state.pathLength,
        ball: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
        neutralKind: state.motionNeutral?.kind ?? null,
        lastAcceleration: state.lastAcceleration,
        lastOrientation: state.lastOrientation,
      });
      renderer.setAnimationLoop(loop);
    }
  </script>
</body>
</html>
