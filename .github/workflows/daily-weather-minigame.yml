name: Daily weather minigame

on:
  schedule:
    - cron: "0 13-17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-weather-minigame
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate weather game
        run: npm run generate:weather-game

      - name: Check old daily game is removed
        run: npm run test:weather-replacement

      - name: Commit generated game
        run: |
          if git diff --quiet -- minigames/index.html; then
            echo "Weather minigame already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add minigames/index.html
          git commit -m "Generate daily weather minigame"
          git push origin HEAD:main
