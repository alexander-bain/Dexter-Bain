<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highway Rush | DexterBain</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #aab7c9;
      --glass: rgba(8, 15, 24, 0.68);
      --line: rgba(255, 255, 255, 0.18);
      --good: #47e38f;
      --warn: #ffd166;
      --bad: #ff4d6d;
      --road: #222831;
      --paint: #f7f7f2;
      --neon: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 220, 132, 0.68), transparent 17%),
        radial-gradient(circle at 72% 20%, rgba(125, 211, 252, 0.35), transparent 24%),
        linear-gradient(180deg, #69b8ff 0%, #bde4ff 42%, #f8d59f 68%, #29351e 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
      letter-spacing: 0;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto minmax(160px, 1fr);
      align-items: start;
      gap: 14px;
      pointer-events: none;
    }

    .brand,
    .readout,
    .meter,
    .overlay-panel {
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .brand {
      width: max-content;
      max-width: 100%;
      padding: 10px 13px;
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cluster {
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .readout {
      min-width: 86px;
      padding: 9px 12px;
      border-radius: 14px;
      text-align: center;
    }

    .readout b {
      display: block;
      font-size: 1.24rem;
      line-height: 1;
    }

    .readout span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meter {
      justify-self: end;
      width: min(260px, 100%);
      padding: 10px;
      border-radius: 14px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--muted);
    }

    .health-track {
      height: 13px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--bad), var(--warn), var(--good));
      transform-origin: left center;
      transition: transform 160ms ease;
    }

    .shop-panel {
      position: fixed;
      left: 16px;
      top: 96px;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      width: min(220px, calc(100vw - 32px));
      pointer-events: auto;
    }

    .shop-button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      background: rgba(8, 15, 24, 0.7);
      color: var(--ink);
      font: inherit;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .shop-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .shop-button.is-free {
      color: #102018;
      background: linear-gradient(135deg, #ffd166, #47e38f);
    }

    .item-icon {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.12);
    }

    .item-icon::before {
      content: "";
      display: block;
    }

    .icon-bomb::before {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #111827;
      box-shadow: 5px -7px 0 -4px #ffd166;
    }

    .icon-bump::before {
      width: 22px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4d6d, #ffd166);
    }

    .icon-clear::before {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: linear-gradient(135deg, #2563eb 0 45%, #ef233c 45% 100%);
    }

    .icon-jump::before {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 18px solid #47e38f;
    }

    .icon-ambulance::before {
      width: 22px;
      height: 14px;
      border-radius: 4px;
      background: #ef4444;
      box-shadow: inset 8px 0 0 #fff7ed;
    }

    .icon-car::before {
      width: 22px;
      height: 13px;
      border-radius: 5px;
      background: #38bdf8;
    }

    .icon-color::before {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: conic-gradient(#ff5c5c, #f6c85f, #47e38f, #38bdf8, #8b5cf6, #ff5c5c);
    }

    .icon-wheel::before {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: conic-gradient(#47e38f 0 50%, #ff4d6d 50% 100%);
    }

    .shop-name,
    .inventory-name {
      text-align: left;
    }

    .shop-key {
      color: var(--warn);
      font-size: 0.62rem;
    }

    .inventory-use-key {
      color: var(--good);
      font-size: 0.58rem;
      margin-left: 4px;
    }

    .inventory-panel {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      width: min(560px, calc(100vw - 360px));
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .inventory-item {
      min-width: 92px;
      border: 1px solid var(--line);
      border-radius: 12px;
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      background: rgba(8, 15, 24, 0.72);
      color: var(--ink);
      font: inherit;
      font-size: 0.66rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .inventory-item:disabled {
      cursor: not-allowed;
      opacity: 0.44;
    }

    .inventory-count {
      color: var(--warn);
      font-size: 0.86rem;
    }

    .intro-card {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 4;
      width: min(480px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(8, 15, 24, 0.78);
      color: var(--ink);
      text-align: center;
      text-transform: uppercase;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
    }

    .intro-card.is-hidden {
      display: none;
    }

    .intro-card b {
      display: block;
      font-size: 1.5rem;
      line-height: 1;
    }

    .intro-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: min(440px, 100%);
      padding: 24px;
      text-align: center;
    }

    .overlay-panel h2 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .overlay-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.4;
    }

    .restart {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 10px 18px;
      background: #f8fafc;
      color: #09111c;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .touch-controls {
      position: fixed;
      inset: auto 16px 18px;
      z-index: 2;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      pointer-events: none;
    }

    .touch-pad {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-pad:last-child {
      justify-content: end;
    }

    .touch-key {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 250, 252, 0.16);
      color: var(--ink);
      font: inherit;
      font-size: 1.5rem;
      font-weight: 900;
      touch-action: none;
      backdrop-filter: blur(12px);
    }

    .touch-key:active,
    .touch-key.is-down {
      background: rgba(71, 227, 143, 0.32);
    }

    .jump-action {
      position: fixed;
      right: 26px;
      bottom: 26px;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 116px;
      height: 116px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.86), transparent 16%),
        linear-gradient(145deg, rgba(255, 209, 102, 0.96), rgba(255, 77, 109, 0.9));
      color: #1d1112;
      box-shadow:
        0 18px 42px rgba(255, 77, 109, 0.36),
        inset 0 -10px 18px rgba(125, 30, 42, 0.24),
        inset 0 9px 14px rgba(255, 255, 255, 0.35);
      font: inherit;
      font-weight: 1000;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: none;
      transform: translateY(0) scale(1);
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .jump-action span {
      display: block;
      font-size: 1.36rem;
      letter-spacing: -0.04em;
      line-height: 0.9;
    }

    .jump-action small {
      display: block;
      margin-top: 4px;
      color: rgba(29, 17, 18, 0.72);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
    }

    .jump-action:active,
    .jump-action.is-down {
      filter: saturate(1.22);
      transform: translateY(4px) scale(0.96);
      box-shadow:
        0 9px 24px rgba(255, 77, 109, 0.34),
        inset 0 -5px 10px rgba(125, 30, 42, 0.26),
        inset 0 7px 12px rgba(255, 255, 255, 0.35);
    }

    .jump-action.is-airborne {
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.86), transparent 16%),
        linear-gradient(145deg, rgba(125, 211, 252, 0.96), rgba(71, 227, 143, 0.88));
      box-shadow:
        0 18px 42px rgba(71, 227, 143, 0.25),
        inset 0 -10px 18px rgba(20, 83, 45, 0.22),
        inset 0 9px 14px rgba(255, 255, 255, 0.32);
    }

    .fatal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 24px;
      background: #09111c;
      text-align: center;
    }

    .fatal.is-visible {
      display: grid;
    }

    @media (max-width: 760px) {
      .hud {
        inset: 10px 10px auto;
        grid-template-columns: 1fr;
      }

      .brand,
      .meter {
        justify-self: stretch;
        width: auto;
      }

      .cluster {
        order: 3;
        justify-self: stretch;
      }

      .readout {
        flex: 1;
      }

      .touch-controls {
        display: grid;
      }

      .shop-panel {
        top: auto;
        bottom: 108px;
        width: min(190px, calc(50vw - 18px));
      }

      .inventory-panel {
        bottom: 108px;
        left: auto;
        right: 10px;
        width: min(240px, calc(50vw - 18px));
        transform: none;
      }

      .jump-action {
        right: auto;
        left: 50%;
        bottom: 18px;
        width: 88px;
        height: 88px;
        transform: translateX(-50%) scale(1);
      }

      .jump-action:active,
      .jump-action.is-down {
        transform: translateX(-50%) translateY(4px) scale(0.96);
      }

      .jump-action span {
        font-size: 1.02rem;
      }
    }
  </style>
</head>
  <body>
  <main id="gameShell" aria-label="Highway Rush game" tabindex="0">
    <div class="hud" aria-live="polite">
      <div class="brand">
        <h1>Highway Rush</h1>
        <span id="stateText">Engine live</span>
      </div>
      <div class="cluster">
        <div class="readout">
          <b id="scoreText">0</b>
          <span>Score</span>
        </div>
        <div class="readout">
          <b id="bestText">0</b>
          <span>Best</span>
        </div>
        <div class="readout">
          <b id="moneyText">$0</b>
          <span>Money</span>
        </div>
        <div class="readout">
          <b id="wantedBestText">0</b>
          <span>Wanted Best</span>
        </div>
        <div class="readout">
          <b id="speedText">0</b>
          <span>MPH</span>
        </div>
        <div class="readout">
          <b id="wantedText">0</b>
          <span>Wanted</span>
        </div>
      </div>
      <div class="meter">
        <div class="meter-label">
          <span>Health</span>
          <span id="healthText">100%</span>
        </div>
        <div class="health-track">
          <div class="health-fill" id="healthFill"></div>
        </div>
      </div>
    </div>

    <div class="touch-controls" aria-hidden="true">
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowLeft" type="button" aria-label="Left">‹</button>
        <button class="touch-key" data-key="ArrowRight" type="button" aria-label="Right">›</button>
      </div>
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowDown" type="button" aria-label="Brake">↓</button>
        <button class="touch-key" data-key="ArrowUp" type="button" aria-label="Gas">↑</button>
      </div>
    </div>

    <button class="jump-action" id="jumpButton" type="button" aria-label="Jump the car">
      <span>Jump</span>
      <small>Space</small>
    </button>

    <div class="shop-panel" aria-label="Highway Rush shop">
      <button class="shop-button" data-buy="bomb" type="button"><span class="item-icon icon-bomb"></span><span class="shop-name">$2 Bomb</span><span class="shop-key">R</span></button>
      <button class="shop-button" data-buy="speedBump" type="button"><span class="item-icon icon-bump"></span><span class="shop-name">$2 Speed Bump</span><span class="shop-key">Y</span></button>
      <button class="shop-button" data-buy="clear" type="button"><span class="item-icon icon-clear"></span><span class="shop-name">$3 Clear Police</span><span class="shop-key">U</span></button>
      <button class="shop-button" data-buy="superJump" type="button"><span class="item-icon icon-jump"></span><span class="shop-name">$3 Super Jump</span><span class="shop-key">I</span></button>
      <button class="shop-button" data-buy="slowAmbulance" type="button"><span class="item-icon icon-ambulance"></span><span class="shop-name">$5 Slow Ambulance</span><span class="shop-key">O</span></button>
      <button class="shop-button" data-buy="betterCar" type="button"><span class="item-icon icon-car"></span><span class="shop-name">$20 Better Car</span><span class="shop-key">B</span></button>
      <button class="shop-button" data-buy="colorCar" type="button"><span class="item-icon icon-color"></span><span class="shop-name">$5 Color Car</span><span class="shop-key">C</span></button>
      <button class="shop-button is-free" data-buy="wheel" type="button"><span class="item-icon icon-wheel"></span><span class="shop-name">Free Money Wheel</span><span class="shop-key">M</span></button>
    </div>

    <div class="inventory-panel" aria-label="Highway Rush inventory">
      <button class="inventory-item" data-use="bomb" type="button"><span class="item-icon icon-bomb"></span><span class="inventory-name">Bomb <b class="inventory-count" data-count="bomb">0</b><span class="inventory-use-key">Use F</span></span></button>
      <button class="inventory-item" data-use="speedBump" type="button"><span class="item-icon icon-bump"></span><span class="inventory-name">Bump <b class="inventory-count" data-count="speedBump">0</b><span class="inventory-use-key">Use G</span></span></button>
      <button class="inventory-item" data-use="clear" type="button"><span class="item-icon icon-clear"></span><span class="inventory-name">Clear <b class="inventory-count" data-count="clear">0</b><span class="inventory-use-key">Use H</span></span></button>
      <button class="inventory-item" data-use="superJump" type="button"><span class="item-icon icon-jump"></span><span class="inventory-name">Jump <b class="inventory-count" data-count="superJump">0</b><span class="inventory-use-key">Use J</span></span></button>
      <button class="inventory-item" data-use="slowAmbulance" type="button"><span class="item-icon icon-ambulance"></span><span class="inventory-name">Slow <b class="inventory-count" data-count="slowAmbulance">0</b><span class="inventory-use-key">Use K</span></span></button>
    </div>

    <div class="intro-card" id="introCard">
      <b>Police got punched</b>
      <span>Press any driving key or tap to start</span>
    </div>

    <div class="overlay" id="gameOver">
      <section class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <h2 id="gameOverTitle">Wrecked</h2>
        <p id="finalStats">Score 0</p>
        <button class="restart" id="restartButton" type="button">Restart</button>
      </section>
    </div>

    <div class="fatal" id="fatal">
      <p>Highway Rush could not load the 3D engine.</p>
    </div>
  </main>

  <script type="module">
    const engineUrls = [
      "./vendor/three.module.js",
      "https://unpkg.com/three@0.165.0/build/three.module.js",
    ];

    let THREE = null;
    let lastEngineError = null;

    for (const engineUrl of engineUrls) {
      try {
        THREE = await import(engineUrl);
        break;
      } catch (error) {
        lastEngineError = error;
      }
    }

    if (THREE) {
      try {
        startGame(THREE);
      } catch (error) {
        document.getElementById("fatal").classList.add("is-visible");
        console.error(error);
      }
    } else {
      document.getElementById("fatal").classList.add("is-visible");
      console.error(lastEngineError);
    }

    function startGame(THREE) {
      const hud = {
        score: document.getElementById("scoreText"),
        best: document.getElementById("bestText"),
        money: document.getElementById("moneyText"),
        wantedBest: document.getElementById("wantedBestText"),
        speed: document.getElementById("speedText"),
        wanted: document.getElementById("wantedText"),
        health: document.getElementById("healthText"),
        healthFill: document.getElementById("healthFill"),
        state: document.getElementById("stateText"),
        overlay: document.getElementById("gameOver"),
        final: document.getElementById("finalStats"),
        restart: document.getElementById("restartButton"),
        jump: document.getElementById("jumpButton"),
        intro: document.getElementById("introCard"),
        buyButtons: Array.from(document.querySelectorAll("[data-buy]")),
        inventoryButtons: Array.from(document.querySelectorAll("[data-use]")),
        inventoryCounts: Array.from(document.querySelectorAll("[data-count]")),
      };
      const gameShell = document.getElementById("gameShell");

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xaee3ff, 24, 96);

      function readStoredNumber(key, fallback = 0) {
        try {
          const value = Number(localStorage.getItem(key) || fallback);
          return Number.isFinite(value) ? value : fallback;
        } catch {
          return fallback;
        }
      }

      function writeStoredValue(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {
          // Embedded file views can block storage; gameplay should still work.
        }
      }

      function readStoredInventory() {
        try {
          const saved = JSON.parse(localStorage.getItem("highway-rush-inventory") || "{}");
          return {
            bomb: Math.max(0, Number(saved.bomb) || 0),
            speedBump: Math.max(0, Number(saved.speedBump) || 0),
            clear: Math.max(0, Number(saved.clear) || 0),
            superJump: Math.max(0, Number(saved.superJump) || 0),
            slowAmbulance: Math.max(0, Number(saved.slowAmbulance) || 0),
          };
        } catch {
          return { bomb: 0, speedBump: 0, clear: 0, superJump: 0, slowAmbulance: 0 };
        }
      }

      const camera = new THREE.PerspectiveCamera(64, window.innerWidth / window.innerHeight, 0.1, 165);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;
      renderer.domElement.tabIndex = 0;
      renderer.domElement.setAttribute("aria-label", "Highway Rush game canvas");
      document.documentElement.tabIndex = -1;
      document.body.prepend(renderer.domElement);
      document.body.tabIndex = -1;

      const hemi = new THREE.HemisphereLight(0xbfdcff, 0x263018, 2.3);
      scene.add(hemi);

      const shadowMat = new THREE.MeshStandardMaterial({ color: 0x0b111a, roughness: 1 });

      function box(w, h, d, mat, x = 0, y = 0, z = 0) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      function roadPose(z) {
        const p = ((z + routeOriginOffset) % routeLoopLength + routeLoopLength) % routeLoopLength;

        if (p < trackStraightX) {
          return { x: -trackHalfStraightX + p + routeWorldOffsetX, z: trackBottomZ, heading: Math.PI / 2 };
        }

        if (p < trackStraightX + quarterTurnLength) {
          const arc = p - trackStraightX;
          const theta = (Math.PI / 2) - (arc / turnRadius);
          return {
            x: trackHalfStraightX + Math.cos(theta) * turnRadius + routeWorldOffsetX,
            z: trackHalfStraightZ + Math.sin(theta) * turnRadius,
            heading: theta,
          };
        }

        if (p < trackStraightX + quarterTurnLength + trackStraightZ) {
          const run = p - trackStraightX - quarterTurnLength;
          return { x: trackSideX + routeWorldOffsetX, z: trackHalfStraightZ - run, heading: 0 };
        }

        if (p < trackStraightX + quarterTurnLength + trackStraightZ + quarterTurnLength) {
          const arc = p - trackStraightX - quarterTurnLength - trackStraightZ;
          const theta = -(arc / turnRadius);
          return {
            x: trackHalfStraightX + Math.cos(theta) * turnRadius + routeWorldOffsetX,
            z: -trackHalfStraightZ + Math.sin(theta) * turnRadius,
            heading: theta,
          };
        }

        if (p < (trackStraightX * 2) + (quarterTurnLength * 2) + trackStraightZ) {
          const run = p - trackStraightX - quarterTurnLength - trackStraightZ - quarterTurnLength;
          return { x: trackHalfStraightX - run + routeWorldOffsetX, z: trackTopZ, heading: -Math.PI / 2 };
        }

        if (p < (trackStraightX * 2) + (quarterTurnLength * 3) + trackStraightZ) {
          const arc = p - (trackStraightX * 2) - (quarterTurnLength * 2) - trackStraightZ;
          const theta = -(Math.PI / 2) - (arc / turnRadius);
          return {
            x: -trackHalfStraightX + Math.cos(theta) * turnRadius + routeWorldOffsetX,
            z: -trackHalfStraightZ + Math.sin(theta) * turnRadius,
            heading: theta,
          };
        }

        if (p < (trackStraightX * 2) + (quarterTurnLength * 3) + (trackStraightZ * 2)) {
          const run = p - (trackStraightX * 2) - (quarterTurnLength * 3) - trackStraightZ;
          return { x: -trackSideX + routeWorldOffsetX, z: -trackHalfStraightZ + run, heading: Math.PI };
        }

        const arc = p - (trackStraightX * 2) - (quarterTurnLength * 3) - (trackStraightZ * 2);
        const theta = Math.PI - (arc / turnRadius);
        return {
          x: -trackHalfStraightX + Math.cos(theta) * turnRadius + routeWorldOffsetX,
          z: trackHalfStraightZ + Math.sin(theta) * turnRadius,
          heading: theta,
        };
      }

      function rememberRouteObject(object, baseX = object.position.x, baseZ = object.position.z, baseRotationY = object.rotation.y) {
        object.userData.baseX = baseX;
        object.userData.baseZ = baseZ;
        object.userData.baseRotationY = baseRotationY;
        return object;
      }

      function placeRouteObject(object, turnScale = 1) {
        if (object.userData.baseX === undefined) rememberRouteObject(object);
        const pose = roadPose(object.userData.baseZ);
        const lateral = object.userData.baseX;
        object.position.x = pose.x + lateral * Math.cos(pose.heading);
        object.position.z = pose.z + lateral * Math.sin(pose.heading);
        object.rotation.y = object.userData.baseRotationY + pose.heading * turnScale;
      }

      function advanceRouteObject(object, scroll, wrapAt, loopLength, turnScale = 1) {
        if (object.userData.baseX === undefined) rememberRouteObject(object);
        object.userData.baseZ += scroll;
        if (object.userData.baseZ > wrapAt) object.userData.baseZ -= loopLength;
        placeRouteObject(object, turnScale);
      }

      function setRoadActor(actor, roadX, roadZ, facing = 0) {
        actor.userData.roadX = roadX;
        actor.userData.roadZ = roadZ;
        actor.userData.facing = facing;
        placeRoadActor(actor);
      }

      function placeRoadActor(actor) {
        const pose = roadPose(actor.userData.roadZ);
        const lateral = actor.userData.roadX;
        actor.position.x = pose.x + lateral * Math.cos(pose.heading);
        actor.position.z = pose.z + lateral * Math.sin(pose.heading);
        actor.rotation.y = pose.heading + actor.userData.facing + (actor.userData.turnBias || 0);
      }

      function addArcGuide(group, centerX, centerZ, radius, startAngle, endAngle, segments = 7) {
        for (let i = 0; i < segments; i += 1) {
          const t = i / Math.max(1, segments - 1);
          const angle = startAngle + (endAngle - startAngle) * t;
          const x = centerX + Math.cos(angle) * radius;
          const z = centerZ + Math.sin(angle) * radius;
          const dash = box(0.12, 0.03, 1.8, stripeMat, x, 0.045, z);
          dash.rotation.y = (Math.PI / 2) - angle;
          group.add(dash);
        }
      }

      function makeTurnJunction(baseZ, baseRotationY = 0) {
        const junction = new THREE.Group();
        const squareSize = highwayWidth + 12;
        const sideStreetLength = 34;
        junction.add(box(squareSize, 0.14, squareSize, roadMat, 0, -0.065, 0));
        junction.add(box(sideStreetLength, 0.12, highwayWidth + 4, roadMat, 0, -0.07, 0));
        junction.add(box(sideStreetLength + 6, 0.1, shoulderWidth, shoulderMat, 0, -0.11, roadHalfWidth + shoulderWidth * 0.5 + 1.8));
        junction.add(box(sideStreetLength + 6, 0.1, shoulderWidth, shoulderMat, 0, -0.11, -(roadHalfWidth + shoulderWidth * 0.5 + 1.8)));

        addArcGuide(junction, 7.4, 7.4, 7.4, Math.PI, Math.PI / 2, 6);
        addArcGuide(junction, -7.4, 7.4, 7.4, 0, Math.PI / 2, 6);
        addArcGuide(junction, 7.4, -7.4, 7.4, Math.PI, -Math.PI / 2, 6);
        addArcGuide(junction, -7.4, -7.4, 7.4, 0, -Math.PI / 2, 6);

        rememberRouteObject(junction, 0, baseZ, baseRotationY);
        road.add(junction);
        roadBits.push(junction);
      }

      function makeRoad() {
        const tileLength = 12;
        const tileCount = Math.ceil(routeLoopLength / tileLength) + 10;
        for (let i = 0; i < tileCount; i += 1) {
          const z = 32 - i * tileLength;
          const slab = box(highwayWidth, 0.12, tileLength + 0.2, roadMat, 0, -0.07, z);
          const leftShoulder = box(shoulderWidth, 0.1, tileLength + 0.3, shoulderMat, -(roadHalfWidth + shoulderWidth * 0.5), -0.11, z);
          const rightShoulder = box(shoulderWidth, 0.1, tileLength + 0.3, shoulderMat, roadHalfWidth + shoulderWidth * 0.5, -0.11, z);
          road.add(slab, leftShoulder, rightShoulder);
          roadBits.push(slab, leftShoulder, rightShoulder);

          for (const x of [-edgeLineX, edgeLineX]) {
            const edgeLine = box(0.16, 0.04, tileLength + 0.05, stripeMat, x, 0.04, z);
            const curb = box(0.36, 0.08, tileLength + 0.6, curbMat, Math.sign(x) * curbX, 0.04, z);
            road.add(edgeLine, curb);
            roadBits.push(edgeLine, curb);
          }

          for (const x of laneStripeOffsets) {
            const outerStripe = Math.abs(x) > laneWidth * 3.4;
            if (outerStripe && i % 2 === 1) continue;
            const dashCount = outerStripe ? 1 : 2;
            const dashLength = outerStripe ? 3.0 : 3.9;
            for (let j = 0; j < dashCount; j += 1) {
              const stripe = box(0.16, 0.032, dashLength, stripeMat, x, 0.035, z - 3 + j * 6);
              road.add(stripe);
              stripes.push(stripe);
            }
          }

          for (const x of [-railX + 0.32, railX - 0.32]) {
            for (let j = 0; j < 1; j += 1) {
              const reflector = box(0.16, 0.08, 0.52, reflectorMat, x, 0.11, z - 3 + j * 6);
              road.add(reflector);
              roadBits.push(reflector);
            }
          }

          for (const x of [-railX, railX]) {
            const rail = box(0.24, 0.42, tileLength + 0.5, railMat, x, 0.35, z);
            road.add(rail);
            roadBits.push(rail);

            for (let j = 0; j < 1; j += 1) {
              const post = box(0.2, 0.92, 0.2, shadowMat, x, 0.5, z - 3 + j * 6);
              road.add(post);
              roadBits.push(post);
            }
          }
        }

        const junctionMidpoints = [
          trackStraightX + quarterTurnLength * 0.5,
          trackStraightX + quarterTurnLength + trackStraightZ + quarterTurnLength * 0.5,
          (trackStraightX * 2) + (quarterTurnLength * 2) + trackStraightZ + quarterTurnLength * 0.5,
          (trackStraightX * 2) + (quarterTurnLength * 3) + (trackStraightZ * 2) + quarterTurnLength * 0.5,
        ];
        for (const junctionP of junctionMidpoints) {
          makeTurnJunction(junctionP - routeOriginOffset);
        }
      }

        const hillMat = new THREE.MeshStandardMaterial({ color: 0x536d38, roughness: 1 });
        const darkHillMat = new THREE.MeshStandardMaterial({ color: 0x314424, roughness: 1 });
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x71839b, roughness: 0.82, metalness: 0.08 });
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x9caabd, roughness: 0.74, metalness: 0.12 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xffe8a3, emissive: 0xffd166, emissiveIntensity: 0.48 });
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5b351d, roughness: 0.94 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x1f8a4c, roughness: 0.9 });
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, emissive: 0x7dd3fc, emissiveIntensity: 0.96 });
        const billboardMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.46, metalness: 0.22 });
        const billboardGlowMat = new THREE.MeshStandardMaterial({ color: 0xff4d6d, emissive: 0xff4d6d, emissiveIntensity: 0.66 });

        const sunDisc = new THREE.Mesh(
          new THREE.SphereGeometry(5.4, 32, 16),
          new THREE.MeshBasicMaterial({ color: 0xffd166 })
        );
        sunDisc.position.set(-34, 43, -118);
        scene.add(sunDisc);

        function track(object) {
          sceneryBits.push(object);
          scene.add(object);
          return object;
        }

        function makeTree(x, z, scale = 1) {
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * scale, 0.22 * scale, 1.2 * scale, 8), trunkMat);
          trunk.position.y = 0.55 * scale;
          trunk.castShadow = true;
          const crown = new THREE.Mesh(new THREE.ConeGeometry(0.92 * scale, 2.3 * scale, 10), leafMat);
          crown.position.y = 2 * scale;
          crown.castShadow = true;
          tree.add(trunk, crown);
          tree.position.set(x, -0.08, z);
          return track(tree);
        }

        function makeLamp(x, z) {
          const lamp = new THREE.Group();
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.07, 4.1, 10), railMat);
          pole.position.y = 1.9;
          const arm = box(1.05, 0.08, 0.08, railMat, x > 0 ? -0.45 : 0.45, 3.9, 0);
          const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 10), lampMat);
          bulb.position.set(x > 0 ? -0.98 : 0.98, 3.83, 0);
          lamp.add(pole, arm, bulb);
          lamp.position.set(x, 0, z);
          return track(lamp);
        }

        function makeBillboard(x, z, accent) {
          const board = new THREE.Group();
          const postA = box(0.12, 2.4, 0.12, railMat, -0.85, 1.1, 0);
          const postB = box(0.12, 2.4, 0.12, railMat, 0.85, 1.1, 0);
          const panel = box(2.5, 1.18, 0.16, billboardMat, 0, 2.6, 0);
          const glow = box(1.82, 0.18, 0.18, accent, 0, 2.64, -0.12);
          const slash = box(0.24, 0.84, 0.2, billboardGlowMat, -0.72, 2.64, -0.14);
          slash.rotation.z = -0.45;
          board.add(postA, postB, panel, glow, slash);
          board.position.set(x, 0, z);
          board.rotation.y = x > 0 ? -0.18 : 0.18;
          return track(board);
        }

        function makeCloud(x, y, z, scale = 1) {
          const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.76 });
          const cloud = new THREE.Group();
          for (let i = 0; i < 5; i += 1) {
            const puff = new THREE.Mesh(new THREE.SphereGeometry((0.75 + Math.random() * 0.45) * scale, 12, 8), cloudMat);
            puff.position.set((i - 2) * 0.78 * scale, Math.sin(i) * 0.16 * scale, Math.cos(i) * 0.28 * scale);
            puff.castShadow = false;
            cloud.add(puff);
          }
          cloud.position.set(x, y, z);
          clouds.push(cloud);
          scene.add(cloud);
        }

        for (let i = 0; i < 12; i += 1) {
          const z = -44 - i * 34;
          const leftHill = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 5, 6 + Math.random() * 6, 7), i % 2 ? darkHillMat : hillMat);
          leftHill.position.set(-(sceneryFarX + 8 + Math.random() * 14), 2.3, z);
          leftHill.rotation.y = Math.random() * Math.PI;
          leftHill.castShadow = false;
          track(leftHill);

          const rightHill = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 5, 6 + Math.random() * 6, 7), i % 2 ? hillMat : darkHillMat);
          rightHill.position.set(sceneryFarX + 8 + Math.random() * 14, 2.3, z - 12);
          rightHill.rotation.y = Math.random() * Math.PI;
          rightHill.castShadow = false;
          track(rightHill);
        }

        for (let i = 0; i < 38; i += 1) {
          const side = i % 2 === 0 ? -1 : 1;
          const z = -10 - i * 12.4;
          if (i % 4 === 0) {
            makeLamp(side * (roadHalfWidth + 3.8), z);
          } else if (i % 5 === 0) {
            makeBillboard(side * (sceneryNearX + 4 + Math.random() * 4), z, i % 2 ? reflectorMat : curbMat);
          } else if (i % 3 === 0) {
            makeTree(side * (sceneryNearX + 2 + Math.random() * 11), z, 0.75 + Math.random() * 0.9);
          } else {
            const height = 1.8 + Math.random() * 6.8;
            const building = box(2 + Math.random() * 2.7, height, 2 + Math.random() * 4.4, i % 4 === 1 ? towerMat : buildingMat, side * (sceneryNearX + 6 + Math.random() * 18), height / 2 - 0.08, z);
            building.castShadow = false;
            track(building);
            if (i % 6 === 0) {
              const glow = box(0.7 + Math.random() * 0.7, 0.14, 0.08, windowMat, building.position.x, height * 0.68, z + 1.08);
              glow.castShadow = false;
              track(glow);
            }
          }
        }

        for (let i = 0; i < 12; i += 1) {
          makeCloud(-30 + Math.random() * 60, 17 + Math.random() * 12, -24 - i * 34, 1.15 + Math.random() * 1.1);
        }
      }

      const trafficColors = [0xff5c5c, 0xf6c85f, 0x42d392, 0xffffff, 0x8b5cf6, 0xf97316, 0x14b8a6, 0xf43f5e, 0x38bdf8];

      function spawnMoneyPickup(zOverride = null) {
        const pickup = makeMoneyPickup();
        const lane = laneCenters[Math.floor(Math.random() * laneCenters.length)];
        setRoadActor(pickup, lane + (Math.random() - 0.5) * 0.5, zOverride ?? -120 - Math.random() * 90, 0);
        moneyPickups.push(pickup);
        scene.add(pickup);
      }

      function spawnTraffic(zOverride = null, laneOverride = null) {
        const lane = laneOverride ?? laneCenters[state.nextLane % laneCenters.length];
        state.nextLane = (state.nextLane + 1 + Math.floor(Math.random() * 3)) % laneCenters.length;
        const isAmbulance = Math.random() < 0.12;
        const color = trafficColors[Math.floor(Math.random() * trafficColors.length)];
        const car = isAmbulance ? makeAmbulance() : makeCar(color, 0x243449);
        const isTruck = !isAmbulance && Math.random() < 0.18;
        if (isTruck) {
          car.scale.set(1.12, 1.12, 1.42);
        }
        car.userData.kind = isAmbulance ? "ambulance" : isTruck ? "truck" : "traffic";
        car.userData.speed = isAmbulance
          ? Math.max(58, Math.abs(state.speed) + 18 + Math.random() * 20)
          : 5 + Math.random() * 18;
        car.userData.hit = false;
        car.userData.width = carSize.width * car.scale.x;
        car.userData.length = carSize.length * car.scale.z;
        setRoadActor(car, lane + (Math.random() - 0.5) * 0.42, zOverride ?? -150 - Math.random() * 28, 0);
        traffic.push(car);
        scene.add(car);
      }

      function dropTrap(type = "speedBump") {
        const trap = makeTrap(type);
        setRoadActor(trap, state.x + (type === "bomb" ? state.steerAngle * 2.4 : 0), state.z + (type === "bomb" ? 5 : 9), 0);
        if (type === "bomb") {
          trap.userData.throwTargetZ = state.z + 18;
          trap.userData.throwArc = 0.42;
        }
        traps.push(trap);
        scene.add(trap);
      }

      function removeNearestPolice(limit = 1) {
        const sortedPolice = [...police].sort((a, b) => {
          const aDistance = Math.abs(a.userData.roadZ - state.z) + Math.abs(a.userData.roadX - state.x) * 0.35;
          const bDistance = Math.abs(b.userData.roadZ - state.z) + Math.abs(b.userData.roadX - state.x) * 0.35;
          return aDistance - bDistance;
        });
        let removed = 0;
        for (const car of sortedPolice) {
          if (removed >= limit) break;
          const index = police.indexOf(car);
          if (index < 0) continue;
          removePoliceCar(car);
          removed += 1;
        }
        return removed;
      }

      function buyShop(action) {
        if (state.introActive && action !== "wheel") startRun();
        if (action === "wheel") {
          if (state.wheelUsed) return;
          state.wheelUsed = true;
          state.money = Math.random() > 0.5 ? state.money * 2 : 0;
          saveProgress();
          return;
        }
        const cost = shopCosts[action];
        if (!spendMoney(cost)) return;
        if (Object.prototype.hasOwnProperty.call(state.inventory, action)) {
          state.inventory[action] += 1;
          saveProgress();
        } else if (action === "betterCar") {
          state.carUpgrade = Math.min(maxUpgradeLevel, state.carUpgrade + 1);
          state.health = Math.min(maxHealth(), state.health + 35);
          applyPlayerLook();
          saveProgress();
        } else if (action === "colorCar") {
          state.colorIndex = (state.colorIndex + 1) % playerColors.length;
          applyPlayerLook();
          saveProgress();
        }
      }

      function useInventory(action) {
        if (state.introActive) startRun();
        if (!state.inventory[action]) return;
        state.inventory[action] -= 1;
        saveProgress();
        if (action === "bomb") {
          const removed = removeNearestPolice(1);
          if (state.wanted > 0) reduceWanted(1);
          state.policeTimer = Math.max(state.policeTimer, 2.25);
          state.score += removed ? 180 : 30;
        } else if (action === "speedBump") {
          dropTrap(action);
        } else if (action === "clear") {
          for (const car of police.splice(0)) scene.remove(car);
          state.wanted = 0;
          state.escapeTimer = 0;
        } else if (action === "superJump") {
          state.superJumpReady = true;
        } else if (action === "slowAmbulance") {
          state.slowAmbulanceTimer = 15;
        }
      }

      function spawnTrafficPack(zOverride = null) {
        if (traffic.length > trafficLimit()) return;
        const shuffledLanes = [...laneCenters].sort(() => Math.random() - 0.5);
        const packCount = Math.min(9, 5 + Math.floor(trafficPressure() * 2) + (Math.random() > 0.52 ? 1 : 0));
        for (let i = 0; i < Math.min(packCount, shuffledLanes.length); i += 1) {
          const stagger = i * (7 + Math.random() * 6);
          spawnTraffic((zOverride ?? -174 - Math.random() * 52) - stagger, shuffledLanes[i]);
        }
      }

      function spawnPolice() {
        if (police.length >= targetPoliceCount()) return;
        const car = makePoliceCar();
        const pressure = wantedPressure();
        const spawnIndex = state.policeSerial;
        state.policeSerial += 1;
        const formationX = [-10.8, 10.8, -5.4, 5.4, 0, -13.5, 13.5];
        const formationZ = [0, 8, 15, 23, 31, 40];
        car.userData.chaseOffsetX = formationX[spawnIndex % formationX.length] + (Math.random() - 0.5) * 1.4;
        car.userData.chaseOffsetZ = formationZ[spawnIndex % formationZ.length] + Math.random() * 3;
        car.userData.skill = Math.min(1, (state.score / 12000) + (state.wanted / 18));
        car.userData.speed = Math.abs(state.speed) + 3.4 + pressure * 0.9 + car.userData.skill * 8 + Math.random() * 2.6;
        car.userData.width = carSize.width * 1.06;
        car.userData.length = carSize.length * 1.06;
        car.userData.hitCooldown = 0;
        car.userData.mode = "approach";
        car.userData.modeTimer = Math.max(0.45, 0.95 - car.userData.skill * 0.3) + Math.random() * 0.35;
        car.userData.recoverTimer = 0;
        car.userData.attackSide = Math.sign(car.userData.chaseOffsetX) || (Math.random() > 0.5 ? 1 : -1);
        car.userData.speedBias = (Math.random() - 0.5) * 2.2 + car.userData.skill * 4.5;
        car.userData.steerAngle = 0;
        car.userData.headingOffset = 0;
        car.userData.motionHeadingOffset = 0;
        car.userData.targetRoadX = state.x;
        car.userData.targetRoadZ = state.z + 8;
        car.userData.tagCooldown = 0;
        let spawnX = state.x + car.userData.chaseOffsetX + (Math.random() - 0.5) * 1.2;
        let spawnZ = state.z + 38 + car.userData.chaseOffsetZ + Math.random() * 4;
        for (const other of police) {
          if (Math.abs(other.userData.roadX - spawnX) < 3.6 && Math.abs(other.userData.roadZ - spawnZ) < 15) {
            spawnZ += 16;
            spawnX += spawnX > 0 ? 2.4 : -2.4;
          }
        }
        setRoadActor(car, THREE.MathUtils.clamp(spawnX, bounds.left, bounds.right), spawnZ, 0);
        police.push(car);
        scene.add(car);
      }

      function summonPolice(count = 1) {
        state.wanted += count;
        state.escapeTimer = 9.5 + state.wanted * 1.5;
        state.policeTimer = 0.05;
        for (let i = 0; i < count; i += 1) spawnPolice();
      }

      function removePoliceCar(car) {
        scene.remove(car);
        const index = police.indexOf(car);
        if (index >= 0) police.splice(index, 1);
      }

      function reduceWanted(amount = 1) {
        state.wanted = Math.max(0, state.wanted - amount);
        const targetPolice = targetPoliceCount();
        while (police.length > targetPolice) {
          removePoliceCar(police[0]);
        }
        state.escapeTimer = state.wanted > 0 ? 8 + state.wanted : 0;
      }

      function performJump() {
        if (!state.playing || state.y > 0.001 || state.jumpVelocity !== 0) return;
        state.jumpVelocity = state.superJumpReady ? 17.8 : 11.4;
        state.superJumpReady = false;
        state.y = 0.02;
        hud.jump.classList.add("is-down");
      }

      function updateInput(dt) {
        const left = keys.has("KeyD") || keys.has("ArrowRight");
        const right = keys.has("KeyA") || keys.has("ArrowLeft");
        const gas = keys.has("KeyW") || keys.has("ArrowUp");
        const brake = keys.has("KeyS") || keys.has("ArrowDown");
        const steer = (right ? 1 : 0) - (left ? 1 : 0);
        const power = upgradePower();
        const targetSpeed = gas ? 66 + power * 5 : brake ? -34 - power * 2 : 28 + power * 1.4;
        const throttleResponse = gas || brake ? 3.6 : 1.75;

        state.speed += (targetSpeed - state.speed) * Math.min(1, dt * throttleResponse);
        state.steerAngle += (steer * 0.72 - state.steerAngle) * Math.min(1, dt * (7.5 + power * 0.32));
        state.headingOffset += steer * dt * (1.65 + power * 0.12 + state.speed * 0.024);
        state.headingOffset = THREE.MathUtils.euclideanModulo(state.headingOffset + Math.PI, Math.PI * 2) - Math.PI;
        const motionDelta = Math.atan2(
          Math.sin(state.headingOffset - state.motionHeadingOffset),
          Math.cos(state.headingOffset - state.motionHeadingOffset)
        );
        state.motionHeadingOffset += motionDelta * Math.min(1, dt * 8.5);
        state.motionHeadingOffset = THREE.MathUtils.euclideanModulo(state.motionHeadingOffset + Math.PI, Math.PI * 2) - Math.PI;
        state.driveFactor = Math.cos(state.motionHeadingOffset);
        state.x += Math.sin(state.motionHeadingOffset) * dt * (state.speed * 0.44);
        state.x = Math.max(bounds.left, Math.min(bounds.right, state.x));

        if (state.y > 0 || state.jumpVelocity > 0) {
          state.jumpVelocity -= 22 * dt;
          state.y += state.jumpVelocity * dt;
          if (state.y <= 0) {
            state.y = 0;
            state.jumpVelocity = 0;
            hud.jump.classList.remove("is-down");
          }
        }
      }

      function updateWorld(dt) {
        const scroll = state.speed * state.driveFactor * dt;
        state.slowAmbulanceTimer = Math.max(0, state.slowAmbulanceTimer - dt);
        if (state.fireTimer > 0) {
          state.fireTimer = Math.max(0, state.fireTimer - dt);
          state.health = Math.max(0, state.health - dt * 6.4);
          if (state.health <= 0) endGame();
        }
        fireEffect.visible = state.fireTimer > 0;
        fireEffect.rotation.y += dt * 8;

        for (const item of roadBits) {
          advanceRouteObject(item, scroll, 35, roadLoopLength);
        }
        for (const stripe of stripes) {
          advanceRouteObject(stripe, scroll, 35, roadLoopLength);
        }

        for (const item of sceneryBits) {
          advanceRouteObject(item, scroll, 58, roadLoopLength, 0.45);
        }

        for (const cloud of clouds) {
          cloud.position.z += scroll * 0.22;
          cloud.position.x += Math.sin(clock.elapsedTime * 0.14 + cloud.position.z) * dt * 0.28;
          if (cloud.position.z > 36) cloud.position.z -= 424;
        }

        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnTrafficPack();
          const pressure = trafficPressure();
          state.spawnTimer = Math.max(0.28, 0.52 - pressure * 0.12) + Math.random() * 0.16;
        }

        state.pickupTimer -= dt;
        if (state.pickupTimer <= 0) {
          spawnMoneyPickup();
          state.pickupTimer = 2.4 + Math.random() * 2.2;
        }

        for (let i = moneyPickups.length - 1; i >= 0; i -= 1) {
          const pickup = moneyPickups[i];
          pickup.userData.roadZ += scroll;
          pickup.rotation.y += dt * 4.8;
          placeRoadActor(pickup);
          if (pickup.userData.roadZ > 28) {
            scene.remove(pickup);
            moneyPickups.splice(i, 1);
          }
        }

        for (let i = traps.length - 1; i >= 0; i -= 1) {
          const trap = traps[i];
          trap.userData.life -= dt;
          trap.userData.roadZ += scroll;
          if (trap.userData.type === "bomb") {
            trap.userData.roadZ = Math.min(trap.userData.throwTargetZ || trap.userData.roadZ, trap.userData.roadZ + dt * 28);
            trap.userData.throwArc = Math.max(0, trap.userData.throwArc - dt);
          }
          placeRoadActor(trap);
          if (trap.userData.type === "bomb") {
            trap.position.y = 0.1 + Math.sin(Math.max(0, trap.userData.throwArc) * Math.PI / 0.42) * 1.8;
          }
          if (trap.userData.life <= 0 || trap.userData.roadZ > 35) {
            scene.remove(trap);
            traps.splice(i, 1);
          }
        }

        for (let i = traffic.length - 1; i >= 0; i -= 1) {
          const car = traffic[i];
          if (car.userData.kind === "ambulance" && state.slowAmbulanceTimer > 0) {
            car.userData.speed = Math.min(car.userData.speed, 18);
          }
          car.userData.roadZ += (state.speed * state.driveFactor - car.userData.speed) * dt;
          placeRoadActor(car);
          car.userData.wheels.forEach((wheel) => {
            wheel.rotation.x -= dt * Math.abs(state.speed * state.driveFactor) * 1.25;
          });
          if (car.userData.roadZ > 24) {
            scene.remove(car);
            traffic.splice(i, 1);
            state.score += 35;
          }
        }
      }

      function updatePolice(dt) {
        if (state.wanted > 0) {
          if (state.wanted > state.wantedBest) {
            state.wantedBest = state.wanted;
            saveProgress();
          }
          state.policeTimer -= dt;
          if (state.policeTimer <= 0) {
            spawnPolice();
            state.policeTimer = Math.max(0.35, 3.2 / Math.sqrt(Math.max(1, state.wanted + state.score / 2800))) + Math.random() * 0.32;
          }

          state.escapeTimer -= dt;
          const closeCop = police.some((car) => Math.abs(car.userData.roadZ - state.z) < 12 && Math.abs(car.userData.roadX - state.x) < 4.9);
          if (state.escapeTimer <= 0 && !closeCop) {
            state.score += 320;
            state.escapeTimer = Math.max(6, 9.5 - Math.min(5, state.wanted * 0.2));
          } else if (closeCop) {
            state.escapeTimer = Math.max(state.escapeTimer, 4.5);
          }
        }

        state.policeHitTimer = Math.max(0, state.policeHitTimer - dt);

        for (let i = police.length - 1; i >= 0; i -= 1) {
          const car = police[i];
          car.userData.hitCooldown = Math.max(0, car.userData.hitCooldown - dt);
          car.userData.tagCooldown = Math.max(0, car.userData.tagCooldown - dt);
          const dzToPlayer = state.z - car.userData.roadZ;
          const dxToPlayer = state.x - car.userData.roadX;
          car.userData.skill = Math.min(1.4, Math.max(car.userData.skill || 0, (state.score / 11500) + (state.wanted / 20)));
          const skill = car.userData.skill;
          const playerTrendX = state.x + state.steerAngle * (2.2 + skill * 2.4) + Math.sin(state.motionHeadingOffset) * (1.4 + skill * 2.1);
          const playerTrendZ = state.z - Math.cos(state.motionHeadingOffset) * (2.4 + skill * 4.2);

          if (car.userData.mode === "recover") {
            car.userData.recoverTimer -= dt;
            car.userData.targetRoadX = state.x + car.userData.attackSide * (3.2 + skill * 1.4) + car.userData.chaseOffsetX * 0.28;
            car.userData.targetRoadZ = state.z + 10 + skill * 2;
            if (car.userData.recoverTimer <= 0) {
              car.userData.mode = "approach";
              car.userData.modeTimer = Math.max(0.45, 0.85 - skill * 0.24) + Math.random() * 0.35;
            }
          } else if (car.userData.mode === "attack") {
            car.userData.modeTimer -= dt;
            car.userData.targetRoadX = playerTrendX + car.userData.attackSide * (0.8 + skill * 0.6) + car.userData.chaseOffsetX * 0.12;
            car.userData.targetRoadZ = playerTrendZ + 0.8 - skill * 1.4;
            if (Math.abs(dzToPlayer) < 0.9 || car.userData.modeTimer <= 0) {
              car.userData.mode = "recover";
              car.userData.recoverTimer = Math.max(0.46, 0.78 - skill * 0.16);
            }
          } else {
            car.userData.modeTimer -= dt;
            const formationHold = Math.max(0.3, 0.78 - skill * 0.25);
            car.userData.targetRoadX = playerTrendX + car.userData.chaseOffsetX * formationHold + (skill > 0.75 ? car.userData.attackSide * 1.2 : 0);
            car.userData.targetRoadZ = state.z + 5.6 + car.userData.chaseOffsetZ * 0.28 - skill * 1.9;
            if (Math.abs(dzToPlayer) < 9 && Math.abs(dxToPlayer) < 5.8 && car.userData.modeTimer <= 0) {
              car.userData.mode = "attack";
              car.userData.modeTimer = Math.max(0.48, 0.95 - skill * 0.25) + Math.random() * 0.35;
              car.userData.attackSide = Math.sign(car.userData.chaseOffsetX) || (dxToPlayer === 0 ? (Math.random() > 0.5 ? 1 : -1) : Math.sign(dxToPlayer));
            }
          }

          const pressure = wantedPressure();
          let separationX = 0;
          let separationZ = 0;
          for (const other of police) {
            if (other === car) continue;
            const sepX = car.userData.roadX - other.userData.roadX;
            const sepZ = car.userData.roadZ - other.userData.roadZ;
            if (Math.abs(sepX) < 3.8 && Math.abs(sepZ) < 14) {
              separationX += sepX === 0 ? (Math.random() > 0.5 ? 2.2 : -2.2) : Math.sign(sepX) * (4.8 - Math.abs(sepX));
              separationZ += sepZ === 0 ? 5 : Math.sign(sepZ) * (16 - Math.abs(sepZ)) * 0.22;
            }
          }
          car.userData.targetRoadX = THREE.MathUtils.clamp(car.userData.targetRoadX + separationX * 0.82, bounds.left, bounds.right);
          car.userData.targetRoadZ += separationZ;
          const targetSpeed = car.userData.mode === "attack"
            ? Math.abs(state.speed) + 6.5 + pressure + skill * 10 + car.userData.speedBias
            : car.userData.mode === "recover"
              ? Math.max(20, Math.abs(state.speed) - 4 + skill * 5) + car.userData.speedBias
              : Math.abs(state.speed) + 3.2 + pressure * 0.75 + skill * 6 + car.userData.speedBias;
          const accel = car.userData.mode === "attack" ? 2.8 + skill * 1.2 : car.userData.mode === "recover" ? 3.4 : 1.65 + skill * 0.65;
          car.userData.speed += (targetSpeed - car.userData.speed) * Math.min(1, dt * accel);
          const targetDeltaX = car.userData.targetRoadX - car.userData.roadX;
          const targetDeltaZ = car.userData.targetRoadZ - car.userData.roadZ;
          const desiredHeading = Math.atan2(targetDeltaX * 1.08, -targetDeltaZ);
          const headingDelta = Math.atan2(
            Math.sin(desiredHeading - car.userData.headingOffset),
            Math.cos(desiredHeading - car.userData.headingOffset)
          );
          const steerCommand = THREE.MathUtils.clamp(headingDelta * (1.6 + skill * 0.65), -1, 1);
          car.userData.steerAngle += (steerCommand * 0.72 - car.userData.steerAngle) * Math.min(1, dt * 7.5);
          car.userData.headingOffset += steerCommand * dt * (1.45 + skill * 0.4 + car.userData.speed * 0.023);
          car.userData.headingOffset = THREE.MathUtils.euclideanModulo(car.userData.headingOffset + Math.PI, Math.PI * 2) - Math.PI;
          const motionDelta = Math.atan2(
            Math.sin(car.userData.headingOffset - car.userData.motionHeadingOffset),
            Math.cos(car.userData.headingOffset - car.userData.motionHeadingOffset)
          );
          car.userData.motionHeadingOffset += motionDelta * Math.min(1, dt * 7.6);
          car.userData.motionHeadingOffset = THREE.MathUtils.euclideanModulo(car.userData.motionHeadingOffset + Math.PI, Math.PI * 2) - Math.PI;
          const forwardFactor = Math.cos(car.userData.motionHeadingOffset);
          car.userData.roadZ += (state.speed * state.driveFactor - car.userData.speed * forwardFactor) * dt;
          car.userData.roadX = THREE.MathUtils.clamp(
            car.userData.roadX + Math.sin(car.userData.motionHeadingOffset) * dt * (car.userData.speed * 0.44),
            bounds.left,
            bounds.right
          );
          const pose = roadPose(car.userData.roadZ);
          car.position.x = pose.x + car.userData.roadX * Math.cos(pose.heading);
          car.position.z = pose.z + car.userData.roadX * Math.sin(pose.heading);
          const targetRotation = pose.heading + car.userData.motionHeadingOffset;
          car.rotation.y += Math.atan2(
            Math.sin(targetRotation - car.rotation.y),
            Math.cos(targetRotation - car.rotation.y)
          ) * Math.min(1, dt * 8.2);
          car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, -car.userData.steerAngle * 0.22, dt * 8);
          car.userData.wheels.forEach((wheel) => {
            wheel.rotation.x -= dt * car.userData.speed * 1.55;
          });

          for (let j = traps.length - 1; j >= 0; j -= 1) {
            const trap = traps[j];
            const hitWidth = trap.userData.type === "bomb" ? 3.8 : 2.1;
            const hitDepth = trap.userData.type === "bomb" ? 4.4 : 2.4;
            if (Math.abs(car.userData.roadX - trap.userData.roadX) < hitWidth && Math.abs(car.userData.roadZ - trap.userData.roadZ) < hitDepth) {
              car.userData.mode = "recover";
              car.userData.recoverTimer = trap.userData.type === "bomb" ? 2.1 : 1.6;
              car.userData.speed = Math.max(6, car.userData.speed * (trap.userData.type === "bomb" ? 0.16 : 0.32));
              car.userData.headingOffset += Math.PI * (trap.userData.type === "bomb" ? 0.95 : 0.62);
              car.rotation.z = trap.userData.type === "bomb" ? 1.05 : 0.72;
              scene.remove(trap);
              traps.splice(j, 1);
              state.score += trap.userData.type === "bomb" ? 220 : 120;
              break;
            }
          }

          if (car.userData.roadZ < -34 || car.userData.roadZ > 86) {
            removePoliceCar(car);
          }
        }
      }

      function updatePlayer(dt) {
        const pose = roadPose(state.z);
        const targetX = pose.x + state.x * Math.cos(pose.heading);
        const targetZ = pose.z + state.x * Math.sin(pose.heading);
        player.position.x += (targetX - player.position.x) * Math.min(1, dt * 12);
        player.position.z += (targetZ - player.position.z) * Math.min(1, dt * 12);
        player.position.y = 0.52 + state.y;
        const targetHeading = pose.heading + state.headingOffset;
        player.rotation.y = player.rotation.y + Math.atan2(
          Math.sin(targetHeading - player.rotation.y),
          Math.cos(targetHeading - player.rotation.y)
        ) * Math.min(1, dt * 9.5);
        player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -state.steerAngle * 0.22, dt * 8);
        player.userData.wheels.forEach((wheel) => {
          wheel.rotation.x -= dt * Math.abs(state.speed * state.driveFactor) * 1.7;
        });

        state.hitTimer = Math.max(0, state.hitTimer - dt);
        const flash = (state.hitTimer > 0 || state.policeHitTimer > 0) && Math.floor((state.hitTimer + state.policeHitTimer) * 16) % 2 === 0;
        player.visible = !flash;
      }

      function checkCollisions() {
        if (state.y > 0.95) return;

        for (let i = moneyPickups.length - 1; i >= 0; i -= 1) {
          const pickup = moneyPickups[i];
          if (Math.abs(pickup.userData.roadX - state.x) < 1.35 && Math.abs(pickup.userData.roadZ - state.z) < 2.2) {
            earnMoney(pickup.userData.value || 2);
            state.score += 40;
            scene.remove(pickup);
            moneyPickups.splice(i, 1);
          }
        }

        if (state.hitTimer <= 0) {
          for (const car of traffic) {
            if (car.userData.hit) continue;
            const dx = Math.abs(car.userData.roadX - state.x);
            const dz = Math.abs(car.userData.roadZ - state.z);
            const hitWidth = (car.userData.width + carSize.width) * 0.54;
            const hitLength = (car.userData.length + carSize.length) * 0.5;
            if (dx < hitWidth && dz < hitLength) {
              car.userData.hit = true;
              earnMoney(1);
              if (car.userData.kind === "ambulance") {
                setFire(false);
                state.health = Math.min(maxHealth(), state.health + 26);
                state.speed = Math.max(state.speed, 46);
                state.score += 140;
                car.userData.roadZ = 28;
                car.userData.roadX += car.userData.roadX > state.x ? 2.4 : -2.4;
                car.rotation.z = (car.userData.roadX > state.x ? -1 : 1) * 0.32;
                break;
              }
              state.hitTimer = 0.82;
              state.speed = Math.max(20, state.speed * 0.78);
              car.rotation.z = (car.userData.roadX > state.x ? -1 : 1) * 0.45;
              car.userData.roadX += car.userData.roadX > state.x ? 1.6 : -1.6;
              summonPolice(1);
              break;
            }
          }
        }

        if (state.policeHitTimer <= 0) {
          for (const car of police) {
            if (car.userData.hitCooldown > 0) continue;
            const dx = Math.abs(car.userData.roadX - state.x);
            const dz = Math.abs(car.userData.roadZ - state.z);
            if (dx < 1.52 && dz < 2.72) {
              car.userData.hitCooldown = 1.45;
              car.userData.tagCooldown = 1.45;
              car.userData.mode = "recover";
              car.userData.recoverTimer = 0.82;
              state.policeHitTimer = 1.05;
              state.health = Math.max(0, state.health - Math.max(4, 12 + Math.min(12, state.wanted * 2) - upgradePower() * 2.2));
              state.speed = Math.max(16, state.speed * 0.72);
              car.userData.roadZ += 5.4;
              car.userData.roadX += car.userData.roadX > state.x ? 1.7 : -1.7;
              if (state.health <= 0) endGame();
              break;
            }
          }
        }
      }

      function updateCamera(dt) {
        const heading = player.rotation.y;
        const pressure = wantedPressure();
        const rearDistance = state.wanted > 0 ? 30 : 24;
        const behindX = -Math.sin(heading) * rearDistance;
        const behindZ = -Math.cos(heading) * rearDistance;
        const lookX = player.position.x + Math.sin(heading) * 15;
        const lookZ = player.position.z + Math.cos(heading) * 16;
        const targetX = player.position.x * 0.18 + behindX - state.steerAngle * 1.2;
        camera.position.x += (targetX - camera.position.x) * Math.min(1, dt * 4.2);
        camera.position.y += (6.6 + state.y * 0.24 + pressure * 0.07 - camera.position.y) * Math.min(1, dt * 4.0);
        camera.position.z += (player.position.z + behindZ - camera.position.z) * Math.min(1, dt * 4.0);
        camera.lookAt(lookX, 2.05 + state.y * 0.16, lookZ);
      }

      function updateHud() {
        hud.score.textContent = Math.floor(state.score).toString();
        hud.best.textContent = Math.max(state.best, Math.floor(state.score)).toString();
        hud.money.textContent = `$${state.money}`;
        hud.wantedBest.textContent = state.wantedBest.toString();
        hud.speed.textContent = Math.round(state.speed).toString();
        hud.wanted.textContent = state.wanted.toString();
        hud.health.textContent = `${Math.round(state.health)}/${maxHealth()}`;
        hud.healthFill.style.transform = `scaleX(${Math.max(0, Math.min(1, state.health / maxHealth()))})`;
        hud.state.textContent = state.policeHitTimer > 0
          ? "Police ram"
          : state.fireTimer > 0
            ? "On fire"
          : state.superJumpReady
            ? "Super jump ready"
          : state.slowAmbulanceTimer > 0
            ? `Slow ambulance ${Math.ceil(state.slowAmbulanceTimer)}s`
          : state.hitTimer > 0
            ? "Wanted up"
            : state.wanted > 0
              ? `Police chase x${police.length}`
              : state.introActive
                ? "Punch the police"
              : state.y > 0.2
                ? "Airborne"
                : "Engine live";
        hud.jump.classList.toggle("is-airborne", state.y > 0.08);
        for (const button of hud.buyButtons) {
          const action = button.dataset.buy;
          if (action === "wheel") {
            button.disabled = state.wheelUsed;
            const name = button.querySelector(".shop-name");
            if (name) name.textContent = state.wheelUsed ? "Wheel Used" : "Free Money Wheel";
          } else {
            const cost = shopCosts[action] || 0;
            button.disabled = state.money < cost || (action === "betterCar" && state.carUpgrade >= maxUpgradeLevel);
            if (action === "betterCar") {
              const name = button.querySelector(".shop-name");
              if (name) name.textContent = state.carUpgrade >= maxUpgradeLevel ? "Max Better Car" : `$${cost} Better Car`;
            }
          }
        }
        for (const count of hud.inventoryCounts) {
          count.textContent = state.inventory[count.dataset.count] || 0;
        }
        for (const button of hud.inventoryButtons) {
          button.disabled = !state.inventory[button.dataset.use];
        }
      }

      function endGame() {
        state.playing = false;
        state.best = Math.max(state.best, Math.floor(state.score));
        writeStoredValue("highway-rush-best", String(state.best));
        saveProgress();
        hud.final.textContent = `Score ${Math.floor(state.score)} · Best ${state.best} · Money $${state.money}`;
        hud.overlay.classList.add("is-visible");
      }

      function restart() {
        for (const car of traffic.splice(0)) {
          scene.remove(car);
        }
        for (const car of police.splice(0)) {
          scene.remove(car);
        }
        for (const pickup of moneyPickups.splice(0)) {
          scene.remove(pickup);
        }
        for (const trap of traps.splice(0)) {
          scene.remove(trap);
        }
        state.playing = false;
        state.speed = 33;
        state.health = maxHealth();
        state.score = 0;
        state.x = 0;
        state.y = 0;
        state.z = 0;
        state.steerAngle = 0;
        state.headingOffset = 0;
        state.motionHeadingOffset = 0;
        state.driveFactor = 1;
        state.jumpVelocity = 0;
        state.spawnTimer = 1.05;
        state.policeTimer = 0;
        state.hitTimer = 0;
        state.policeHitTimer = 0;
        state.wanted = 0;
        state.escapeTimer = 0;
        state.nextLane = Math.floor(Math.random() * laneCenters.length);
        state.policeSerial = 0;
        state.pickupTimer = 1.4;
        state.fireTimer = 0;
        state.slowAmbulanceTimer = 0;
        state.superJumpReady = false;
        state.wheelUsed = false;
        state.introActive = true;
        state.introTimer = 0;
        player.visible = true;
        fireEffect.visible = false;
        applyPlayerLook();
        const pose = roadPose(state.z);
        player.position.set(pose.x, 0.52, pose.z);
        player.rotation.set(0, pose.heading, 0);
        setRoadActor(introPolice, state.x + 3.2, state.z - 2.8, 0);
        introPolice.visible = true;
        hud.intro.classList.remove("is-hidden");
        hud.overlay.classList.remove("is-visible");
        updateHud();
        focusGame();
      }

      function startRun() {
        if (!state.introActive) return;
        state.introActive = false;
        state.playing = true;
        introPolice.visible = false;
        hud.intro.classList.add("is-hidden");
        [-28, -58, -88, -118, -148, -178, -208, -238, -268, -298, -328, -358, -388].forEach((z) => spawnTrafficPack(z));
        spawnMoneyPickup(-42);
        summonPolice(1);
        focusGame();
      }

      function updateIntro(dt) {
        if (!state.introActive) return;
        state.introTimer += dt;
        const pose = roadPose(state.z);
        const punch = Math.sin(state.introTimer * 8) > 0.35 ? 0.7 : 0;
        player.position.x = pose.x + (state.x + punch) * Math.cos(pose.heading);
        player.position.z = pose.z + (state.x + punch) * Math.sin(pose.heading);
        player.rotation.y = pose.heading + Math.sin(state.introTimer * 8) * 0.22;
        setRoadActor(introPolice, state.x + 3.2 + Math.sin(state.introTimer * 12) * 0.25, state.z - 2.8, 0);
        introPolice.rotation.z = Math.sin(state.introTimer * 10) * 0.18;
      }

      function loop() {
        const dt = Math.min(clock.getDelta(), 0.033);
        updateIntro(dt);
        if (state.playing) {
          updateInput(dt);
          updateWorld(dt);
          updatePolice(dt);
          updatePlayer(dt);
          checkCollisions();
          state.score += dt * Math.abs(state.speed * state.driveFactor) * 0.4;
          updateHud();
        }
        updateCamera(dt);
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function normalizeKey(event) {
        if (event.code && event.code.startsWith("Key")) return event.code;
        if (event.code && event.code.startsWith("Digit")) return event.code;
        if (event.code && event.code.startsWith("Numpad")) return event.code;
        if (event.code && event.code.startsWith("Arrow")) return event.code;
        if (event.code === "Space") return "Space";

        const key = typeof event.key === "string" ? event.key.toLowerCase() : "";
        if (key === "w") return "KeyW";
        if (key === "a") return "KeyA";
        if (key === "s") return "KeyS";
        if (key === "d") return "KeyD";
        if (key === "arrowup") return "ArrowUp";
        if (key === "arrowleft") return "ArrowLeft";
        if (key === "arrowdown") return "ArrowDown";
        if (key === "arrowright") return "ArrowRight";
        if (key === " " || key === "spacebar") return "Space";
        if (event.keyCode === 87) return "KeyW";
        if (event.keyCode === 65) return "KeyA";
        if (event.keyCode === 83) return "KeyS";
        if (event.keyCode === 68) return "KeyD";
        if (event.keyCode === 38) return "ArrowUp";
        if (event.keyCode === 37) return "ArrowLeft";
        if (event.keyCode === 40) return "ArrowDown";
        if (event.keyCode === 39) return "ArrowRight";
        if (event.keyCode === 32) return "Space";
        if (event.keyCode >= 49 && event.keyCode <= 53) return `Digit${event.keyCode - 48}`;
        if (event.keyCode >= 97 && event.keyCode <= 101) return `Numpad${event.keyCode - 96}`;
        return "";
      }

      const buyKeyActions = {
        KeyR: "bomb",
        KeyY: "speedBump",
        KeyU: "clear",
        KeyI: "superJump",
        KeyO: "slowAmbulance",
        KeyB: "betterCar",
        KeyC: "colorCar",
        KeyM: "wheel",
      };
      const useKeyActions = {
        KeyF: "bomb",
        KeyG: "speedBump",
        KeyH: "clear",
        KeyJ: "superJump",
        KeyK: "slowAmbulance",
      };
      const controlCodes = ["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowLeft", "ArrowDown", "ArrowRight", "Space"];
      const focusGame = () => {
        gameShell.focus({ preventScroll: true });
        requestAnimationFrame(() => {
          gameShell.focus({ preventScroll: true });
        });
      };

      function handleBuyKey(code) {
        buyShop(buyKeyActions[code]);
      }

      const handleKeyDown = (event) => {
        const code = normalizeKey(event);
        if (useKeyActions[code] && !event.repeat) {
          event.preventDefault();
          event.stopPropagation();
          useInventory(useKeyActions[code]);
          updateHud();
          return;
        }
        if (buyKeyActions[code] && !event.repeat) {
          event.preventDefault();
          event.stopPropagation();
          handleBuyKey(code);
          updateHud();
          return;
        }
        if (!controlCodes.includes(code)) return;
        event.preventDefault();
        event.stopPropagation();
        if (state.introActive) {
          startRun();
        }
        if (code === "Space") {
          if (!event.repeat) performJump();
          return;
        }
        if (!event.repeat) {
          if (code === "KeyW" || code === "ArrowUp") {
            state.speed = Math.min(66, state.speed + 7);
          } else if (code === "KeyS" || code === "ArrowDown") {
            state.speed = Math.max(-34, state.speed - 14);
          } else if (code === "KeyA" || code === "ArrowLeft") {
            state.x = Math.min(bounds.right, state.x + 0.9);
            state.steerAngle = Math.min(0.72, state.steerAngle + 0.18);
          } else if (code === "KeyD" || code === "ArrowRight") {
            state.x = Math.max(bounds.left, state.x - 0.9);
            state.steerAngle = Math.max(-0.72, state.steerAngle - 0.18);
          }
        }
        keys.add(code);
      };

      const handleKeyUp = (event) => {
        const code = normalizeKey(event);
        if (!code) return;
        event.preventDefault();
        event.stopPropagation();
        keys.delete(code);
      };

      window.addEventListener("keydown", handleKeyDown, { capture: true });
      window.addEventListener("keyup", handleKeyUp, { capture: true });
      window.addEventListener("focus", focusGame);
      document.addEventListener("keydown", handleKeyDown, { capture: true });
      document.addEventListener("keyup", handleKeyUp, { capture: true });
      gameShell.addEventListener("keydown", handleKeyDown, { capture: true });
      gameShell.addEventListener("keyup", handleKeyUp, { capture: true });
      document.addEventListener("pointerdown", focusGame, { capture: true });
      document.addEventListener("pointerdown", () => {
        if (state.introActive) startRun();
      }, { capture: true });
      window.addEventListener("blur", () => keys.clear());
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) focusGame();
      });
      gameShell.addEventListener("blur", () => {
        if (!document.hidden) requestAnimationFrame(focusGame);
      });
      renderer.domElement.addEventListener("pointerdown", focusGame);
      gameShell.addEventListener("pointerdown", focusGame);
      gameShell.addEventListener("touchstart", focusGame, { passive: true });
      document.body.addEventListener("pointerdown", focusGame);

      document.querySelectorAll(".touch-key").forEach((button) => {
        const code = button.dataset.key;
        const press = (event) => {
          event.preventDefault();
          focusGame();
          button.classList.add("is-down");
          keys.add(code);
        };
        const release = (event) => {
          event.preventDefault();
          button.classList.remove("is-down");
          keys.delete(code);
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      const liftJumpButton = (event) => {
        event.preventDefault();
        hud.jump.classList.remove("is-down");
      };
      hud.jump.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        focusGame();
        if (state.introActive) startRun();
        hud.jump.classList.add("is-down");
        performJump();
      });
      hud.jump.addEventListener("pointerup", liftJumpButton);
      hud.jump.addEventListener("pointercancel", liftJumpButton);
      hud.jump.addEventListener("pointerleave", liftJumpButton);
      hud.jump.addEventListener("click", (event) => {
        event.preventDefault();
        if (state.introActive) startRun();
        performJump();
      });
      for (const button of hud.buyButtons) {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          focusGame();
          buyShop(button.dataset.buy);
          updateHud();
        });
      }
      for (const button of hud.inventoryButtons) {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          focusGame();
          useInventory(button.dataset.use);
          updateHud();
        });
      }
      hud.restart.addEventListener("click", restart);
      window.addEventListener("resize", onResize);

      makeRoad();
      makeScenery();
      restart();
      focusGame();
      setTimeout(focusGame, 60);
      setTimeout(focusGame, 240);
      setTimeout(focusGame, 640);
      renderer.setAnimationLoop(loop);
    }
  </script>
</body>
</html>
