<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highway Rush | DexterBain</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #aab7c9;
      --glass: rgba(8, 15, 24, 0.68);
      --line: rgba(255, 255, 255, 0.18);
      --good: #47e38f;
      --warn: #ffd166;
      --bad: #ff4d6d;
      --road: #222831;
      --paint: #f7f7f2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #09111c;
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
      letter-spacing: 0;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto minmax(160px, 1fr);
      align-items: start;
      gap: 14px;
      pointer-events: none;
    }

    .brand,
    .readout,
    .meter,
    .overlay-panel {
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .brand {
      width: max-content;
      max-width: 100%;
      padding: 10px 13px;
    }

    h1 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cluster {
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .readout {
      min-width: 86px;
      padding: 9px 12px;
      text-align: center;
    }

    .readout b {
      display: block;
      font-size: 1.24rem;
      line-height: 1;
    }

    .readout span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meter {
      justify-self: end;
      width: min(260px, 100%);
      padding: 10px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--muted);
    }

    .health-track {
      height: 13px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--bad), var(--warn), var(--good));
      transform-origin: left center;
      transition: transform 160ms ease;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: min(440px, 100%);
      padding: 24px;
      text-align: center;
    }

    .overlay-panel h2 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .overlay-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.4;
    }

    .restart {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 10px 18px;
      background: #f8fafc;
      color: #09111c;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .touch-controls {
      position: fixed;
      inset: auto 16px 18px;
      z-index: 2;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      pointer-events: none;
    }

    .touch-pad {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-pad:last-child {
      justify-content: end;
    }

    .touch-key {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 250, 252, 0.16);
      color: var(--ink);
      font: inherit;
      font-size: 1.5rem;
      font-weight: 900;
      touch-action: none;
      backdrop-filter: blur(12px);
    }

    .touch-key:active,
    .touch-key.is-down {
      background: rgba(71, 227, 143, 0.32);
    }

    .fatal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 24px;
      background: #09111c;
      text-align: center;
    }

    .fatal.is-visible {
      display: grid;
    }

    @media (max-width: 760px) {
      .hud {
        inset: 10px 10px auto;
        grid-template-columns: 1fr;
      }

      .brand,
      .meter {
        justify-self: stretch;
        width: auto;
      }

      .cluster {
        order: 3;
        justify-self: stretch;
      }

      .readout {
        flex: 1;
      }

      .touch-controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Highway Rush game">
    <div class="hud" aria-live="polite">
      <div class="brand">
        <h1>Highway Rush</h1>
        <span id="stateText">Engine live</span>
      </div>
      <div class="cluster">
        <div class="readout">
          <b id="scoreText">0</b>
          <span>Score</span>
        </div>
        <div class="readout">
          <b id="speedText">0</b>
          <span>MPH</span>
        </div>
      </div>
      <div class="meter">
        <div class="meter-label">
          <span>Health</span>
          <span id="healthText">100%</span>
        </div>
        <div class="health-track">
          <div class="health-fill" id="healthFill"></div>
        </div>
      </div>
    </div>

    <div class="touch-controls" aria-hidden="true">
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowLeft" type="button" aria-label="Left">‹</button>
        <button class="touch-key" data-key="ArrowRight" type="button" aria-label="Right">›</button>
      </div>
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowDown" type="button" aria-label="Brake">↓</button>
        <button class="touch-key" data-key="ArrowUp" type="button" aria-label="Gas">↑</button>
        <button class="touch-key" data-key="Space" type="button" aria-label="Jump">⤴</button>
      </div>
    </div>

    <div class="overlay" id="gameOver">
      <section class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <h2 id="gameOverTitle">Wrecked</h2>
        <p id="finalStats">Score 0</p>
        <button class="restart" id="restartButton" type="button">Restart</button>
      </section>
    </div>

    <div class="fatal" id="fatal">
      <p>Highway Rush could not load the 3D engine.</p>
    </div>
  </main>

  <script type="module">
    const engineUrl = "https://unpkg.com/three@0.165.0/build/three.module.js";

    try {
      const THREE = await import(engineUrl);
      startGame(THREE);
    } catch (error) {
      document.getElementById("fatal").classList.add("is-visible");
      console.error(error);
    }

    function startGame(THREE) {
      const hud = {
        score: document.getElementById("scoreText"),
        speed: document.getElementById("speedText"),
        health: document.getElementById("healthText"),
        healthFill: document.getElementById("healthFill"),
        state: document.getElementById("stateText"),
        overlay: document.getElementById("gameOver"),
        final: document.getElementById("finalStats"),
        restart: document.getElementById("restartButton"),
      };

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x96c7ff);
      scene.fog = new THREE.Fog(0x96c7ff, 34, 178);

      const camera = new THREE.PerspectiveCamera(64, window.innerWidth / window.innerHeight, 0.1, 260);
      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.prepend(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xbfdcff, 0x263018, 2.3);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 2.6);
      sun.position.set(-12, 24, 10);
      sun.castShadow = true;
      sun.shadow.camera.left = -28;
      sun.shadow.camera.right = 28;
      sun.shadow.camera.top = 28;
      sun.shadow.camera.bottom = -28;
      sun.shadow.mapSize.set(2048, 2048);
      scene.add(sun);

      const keys = new Set();
      const traffic = [];
      const stripes = [];
      const roadBits = [];
      const laneCenters = [-4.8, -1.6, 1.6, 4.8];
      const clock = new THREE.Clock();
      const bounds = { left: -6.15, right: 6.15 };
      const carSize = { width: 1.38, length: 3.0 };
      const state = {
        playing: true,
        speed: 33,
        health: 100,
        score: 0,
        best: Number(localStorage.getItem("highway-rush-best") || 0),
        x: 0,
        y: 0,
        z: 5,
        jumpVelocity: 0,
        spawnTimer: 0,
        hitTimer: 0,
        nextLane: 0,
      };

      const road = new THREE.Group();
      scene.add(road);

      const roadMat = new THREE.MeshStandardMaterial({ color: 0x20252d, roughness: 0.94, metalness: 0.02 });
      const shoulderMat = new THREE.MeshStandardMaterial({ color: 0x63713d, roughness: 0.9 });
      const stripeMat = new THREE.MeshStandardMaterial({ color: 0xf7f7f2, roughness: 0.62 });
      const railMat = new THREE.MeshStandardMaterial({ color: 0xaab2bf, roughness: 0.38, metalness: 0.2 });

      function box(w, h, d, mat, x = 0, y = 0, z = 0) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      function makeRoad() {
        for (let i = 0; i < 9; i += 1) {
          const z = 18 - i * 32;
          const slab = box(14, 0.12, 32, roadMat, 0, -0.07, z);
          const leftShoulder = box(8, 0.1, 32, shoulderMat, -11, -0.11, z);
          const rightShoulder = box(8, 0.1, 32, shoulderMat, 11, -0.11, z);
          road.add(slab, leftShoulder, rightShoulder);
          roadBits.push(slab, leftShoulder, rightShoulder);

          for (const x of [-3.2, 0, 3.2]) {
            for (let j = 0; j < 4; j += 1) {
              const stripe = box(0.18, 0.035, 3.8, stripeMat, x, 0.035, z - 12 + j * 8);
              road.add(stripe);
              stripes.push(stripe);
            }
          }

          for (const x of [-7.3, 7.3]) {
            const rail = box(0.24, 0.42, 31, railMat, x, 0.35, z);
            road.add(rail);
            roadBits.push(rail);
          }
        }
      }

      const player = makeCar(0x1d9bf0, 0x0b4a6f);
      player.position.set(state.x, 0.52, state.z);
      scene.add(player);

      function makeCar(color, glassColor) {
        const group = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.32, metalness: 0.28 });
        const trimMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.55 });
        const glassMat = new THREE.MeshStandardMaterial({ color: glassColor, roughness: 0.1, metalness: 0.05 });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x101318, roughness: 0.72 });

        group.add(box(1.42, 0.54, 2.86, bodyMat, 0, 0.34, 0));
        group.add(box(1.05, 0.52, 1.18, glassMat, 0, 0.85, -0.22));
        group.add(box(1.0, 0.12, 0.22, trimMat, 0, 0.73, -1.36));
        group.add(box(1.0, 0.12, 0.22, trimMat, 0, 0.73, 1.36));

        const wheelGeo = new THREE.CylinderGeometry(0.27, 0.27, 0.28, 18);
        for (const x of [-0.82, 0.82]) {
          for (const z of [-0.95, 0.95]) {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, 0.22, z);
            wheel.castShadow = true;
            group.add(wheel);
          }
        }

        group.userData.wheels = group.children.filter((child) => child.geometry?.type === "CylinderGeometry");
        return group;
      }

      function makeScenery() {
        const hillMat = new THREE.MeshStandardMaterial({ color: 0x59713d, roughness: 1 });
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x8594a8, roughness: 0.9 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xffe8a3, emissive: 0xffd166, emissiveIntensity: 0.14 });

        for (let i = 0; i < 42; i += 1) {
          const side = i % 2 === 0 ? -1 : 1;
          const z = -8 - i * 9;
          const height = 1.3 + Math.random() * 5.2;
          const building = box(2 + Math.random() * 2.6, height, 2 + Math.random() * 4, i % 4 === 0 ? hillMat : buildingMat, side * (13 + Math.random() * 16), height / 2 - 0.08, z);
          building.castShadow = false;
          scene.add(building);
          if (i % 3 === 0) {
            const glow = box(0.7, 0.16, 0.06, windowMat, building.position.x, height * 0.7, z + 1.05);
            glow.castShadow = false;
            scene.add(glow);
          }
        }
      }

      const trafficColors = [0xff5c5c, 0xf6c85f, 0x42d392, 0xffffff, 0x8b5cf6, 0xf97316, 0x14b8a6];

      function spawnTraffic(zOverride = null) {
        const lane = laneCenters[state.nextLane % laneCenters.length];
        state.nextLane = (state.nextLane + 1 + Math.floor(Math.random() * 3)) % laneCenters.length;
        const color = trafficColors[Math.floor(Math.random() * trafficColors.length)];
        const car = makeCar(color, 0x243449);
        car.position.set(lane + (Math.random() - 0.5) * 0.5, 0.52, zOverride ?? -150 - Math.random() * 28);
        car.rotation.y = Math.PI;
        car.userData.speed = 8 + Math.random() * 13;
        car.userData.hit = false;
        traffic.push(car);
        scene.add(car);
      }

      function updateInput(dt) {
        const left = keys.has("KeyA") || keys.has("ArrowLeft");
        const right = keys.has("KeyD") || keys.has("ArrowRight");
        const gas = keys.has("KeyW") || keys.has("ArrowUp");
        const brake = keys.has("KeyS") || keys.has("ArrowDown");
        const steer = (right ? 1 : 0) - (left ? 1 : 0);
        const targetSpeed = gas ? 62 : brake ? 20 : 36;

        state.speed += (targetSpeed - state.speed) * Math.min(1, dt * 2.4);
        state.x += steer * dt * (8.4 + state.speed * 0.12);
        state.x = Math.max(bounds.left, Math.min(bounds.right, state.x));

        if (keys.has("Space") && state.y <= 0.001) {
          state.jumpVelocity = 9.2;
          state.y = 0.02;
        }

        if (state.y > 0 || state.jumpVelocity > 0) {
          state.jumpVelocity -= 22 * dt;
          state.y += state.jumpVelocity * dt;
          if (state.y <= 0) {
            state.y = 0;
            state.jumpVelocity = 0;
          }
        }
      }

      function updateWorld(dt) {
        const scroll = state.speed * dt;
        for (const item of roadBits) {
          item.position.z += scroll;
          if (item.position.z > 35) item.position.z -= 288;
        }
        for (const stripe of stripes) {
          stripe.position.z += scroll;
          if (stripe.position.z > 35) stripe.position.z -= 288;
        }

        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnTraffic();
          const pressure = Math.min(0.62, state.score / 2400);
          state.spawnTimer = 0.92 - pressure + Math.random() * 0.42;
        }

        for (let i = traffic.length - 1; i >= 0; i -= 1) {
          const car = traffic[i];
          car.position.z += Math.max(12, state.speed - car.userData.speed) * dt;
          car.userData.wheels.forEach((wheel) => {
            wheel.rotation.x -= dt * state.speed * 1.25;
          });
          if (car.position.z > 22) {
            scene.remove(car);
            traffic.splice(i, 1);
            state.score += 35;
          }
        }
      }

      function updatePlayer(dt) {
        player.position.x += (state.x - player.position.x) * Math.min(1, dt * 12);
        player.position.y = 0.52 + state.y;
        player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, (player.position.x - state.x) * -0.08, dt * 6);
        player.userData.wheels.forEach((wheel) => {
          wheel.rotation.x -= dt * state.speed * 1.7;
        });

        state.hitTimer = Math.max(0, state.hitTimer - dt);
        const flash = state.hitTimer > 0 && Math.floor(state.hitTimer * 16) % 2 === 0;
        player.visible = !flash;
      }

      function checkCollisions() {
        if (state.hitTimer > 0 || state.y > 0.95) return;
        for (const car of traffic) {
          if (car.userData.hit) continue;
          const dx = Math.abs(car.position.x - player.position.x);
          const dz = Math.abs(car.position.z - player.position.z);
          if (dx < carSize.width && dz < carSize.length) {
            car.userData.hit = true;
            state.hitTimer = 1.05;
            state.health = Math.max(0, state.health - 18);
            state.speed = Math.max(18, state.speed * 0.7);
            car.rotation.z = (car.position.x > player.position.x ? -1 : 1) * 0.45;
            car.position.x += car.position.x > player.position.x ? 1.6 : -1.6;
            if (state.health <= 0) endGame();
            break;
          }
        }
      }

      function updateCamera(dt) {
        const targetX = player.position.x * 0.38;
        camera.position.x += (targetX - camera.position.x) * Math.min(1, dt * 4.5);
        camera.position.y += (4.9 + state.y * 0.3 - camera.position.y) * Math.min(1, dt * 4.2);
        camera.position.z += (14.5 - camera.position.z) * Math.min(1, dt * 4.2);
        camera.lookAt(player.position.x * 0.22, 1.15 + state.y * 0.18, -14);
      }

      function updateHud() {
        hud.score.textContent = Math.floor(state.score).toString();
        hud.speed.textContent = Math.round(state.speed).toString();
        hud.health.textContent = `${Math.round(state.health)}%`;
        hud.healthFill.style.transform = `scaleX(${state.health / 100})`;
        hud.state.textContent = state.hitTimer > 0 ? "Impact" : state.y > 0.2 ? "Airborne" : "Engine live";
      }

      function endGame() {
        state.playing = false;
        state.best = Math.max(state.best, Math.floor(state.score));
        localStorage.setItem("highway-rush-best", String(state.best));
        hud.final.textContent = `Score ${Math.floor(state.score)} · Best ${state.best}`;
        hud.overlay.classList.add("is-visible");
      }

      function restart() {
        for (const car of traffic.splice(0)) {
          scene.remove(car);
        }
        state.playing = true;
        state.speed = 33;
        state.health = 100;
        state.score = 0;
        state.x = 0;
        state.y = 0;
        state.z = 5;
        state.jumpVelocity = 0;
        state.spawnTimer = 0.25;
        state.hitTimer = 0;
        state.nextLane = Math.floor(Math.random() * laneCenters.length);
        player.visible = true;
        player.position.set(0, 0.52, state.z);
        [-62, -96, -132].forEach((z) => spawnTraffic(z));
        hud.overlay.classList.remove("is-visible");
      }

      function loop() {
        const dt = Math.min(clock.getDelta(), 0.033);
        if (state.playing) {
          updateInput(dt);
          updateWorld(dt);
          updatePlayer(dt);
          checkCollisions();
          state.score += dt * state.speed * 0.4;
          updateHud();
        }
        updateCamera(dt);
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function normalizeKey(event) {
        if (event.code === "Space") return "Space";
        if (event.code.startsWith("Arrow")) return event.code;
        return event.code;
      }

      window.addEventListener("keydown", (event) => {
        const code = normalizeKey(event);
        if (["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowLeft", "ArrowDown", "ArrowRight", "Space"].includes(code)) {
          event.preventDefault();
          keys.add(code);
        }
      });

      window.addEventListener("keyup", (event) => {
        keys.delete(normalizeKey(event));
      });

      document.querySelectorAll(".touch-key").forEach((button) => {
        const code = button.dataset.key;
        const press = (event) => {
          event.preventDefault();
          button.classList.add("is-down");
          keys.add(code);
        };
        const release = (event) => {
          event.preventDefault();
          button.classList.remove("is-down");
          keys.delete(code);
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      hud.restart.addEventListener("click", restart);
      window.addEventListener("resize", onResize);

      makeRoad();
      makeScenery();
      restart();
      renderer.setAnimationLoop(loop);
    }
  </script>
</body>
</html>
