<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Highway Rush | DexterBain</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #aab7c9;
      --glass: rgba(8, 15, 24, 0.68);
      --line: rgba(255, 255, 255, 0.18);
      --good: #47e38f;
      --warn: #ffd166;
      --bad: #ff4d6d;
      --road: #222831;
      --paint: #f7f7f2;
      --neon: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 220, 132, 0.68), transparent 17%),
        radial-gradient(circle at 72% 20%, rgba(125, 211, 252, 0.35), transparent 24%),
        linear-gradient(180deg, #69b8ff 0%, #bde4ff 42%, #f8d59f 68%, #29351e 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
      letter-spacing: 0;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto minmax(160px, 1fr);
      align-items: start;
      gap: 14px;
      pointer-events: none;
    }

    .brand,
    .readout,
    .meter,
    .overlay-panel {
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .brand {
      width: max-content;
      max-width: 100%;
      padding: 10px 13px;
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cluster {
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .readout {
      min-width: 86px;
      padding: 9px 12px;
      border-radius: 14px;
      text-align: center;
    }

    .readout b {
      display: block;
      font-size: 1.24rem;
      line-height: 1;
    }

    .readout span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .meter {
      justify-self: end;
      width: min(260px, 100%);
      padding: 10px;
      border-radius: 14px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.68rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--muted);
    }

    .health-track {
      height: 13px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
    }

    .health-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--bad), var(--warn), var(--good));
      transform-origin: left center;
      transition: transform 160ms ease;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-panel {
      width: min(440px, 100%);
      padding: 24px;
      text-align: center;
    }

    .overlay-panel h2 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .overlay-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.4;
    }

    .restart {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 10px 18px;
      background: #f8fafc;
      color: #09111c;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .touch-controls {
      position: fixed;
      inset: auto 16px 18px;
      z-index: 2;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      pointer-events: none;
    }

    .touch-pad {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-pad:last-child {
      justify-content: end;
    }

    .touch-key {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 250, 252, 0.16);
      color: var(--ink);
      font: inherit;
      font-size: 1.5rem;
      font-weight: 900;
      touch-action: none;
      backdrop-filter: blur(12px);
    }

    .touch-key:active,
    .touch-key.is-down {
      background: rgba(71, 227, 143, 0.32);
    }

    .jump-action {
      position: fixed;
      right: 26px;
      bottom: 26px;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 116px;
      height: 116px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.86), transparent 16%),
        linear-gradient(145deg, rgba(255, 209, 102, 0.96), rgba(255, 77, 109, 0.9));
      color: #1d1112;
      box-shadow:
        0 18px 42px rgba(255, 77, 109, 0.36),
        inset 0 -10px 18px rgba(125, 30, 42, 0.24),
        inset 0 9px 14px rgba(255, 255, 255, 0.35);
      font: inherit;
      font-weight: 1000;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: none;
      transform: translateY(0) scale(1);
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    .jump-action span {
      display: block;
      font-size: 1.36rem;
      letter-spacing: -0.04em;
      line-height: 0.9;
    }

    .jump-action small {
      display: block;
      margin-top: 4px;
      color: rgba(29, 17, 18, 0.72);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
    }

    .jump-action:active,
    .jump-action.is-down {
      filter: saturate(1.22);
      transform: translateY(4px) scale(0.96);
      box-shadow:
        0 9px 24px rgba(255, 77, 109, 0.34),
        inset 0 -5px 10px rgba(125, 30, 42, 0.26),
        inset 0 7px 12px rgba(255, 255, 255, 0.35);
    }

    .jump-action.is-airborne {
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.86), transparent 16%),
        linear-gradient(145deg, rgba(125, 211, 252, 0.96), rgba(71, 227, 143, 0.88));
      box-shadow:
        0 18px 42px rgba(71, 227, 143, 0.25),
        inset 0 -10px 18px rgba(20, 83, 45, 0.22),
        inset 0 9px 14px rgba(255, 255, 255, 0.32);
    }

    .fatal {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 24px;
      background: #09111c;
      text-align: center;
    }

    .fatal.is-visible {
      display: grid;
    }

    @media (max-width: 760px) {
      .hud {
        inset: 10px 10px auto;
        grid-template-columns: 1fr;
      }

      .brand,
      .meter {
        justify-self: stretch;
        width: auto;
      }

      .cluster {
        order: 3;
        justify-self: stretch;
      }

      .readout {
        flex: 1;
      }

      .touch-controls {
        display: grid;
      }

      .jump-action {
        right: auto;
        left: 50%;
        bottom: 18px;
        width: 88px;
        height: 88px;
        transform: translateX(-50%) scale(1);
      }

      .jump-action:active,
      .jump-action.is-down {
        transform: translateX(-50%) translateY(4px) scale(0.96);
      }

      .jump-action span {
        font-size: 1.02rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Highway Rush game">
    <div class="hud" aria-live="polite">
      <div class="brand">
        <h1>Highway Rush</h1>
        <span id="stateText">Engine live</span>
      </div>
      <div class="cluster">
        <div class="readout">
          <b id="scoreText">0</b>
          <span>Score</span>
        </div>
        <div class="readout">
          <b id="speedText">0</b>
          <span>MPH</span>
        </div>
        <div class="readout">
          <b id="wantedText">0</b>
          <span>Wanted</span>
        </div>
      </div>
      <div class="meter">
        <div class="meter-label">
          <span>Health</span>
          <span id="healthText">100%</span>
        </div>
        <div class="health-track">
          <div class="health-fill" id="healthFill"></div>
        </div>
      </div>
    </div>

    <div class="touch-controls" aria-hidden="true">
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowLeft" type="button" aria-label="Left">‹</button>
        <button class="touch-key" data-key="ArrowRight" type="button" aria-label="Right">›</button>
      </div>
      <div class="touch-pad">
        <button class="touch-key" data-key="ArrowDown" type="button" aria-label="Brake">↓</button>
        <button class="touch-key" data-key="ArrowUp" type="button" aria-label="Gas">↑</button>
      </div>
    </div>

    <button class="jump-action" id="jumpButton" type="button" aria-label="Jump the car">
      <span>Jump</span>
      <small>Space</small>
    </button>

    <div class="overlay" id="gameOver">
      <section class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <h2 id="gameOverTitle">Wrecked</h2>
        <p id="finalStats">Score 0</p>
        <button class="restart" id="restartButton" type="button">Restart</button>
      </section>
    </div>

    <div class="fatal" id="fatal">
      <p>Highway Rush could not load the 3D engine.</p>
    </div>
  </main>

  <script type="module">
    const engineUrl = "https://unpkg.com/three@0.165.0/build/three.module.js";

    try {
      const THREE = await import(engineUrl);
      startGame(THREE);
    } catch (error) {
      document.getElementById("fatal").classList.add("is-visible");
      console.error(error);
    }

    function startGame(THREE) {
      const hud = {
        score: document.getElementById("scoreText"),
        speed: document.getElementById("speedText"),
        wanted: document.getElementById("wantedText"),
        health: document.getElementById("healthText"),
        healthFill: document.getElementById("healthFill"),
        state: document.getElementById("stateText"),
        overlay: document.getElementById("gameOver"),
        final: document.getElementById("finalStats"),
        restart: document.getElementById("restartButton"),
        jump: document.getElementById("jumpButton"),
      };

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x88cfff, 40, 214);

      const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 320);
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;
      document.body.prepend(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xbfdcff, 0x263018, 2.3);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 2.6);
      sun.position.set(-12, 24, 10);
      sun.castShadow = true;
      sun.shadow.camera.left = -28;
      sun.shadow.camera.right = 28;
      sun.shadow.camera.top = 28;
      sun.shadow.camera.bottom = -28;
      sun.shadow.mapSize.set(2048, 2048);
      scene.add(sun);

      const keys = new Set();
      const traffic = [];
      const police = [];
      const stripes = [];
      const roadBits = [];
      const exitMarkers = [];
      const sceneryBits = [];
      const clouds = [];
      const laneCenters = [-4.8, -1.6, 1.6, 4.8];
      const clock = new THREE.Clock();
      const bounds = { left: -6.15, right: 6.15 };
      const carSize = { width: 1.38, length: 3.0 };
      const roadLoopLength = 576;
      const routeLoopLength = 576;
      const state = {
        playing: true,
        speed: 33,
        health: 100,
        score: 0,
        best: Number(localStorage.getItem("highway-rush-best") || 0),
        x: 0,
        y: 0,
        z: 5,
        steerAngle: 0,
        jumpVelocity: 0,
        spawnTimer: 0,
        policeTimer: 0,
        hitTimer: 0,
        policeHitTimer: 0,
        wanted: 0,
        escapeTimer: 0,
        nextLane: 0,
        routeSeed: 0,
        roadShift: 0,
        roadTargetShift: 0,
        exitCooldown: 0,
        exitNotice: 0,
      };

      const road = new THREE.Group();
      scene.add(road);

      const roadMat = new THREE.MeshStandardMaterial({ color: 0x171b23, roughness: 0.88, metalness: 0.04 });
      const shoulderMat = new THREE.MeshStandardMaterial({ color: 0x42512f, roughness: 0.92 });
      const stripeMat = new THREE.MeshStandardMaterial({ color: 0xf7f7f2, roughness: 0.5, emissive: 0xffffdd, emissiveIntensity: 0.06 });
      const railMat = new THREE.MeshStandardMaterial({ color: 0xb4becd, roughness: 0.28, metalness: 0.32 });
      const curbMat = new THREE.MeshStandardMaterial({ color: 0xffd166, roughness: 0.56, emissive: 0xff9f1c, emissiveIntensity: 0.07 });
      const reflectorMat = new THREE.MeshStandardMaterial({ color: 0x7dd3fc, roughness: 0.24, emissive: 0x38bdf8, emissiveIntensity: 0.72 });
      const shadowMat = new THREE.MeshStandardMaterial({ color: 0x0b111a, roughness: 1 });
      const exitMat = new THREE.MeshStandardMaterial({ color: 0x243423, roughness: 0.9 });
      const signMat = new THREE.MeshStandardMaterial({ color: 0x104e37, roughness: 0.36, metalness: 0.08 });
      const signTextMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, emissive: 0xf8fafc, emissiveIntensity: 0.35 });

      function box(w, h, d, mat, x = 0, y = 0, z = 0) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      function roadPose(z) {
        const p = ((z + state.routeSeed) % routeLoopLength + routeLoopLength) % routeLoopLength;
        const sections = [
          { start: 0, end: 130, from: 0, to: 0 },
          { start: 130, end: 205, from: 0, to: -6.2 },
          { start: 205, end: 315, from: -6.2, to: -6.2 },
          { start: 315, end: 405, from: -6.2, to: 5.8 },
          { start: 405, end: 505, from: 5.8, to: 5.8 },
          { start: 505, end: 576, from: 5.8, to: 0 },
        ];
        let active = sections[0];
        for (const section of sections) {
          if (p >= section.start && p < section.end) {
            active = section;
            break;
          }
        }

        const length = active.end - active.start;
        const raw = length > 0 ? (p - active.start) / length : 0;
        const t = Math.max(0, Math.min(1, raw));
        const smooth = t * t * (3 - 2 * t);
        const centerX = state.roadShift + active.from + (active.to - active.from) * smooth;
        const derivative = length > 0 ? (active.to - active.from) * (6 * t * (1 - t)) / length : 0;
        const heading = Math.atan(derivative * 1.65);
        return { x: centerX, heading };
      }

      function rememberRouteObject(object, baseX = object.position.x, baseZ = object.position.z, baseRotationY = object.rotation.y) {
        object.userData.baseX = baseX;
        object.userData.baseZ = baseZ;
        object.userData.baseRotationY = baseRotationY;
        return object;
      }

      function placeRouteObject(object, turnScale = 1) {
        if (object.userData.baseX === undefined) rememberRouteObject(object);
        const pose = roadPose(object.userData.baseZ);
        const lateral = object.userData.baseX;
        object.position.x = pose.x + lateral * Math.cos(pose.heading);
        object.position.z = object.userData.baseZ - lateral * Math.sin(pose.heading) * 0.24;
        object.rotation.y = object.userData.baseRotationY + pose.heading * turnScale;
      }

      function advanceRouteObject(object, scroll, wrapAt, loopLength, turnScale = 1) {
        if (object.userData.baseX === undefined) rememberRouteObject(object);
        object.userData.baseZ += scroll;
        if (object.userData.baseZ > wrapAt) object.userData.baseZ -= loopLength;
        placeRouteObject(object, turnScale);
      }

      function setRoadActor(actor, roadX, roadZ, facing = Math.PI) {
        actor.userData.roadX = roadX;
        actor.userData.roadZ = roadZ;
        actor.userData.facing = facing;
        placeRoadActor(actor);
      }

      function placeRoadActor(actor) {
        const pose = roadPose(actor.userData.roadZ);
        const lateral = actor.userData.roadX;
        actor.position.x = pose.x + lateral * Math.cos(pose.heading);
        actor.position.z = actor.userData.roadZ - lateral * Math.sin(pose.heading) * 0.24;
        actor.rotation.y = pose.heading + actor.userData.facing + (actor.userData.turnBias || 0);
      }

      function makeExitRamp(z, side) {
        const ramp = new THREE.Group();
        ramp.add(box(5.6, 0.1, 28, exitMat, side * 3.2, -0.08, -2.5));
        ramp.add(box(0.18, 0.045, 24, stripeMat, side * 0.68, 0.03, -2.8));
        ramp.add(box(0.22, 0.055, 25, curbMat, side * 5.9, 0.03, -3.2));
        ramp.add(box(2.7, 1.04, 0.16, signMat, side * 6.4, 2.72, -9.2));
        ramp.add(box(1.7, 0.15, 0.18, signTextMat, side * 6.42, 2.9, -9.32));
        ramp.add(box(0.78, 0.15, 0.18, signTextMat, side * 6.42, 2.55, -9.32));
        ramp.add(box(0.13, 2.35, 0.13, railMat, side * 5.35, 1.14, -9.0));
        ramp.add(box(0.13, 2.35, 0.13, railMat, side * 7.5, 1.14, -9.0));
        rememberRouteObject(ramp, side * 8.2, z, side * 0.62);
        ramp.userData.side = side;
        road.add(ramp);
        roadBits.push(ramp);
        exitMarkers.push(ramp);
      }

      function makeRoad() {
        for (let i = 0; i < 18; i += 1) {
          const z = 18 - i * 32;
          const slab = box(14, 0.12, 32, roadMat, 0, -0.07, z);
          const leftShoulder = box(8, 0.1, 32, shoulderMat, -11, -0.11, z);
          const rightShoulder = box(8, 0.1, 32, shoulderMat, 11, -0.11, z);
          road.add(slab, leftShoulder, rightShoulder);
          roadBits.push(slab, leftShoulder, rightShoulder);

          for (const x of [-6.72, 6.72]) {
            const edgeLine = box(0.16, 0.04, 31, stripeMat, x, 0.04, z);
            const curb = box(0.34, 0.08, 31.5, curbMat, x * 1.03, 0.04, z);
            road.add(edgeLine, curb);
            roadBits.push(edgeLine, curb);
          }

          for (const x of [-3.2, 0, 3.2]) {
            for (let j = 0; j < 4; j += 1) {
              const stripe = box(0.18, 0.035, 3.8, stripeMat, x, 0.035, z - 12 + j * 8);
              road.add(stripe);
              stripes.push(stripe);
            }
          }

          for (const x of [-7.02, 7.02]) {
            for (let j = 0; j < 5; j += 1) {
              const reflector = box(0.16, 0.08, 0.48, reflectorMat, x, 0.11, z - 13 + j * 6.4);
              road.add(reflector);
              roadBits.push(reflector);
            }
          }

          for (const x of [-7.3, 7.3]) {
            const rail = box(0.24, 0.42, 31, railMat, x, 0.35, z);
            road.add(rail);
            roadBits.push(rail);

            for (let j = 0; j < 4; j += 1) {
              const post = box(0.2, 0.92, 0.2, shadowMat, x, 0.5, z - 11 + j * 8);
              road.add(post);
              roadBits.push(post);
            }
          }

          if (i === 4 || i === 9 || i === 14) {
            makeExitRamp(z - 8, i === 9 ? -1 : 1);
          }
        }
      }

      const player = makeCar(0x1d9bf0, 0x0b4a6f);
      player.position.set(state.x, 0.52, state.z);
      scene.add(player);

      function makeCar(color, glassColor) {
        const group = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.23, metalness: 0.42 });
        const darkBodyMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.42, metalness: 0.18 });
        const trimMat = new THREE.MeshStandardMaterial({ color: 0x0b1018, roughness: 0.5, metalness: 0.28 });
        const glassMat = new THREE.MeshStandardMaterial({ color: glassColor, roughness: 0.08, metalness: 0.08, transparent: true, opacity: 0.86 });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x101318, roughness: 0.72 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xd8e1ec, roughness: 0.28, metalness: 0.62 });
        const headlightMat = new THREE.MeshStandardMaterial({ color: 0xfff5ca, emissive: 0xfff0a8, emissiveIntensity: 0.92, roughness: 0.24 });
        const tailMat = new THREE.MeshStandardMaterial({ color: 0xff3355, emissive: 0xff3355, emissiveIntensity: 0.68, roughness: 0.3 });

        group.add(box(1.48, 0.5, 2.92, bodyMat, 0, 0.34, 0));
        group.add(box(1.28, 0.18, 2.34, darkBodyMat, 0, 0.62, -0.08));
        group.add(box(1.12, 0.5, 1.12, glassMat, 0, 0.92, -0.24));
        group.add(box(1.02, 0.24, 0.62, bodyMat, 0, 0.73, 0.74));
        group.add(box(1.0, 0.12, 0.22, trimMat, 0, 0.78, -1.39));
        group.add(box(1.0, 0.12, 0.22, trimMat, 0, 0.78, 1.38));
        group.add(box(1.32, 0.07, 0.14, trimMat, 0, 1.18, 0.24));
        group.add(box(0.46, 0.11, 0.1, headlightMat, -0.42, 0.48, -1.5));
        group.add(box(0.46, 0.11, 0.1, headlightMat, 0.42, 0.48, -1.5));
        group.add(box(0.38, 0.13, 0.1, tailMat, -0.42, 0.5, 1.5));
        group.add(box(0.38, 0.13, 0.1, tailMat, 0.42, 0.5, 1.5));
        group.add(box(1.72, 0.08, 0.16, trimMat, 0, 0.5, 1.58));
        group.add(box(1.76, 0.07, 0.12, trimMat, 0, 0.5, -1.58));

        const wheelGeo = new THREE.CylinderGeometry(0.27, 0.27, 0.28, 18);
        const rimGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.3, 16);
        const wheels = [];
        for (const x of [-0.82, 0.82]) {
          for (const z of [-0.95, 0.95]) {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, 0.22, z);
            wheel.castShadow = true;
            group.add(wheel);
            wheels.push(wheel);

            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.rotation.z = Math.PI / 2;
            rim.position.set(x + (x > 0 ? 0.01 : -0.01), 0.22, z);
            rim.castShadow = true;
            group.add(rim);
          }
        }

        group.userData.wheels = wheels;
        return group;
      }

      function makePoliceCar() {
        const car = makeCar(0xf8fafc, 0x172554);
        const blueMat = new THREE.MeshStandardMaterial({ color: 0x2563eb, emissive: 0x2563eb, emissiveIntensity: 0.95, roughness: 0.2 });
        const redMat = new THREE.MeshStandardMaterial({ color: 0xef233c, emissive: 0xef233c, emissiveIntensity: 0.95, roughness: 0.2 });
        const stripeBlue = box(0.08, 0.16, 2.38, blueMat, -0.78, 0.72, 0);
        const stripeRed = box(0.08, 0.16, 2.38, redMat, 0.78, 0.72, 0);
        const lightbarBlue = box(0.46, 0.16, 0.18, blueMat, -0.28, 1.24, 0.05);
        const lightbarRed = box(0.46, 0.16, 0.18, redMat, 0.28, 1.24, 0.05);
        car.add(stripeBlue, stripeRed, lightbarBlue, lightbarRed);
        return car;
      }

      function makeScenery() {
        const hillMat = new THREE.MeshStandardMaterial({ color: 0x536d38, roughness: 1 });
        const darkHillMat = new THREE.MeshStandardMaterial({ color: 0x314424, roughness: 1 });
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x71839b, roughness: 0.82, metalness: 0.08 });
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x9caabd, roughness: 0.74, metalness: 0.12 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xffe8a3, emissive: 0xffd166, emissiveIntensity: 0.48 });
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5b351d, roughness: 0.94 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x1f8a4c, roughness: 0.9 });
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, emissive: 0x7dd3fc, emissiveIntensity: 0.96 });
        const billboardMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.46, metalness: 0.22 });
        const billboardGlowMat = new THREE.MeshStandardMaterial({ color: 0xff4d6d, emissive: 0xff4d6d, emissiveIntensity: 0.66 });

        const sunDisc = new THREE.Mesh(
          new THREE.SphereGeometry(5.4, 32, 16),
          new THREE.MeshBasicMaterial({ color: 0xffd166 })
        );
        sunDisc.position.set(-34, 43, -118);
        scene.add(sunDisc);

        function track(object) {
          sceneryBits.push(object);
          scene.add(object);
          return object;
        }

        function makeTree(x, z, scale = 1) {
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * scale, 0.22 * scale, 1.2 * scale, 8), trunkMat);
          trunk.position.y = 0.55 * scale;
          trunk.castShadow = true;
          const crown = new THREE.Mesh(new THREE.ConeGeometry(0.92 * scale, 2.3 * scale, 10), leafMat);
          crown.position.y = 2 * scale;
          crown.castShadow = true;
          tree.add(trunk, crown);
          tree.position.set(x, -0.08, z);
          return track(tree);
        }

        function makeLamp(x, z) {
          const lamp = new THREE.Group();
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.07, 4.1, 10), railMat);
          pole.position.y = 1.9;
          const arm = box(1.05, 0.08, 0.08, railMat, x > 0 ? -0.45 : 0.45, 3.9, 0);
          const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 10), lampMat);
          bulb.position.set(x > 0 ? -0.98 : 0.98, 3.83, 0);
          lamp.add(pole, arm, bulb);
          lamp.position.set(x, 0, z);
          return track(lamp);
        }

        function makeBillboard(x, z, accent) {
          const board = new THREE.Group();
          const postA = box(0.12, 2.4, 0.12, railMat, -0.85, 1.1, 0);
          const postB = box(0.12, 2.4, 0.12, railMat, 0.85, 1.1, 0);
          const panel = box(2.5, 1.18, 0.16, billboardMat, 0, 2.6, 0);
          const glow = box(1.82, 0.18, 0.18, accent, 0, 2.64, -0.12);
          const slash = box(0.24, 0.84, 0.2, billboardGlowMat, -0.72, 2.64, -0.14);
          slash.rotation.z = -0.45;
          board.add(postA, postB, panel, glow, slash);
          board.position.set(x, 0, z);
          board.rotation.y = x > 0 ? -0.18 : 0.18;
          return track(board);
        }

        function makeCloud(x, y, z, scale = 1) {
          const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, transparent: true, opacity: 0.76 });
          const cloud = new THREE.Group();
          for (let i = 0; i < 5; i += 1) {
            const puff = new THREE.Mesh(new THREE.SphereGeometry((0.75 + Math.random() * 0.45) * scale, 12, 8), cloudMat);
            puff.position.set((i - 2) * 0.78 * scale, Math.sin(i) * 0.16 * scale, Math.cos(i) * 0.28 * scale);
            puff.castShadow = false;
            cloud.add(puff);
          }
          cloud.position.set(x, y, z);
          clouds.push(cloud);
          scene.add(cloud);
        }

        for (let i = 0; i < 18; i += 1) {
          const z = -38 - i * 23;
          const leftHill = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 5, 6 + Math.random() * 6, 7), i % 2 ? darkHillMat : hillMat);
          leftHill.position.set(-25 - Math.random() * 14, 2.3, z);
          leftHill.rotation.y = Math.random() * Math.PI;
          leftHill.castShadow = false;
          track(leftHill);

          const rightHill = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 5, 6 + Math.random() * 6, 7), i % 2 ? hillMat : darkHillMat);
          rightHill.position.set(25 + Math.random() * 14, 2.3, z - 12);
          rightHill.rotation.y = Math.random() * Math.PI;
          rightHill.castShadow = false;
          track(rightHill);
        }

        for (let i = 0; i < 58; i += 1) {
          const side = i % 2 === 0 ? -1 : 1;
          const z = -10 - i * 7.3;
          if (i % 4 === 0) {
            makeLamp(side * 8.6, z);
          } else if (i % 5 === 0) {
            makeBillboard(side * (12.8 + Math.random() * 3), z, i % 2 ? reflectorMat : curbMat);
          } else if (i % 3 === 0) {
            makeTree(side * (10.5 + Math.random() * 10), z, 0.75 + Math.random() * 0.9);
          } else {
            const height = 1.8 + Math.random() * 6.8;
            const building = box(2 + Math.random() * 2.7, height, 2 + Math.random() * 4.4, i % 4 === 1 ? towerMat : buildingMat, side * (14 + Math.random() * 15), height / 2 - 0.08, z);
            building.castShadow = false;
            track(building);
            if (i % 2 === 0) {
              const glow = box(0.7 + Math.random() * 0.7, 0.14, 0.08, windowMat, building.position.x, height * 0.68, z + 1.08);
              glow.castShadow = false;
              track(glow);
            }
          }
        }

        for (let i = 0; i < 12; i += 1) {
          makeCloud(-30 + Math.random() * 60, 17 + Math.random() * 12, -24 - i * 34, 1.15 + Math.random() * 1.1);
        }
      }

      const trafficColors = [0xff5c5c, 0xf6c85f, 0x42d392, 0xffffff, 0x8b5cf6, 0xf97316, 0x14b8a6, 0xf43f5e, 0x38bdf8];

      function spawnTraffic(zOverride = null, laneOverride = null) {
        const lane = laneOverride ?? laneCenters[state.nextLane % laneCenters.length];
        state.nextLane = (state.nextLane + 1 + Math.floor(Math.random() * 3)) % laneCenters.length;
        const color = trafficColors[Math.floor(Math.random() * trafficColors.length)];
        const car = makeCar(color, 0x243449);
        const isTruck = Math.random() < 0.18;
        if (isTruck) {
          car.scale.set(1.12, 1.12, 1.42);
        }
        car.userData.speed = 5 + Math.random() * 18;
        car.userData.hit = false;
        car.userData.width = carSize.width * car.scale.x;
        car.userData.length = carSize.length * car.scale.z;
        setRoadActor(car, lane + (Math.random() - 0.5) * 0.42, zOverride ?? -150 - Math.random() * 28, Math.PI);
        traffic.push(car);
        scene.add(car);
      }

      function spawnTrafficPack(zOverride = null) {
        if (traffic.length > 18) return;
        const shuffledLanes = [...laneCenters].sort(() => Math.random() - 0.5);
        const laneCount = Math.random() > 0.72 ? 2 : 1;
        for (let i = 0; i < laneCount; i += 1) {
          const stagger = i * (10 + Math.random() * 10);
          spawnTraffic((zOverride ?? -174 - Math.random() * 52) - stagger, shuffledLanes[i]);
        }
      }

      function spawnPolice() {
        if (police.length >= Math.min(5, Math.max(1, state.wanted))) return;
        const car = makePoliceCar();
        car.userData.speed = state.speed + 3.5 + state.wanted * 0.9 + Math.random() * 2.4;
        car.userData.width = carSize.width * 1.06;
        car.userData.length = carSize.length * 1.06;
        car.userData.hitCooldown = 0;
        const sideOffset = (Math.random() - 0.5) * 6.2;
        setRoadActor(car, Math.max(bounds.left, Math.min(bounds.right, state.x + sideOffset)), 42 + Math.random() * 34, 0);
        police.push(car);
        scene.add(car);
      }

      function summonPolice(count = 1) {
        state.wanted = Math.min(6, state.wanted + count);
        state.escapeTimer = 9.5 + state.wanted * 1.5;
        state.policeTimer = 0.05;
        for (let i = 0; i < count; i += 1) spawnPolice();
      }

      function removePoliceCar(car) {
        scene.remove(car);
        const index = police.indexOf(car);
        if (index >= 0) police.splice(index, 1);
      }

      function reduceWanted(amount = 1) {
        state.wanted = Math.max(0, state.wanted - amount);
        const targetPolice = state.wanted > 0 ? Math.min(5, Math.max(1, state.wanted)) : 0;
        while (police.length > targetPolice) {
          removePoliceCar(police[0]);
        }
        state.escapeTimer = state.wanted > 0 ? 8 + state.wanted : 0;
      }

      function performJump() {
        if (!state.playing || state.y > 0.001 || state.jumpVelocity !== 0) return;
        state.jumpVelocity = 11.4;
        state.y = 0.02;
        hud.jump.classList.add("is-down");
      }

      function getActiveExitSide() {
        for (const marker of exitMarkers) {
          const dz = Math.abs(marker.userData.baseZ - state.z);
          if (dz < 18) return marker.userData.side;
        }
        return 0;
      }

      function takeExit(side) {
        state.exitCooldown = 4.2;
        state.exitNotice = 2.4;
        state.routeSeed += side * (38 + Math.random() * 24);
        state.roadTargetShift = Math.max(-7, Math.min(7, state.roadTargetShift + side * 4.8));
        state.x = -side * 3.7;
        state.speed = Math.max(state.speed, 44);
        state.score += 180;
        if (state.wanted > 0) {
          reduceWanted(1);
          state.score += 260;
        }
      }

      function updateInput(dt) {
        const left = keys.has("KeyA") || keys.has("ArrowLeft");
        const right = keys.has("KeyD") || keys.has("ArrowRight");
        const gas = keys.has("KeyW") || keys.has("ArrowUp");
        const brake = keys.has("KeyS") || keys.has("ArrowDown");
        const steer = (right ? 1 : 0) - (left ? 1 : 0);
        const targetSpeed = gas ? 62 : brake ? 20 : 36;
        const exitSide = getActiveExitSide();
        const exitLeft = exitSide === -1 ? -11.4 : bounds.left;
        const exitRight = exitSide === 1 ? 11.4 : bounds.right;

        state.speed += (targetSpeed - state.speed) * Math.min(1, dt * 2.4);
        state.steerAngle += (steer * 0.72 - state.steerAngle) * Math.min(1, dt * 7.5);
        state.x += Math.sin(state.steerAngle) * dt * (state.speed * 0.54);
        state.x += steer * dt * 1.25;
        state.x = Math.max(exitLeft, Math.min(exitRight, state.x));
        state.exitCooldown = Math.max(0, state.exitCooldown - dt);
        if (exitSide !== 0 && state.exitCooldown <= 0 && Math.sign(state.x) === exitSide && Math.abs(state.x) > 8.2) {
          takeExit(exitSide);
        }

        if (state.y > 0 || state.jumpVelocity > 0) {
          state.jumpVelocity -= 22 * dt;
          state.y += state.jumpVelocity * dt;
          if (state.y <= 0) {
            state.y = 0;
            state.jumpVelocity = 0;
            hud.jump.classList.remove("is-down");
          }
        }
      }

      function updateWorld(dt) {
        const scroll = state.speed * dt;
        state.roadShift += (state.roadTargetShift - state.roadShift) * Math.min(1, dt * 0.62);
        state.exitNotice = Math.max(0, state.exitNotice - dt);
        for (const item of roadBits) {
          advanceRouteObject(item, scroll, 35, roadLoopLength);
        }
        for (const stripe of stripes) {
          advanceRouteObject(stripe, scroll, 35, roadLoopLength);
        }

        for (const item of sceneryBits) {
          advanceRouteObject(item, scroll * 0.82, 58, roadLoopLength, 0.42);
        }

        for (const cloud of clouds) {
          cloud.position.z += scroll * 0.22;
          cloud.position.x += Math.sin(clock.elapsedTime * 0.14 + cloud.position.z) * dt * 0.28;
          if (cloud.position.z > 36) cloud.position.z -= 424;
        }

        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnTrafficPack();
          const pressure = Math.min(0.24, state.score / 9000);
          state.spawnTimer = 1.18 - pressure + Math.random() * 0.48;
        }

        for (let i = traffic.length - 1; i >= 0; i -= 1) {
          const car = traffic[i];
          car.userData.roadZ += Math.max(12, state.speed - car.userData.speed) * dt;
          placeRoadActor(car);
          car.userData.wheels.forEach((wheel) => {
            wheel.rotation.x -= dt * state.speed * 1.25;
          });
          if (car.userData.roadZ > 24) {
            scene.remove(car);
            traffic.splice(i, 1);
            state.score += 35;
          }
        }
      }

      function updatePolice(dt) {
        if (state.wanted > 0) {
          state.policeTimer -= dt;
          if (state.policeTimer <= 0) {
            spawnPolice();
            state.policeTimer = Math.max(1.7, 4.2 - state.wanted * 0.28);
          }

          state.escapeTimer -= dt;
          const closeCop = police.some((car) => Math.abs(car.userData.roadZ - state.z) < 12 && Math.abs(car.userData.roadX - state.x) < 4.9);
          if (state.escapeTimer <= 0 && !closeCop) {
            reduceWanted(1);
            state.score += 320;
          } else if (closeCop) {
            state.escapeTimer = Math.max(state.escapeTimer, 4.5);
          }
        }

        state.policeHitTimer = Math.max(0, state.policeHitTimer - dt);

        for (let i = police.length - 1; i >= 0; i -= 1) {
          const car = police[i];
          car.userData.hitCooldown = Math.max(0, car.userData.hitCooldown - dt);
          car.userData.speed += ((state.speed + 4.5 + state.wanted * 1.25) - car.userData.speed) * Math.min(1, dt * 1.08);
          car.userData.roadZ += (state.speed - car.userData.speed) * dt;
          const chasePull = 0.34 + state.wanted * 0.075;
          car.userData.roadX += (state.x - car.userData.roadX) * Math.min(1, dt * chasePull);
          car.userData.roadX += Math.sin(clock.elapsedTime * 2.1 + i) * dt * 0.62;
          car.userData.turnBias = (state.x - car.userData.roadX) * -0.08;
          placeRoadActor(car);
          car.userData.wheels.forEach((wheel) => {
            wheel.rotation.x -= dt * car.userData.speed * 1.55;
          });

          if (car.userData.roadZ < -34 || car.userData.roadZ > 86) {
            removePoliceCar(car);
          }
        }
      }

      function updatePlayer(dt) {
        const pose = roadPose(state.z);
        const targetX = pose.x + state.x * Math.cos(pose.heading);
        const targetZ = state.z - state.x * Math.sin(pose.heading) * 0.24;
        player.position.x += (targetX - player.position.x) * Math.min(1, dt * 12);
        player.position.z += (targetZ - player.position.z) * Math.min(1, dt * 12);
        player.position.y = 0.52 + state.y;
        player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, pose.heading - state.steerAngle * 0.92, dt * 7);
        player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -state.steerAngle * 0.28, dt * 7);
        player.userData.wheels.forEach((wheel) => {
          wheel.rotation.x -= dt * state.speed * 1.7;
        });

        state.hitTimer = Math.max(0, state.hitTimer - dt);
        const flash = (state.hitTimer > 0 || state.policeHitTimer > 0) && Math.floor((state.hitTimer + state.policeHitTimer) * 16) % 2 === 0;
        player.visible = !flash;
      }

      function checkCollisions() {
        if (state.y > 0.95) return;

        if (state.hitTimer <= 0) {
          for (const car of traffic) {
            if (car.userData.hit) continue;
            const dx = Math.abs(car.userData.roadX - state.x);
            const dz = Math.abs(car.userData.roadZ - state.z);
            const hitWidth = (car.userData.width + carSize.width) * 0.54;
            const hitLength = (car.userData.length + carSize.length) * 0.5;
            if (dx < hitWidth && dz < hitLength) {
              car.userData.hit = true;
              state.hitTimer = 0.82;
              state.speed = Math.max(20, state.speed * 0.78);
              car.rotation.z = (car.userData.roadX > state.x ? -1 : 1) * 0.45;
              car.userData.roadX += car.userData.roadX > state.x ? 1.6 : -1.6;
              summonPolice(1);
              break;
            }
          }
        }

        if (state.policeHitTimer <= 0) {
          for (const car of police) {
            if (car.userData.hitCooldown > 0) continue;
            const dx = Math.abs(car.userData.roadX - state.x);
            const dz = Math.abs(car.userData.roadZ - state.z);
            if (dx < 1.52 && dz < 2.72) {
              car.userData.hitCooldown = 1.45;
              state.policeHitTimer = 1.05;
              state.health = Math.max(0, state.health - (12 + Math.min(12, state.wanted * 2)));
              state.speed = Math.max(16, state.speed * 0.72);
              car.userData.roadZ += 5.4;
              car.userData.roadX += car.userData.roadX > state.x ? 1.7 : -1.7;
              if (state.health <= 0) endGame();
              break;
            }
          }
        }
      }

      function updateCamera(dt) {
        const pose = roadPose(state.z);
        const rearDistance = state.wanted > 0 ? 30 : 24;
        const behindX = Math.sin(pose.heading) * rearDistance;
        const behindZ = Math.cos(pose.heading) * rearDistance;
        const lookX = player.position.x - Math.sin(pose.heading) * 15;
        const lookZ = player.position.z - Math.cos(pose.heading) * 16;
        const targetX = player.position.x * 0.18 + behindX + state.steerAngle * 1.2;
        camera.position.x += (targetX - camera.position.x) * Math.min(1, dt * 4.2);
        camera.position.y += (6.6 + state.y * 0.24 + state.wanted * 0.18 - camera.position.y) * Math.min(1, dt * 4.0);
        camera.position.z += (player.position.z + behindZ - camera.position.z) * Math.min(1, dt * 4.0);
        camera.lookAt(lookX, 1.15 + state.y * 0.18, lookZ);
      }

      function updateHud() {
        hud.score.textContent = Math.floor(state.score).toString();
        hud.speed.textContent = Math.round(state.speed).toString();
        hud.wanted.textContent = state.wanted.toString();
        hud.health.textContent = `${Math.round(state.health)}%`;
        hud.healthFill.style.transform = `scaleX(${state.health / 100})`;
        const exitSide = getActiveExitSide();
        hud.state.textContent = state.policeHitTimer > 0
          ? "Police ram"
          : state.hitTimer > 0
            ? "Wanted up"
            : state.exitNotice > 0
              ? "Exit taken"
              : state.wanted > 0
                ? `Police chase x${police.length}`
                : state.y > 0.2
                  ? "Airborne"
                  : exitSide !== 0
                    ? "Exit open"
                    : "Engine live";
        hud.jump.classList.toggle("is-airborne", state.y > 0.08);
      }

      function endGame() {
        state.playing = false;
        state.best = Math.max(state.best, Math.floor(state.score));
        localStorage.setItem("highway-rush-best", String(state.best));
        hud.final.textContent = `Score ${Math.floor(state.score)} · Best ${state.best}`;
        hud.overlay.classList.add("is-visible");
      }

      function restart() {
        for (const car of traffic.splice(0)) {
          scene.remove(car);
        }
        for (const car of police.splice(0)) {
          scene.remove(car);
        }
        state.playing = true;
        state.speed = 33;
        state.health = 100;
        state.score = 0;
        state.x = 0;
        state.y = 0;
        state.z = 5;
        state.steerAngle = 0;
        state.jumpVelocity = 0;
        state.spawnTimer = 1.05;
        state.policeTimer = 0;
        state.hitTimer = 0;
        state.policeHitTimer = 0;
        state.wanted = 0;
        state.escapeTimer = 0;
        state.nextLane = Math.floor(Math.random() * laneCenters.length);
        state.routeSeed = Math.random() * routeLoopLength;
        state.roadShift = 0;
        state.roadTargetShift = 0;
        state.exitCooldown = 1.8;
        state.exitNotice = 0;
        player.visible = true;
        player.position.set(0, 0.52, state.z);
        player.rotation.set(0, 0, 0);
        [-76, -146, -226, -318].forEach((z) => spawnTrafficPack(z));
        hud.overlay.classList.remove("is-visible");
      }

      function loop() {
        const dt = Math.min(clock.getDelta(), 0.033);
        if (state.playing) {
          updateInput(dt);
          updateWorld(dt);
          updatePolice(dt);
          updatePlayer(dt);
          checkCollisions();
          state.score += dt * state.speed * 0.4;
          updateHud();
        }
        updateCamera(dt);
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function normalizeKey(event) {
        if (event.code === "Space") return "Space";
        if (event.code.startsWith("Arrow")) return event.code;
        return event.code;
      }

      const controlCodes = ["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowLeft", "ArrowDown", "ArrowRight", "Space"];

      window.addEventListener("keydown", (event) => {
        const code = normalizeKey(event);
        if (!controlCodes.includes(code)) return;
        event.preventDefault();
        if (code === "Space") {
          if (!event.repeat) performJump();
          return;
        }
        keys.add(code);
      });

      window.addEventListener("keyup", (event) => {
        keys.delete(normalizeKey(event));
      });

      document.querySelectorAll(".touch-key").forEach((button) => {
        const code = button.dataset.key;
        const press = (event) => {
          event.preventDefault();
          button.classList.add("is-down");
          keys.add(code);
        };
        const release = (event) => {
          event.preventDefault();
          button.classList.remove("is-down");
          keys.delete(code);
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      });

      const liftJumpButton = (event) => {
        event.preventDefault();
        hud.jump.classList.remove("is-down");
      };
      hud.jump.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        hud.jump.classList.add("is-down");
        performJump();
      });
      hud.jump.addEventListener("pointerup", liftJumpButton);
      hud.jump.addEventListener("pointercancel", liftJumpButton);
      hud.jump.addEventListener("pointerleave", liftJumpButton);
      hud.jump.addEventListener("click", (event) => {
        event.preventDefault();
        performJump();
      });
      hud.restart.addEventListener("click", restart);
      window.addEventListener("resize", onResize);

      makeRoad();
      makeScenery();
      restart();
      renderer.setAnimationLoop(loop);
    }
  </script>
</body>
</html>
