<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthquakes & Volcanoes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080b0f;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: rgba(8,11,15,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap;
      z-index: 1000;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 1rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f87171, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #aaa;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-eq { background: #22d3ee; box-shadow: 0 0 6px rgba(34,211,238,0.6); }
    .dot-vol { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.6); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #888;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #aaa; color: #fff; }
    .filter-btn.on { border-color: #22d3ee; color: #22d3ee; background: rgba(34,211,238,0.08); }
    .filter-btn.on.vol { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }

    .stat-chip {
      font-size: 0.7rem;
      color: #555;
      white-space: nowrap;
    }

    .stat-chip span { color: #aaa; font-weight: 700; }

    /* ── Map ── */
    #map { flex: 1; }

    .leaflet-container { background: #111418 !important; }
    .leaflet-tile { filter: brightness(0.55) saturate(0.4) hue-rotate(200deg); }

    .leaflet-popup-content-wrapper {
      background: #0d0f1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #ddd;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .leaflet-popup-tip { background: #0d0f1a; }
    .leaflet-popup-content { font-size: 0.82rem; line-height: 1.6; }
    .leaflet-popup-content b { color: #fff; }

    .eq-popup b { color: #22d3ee; }
    .vol-popup b { color: #f87171; }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(8,11,15,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      gap: 14px;
      font-size: 0.9rem;
      color: #777;
    }

    #loading.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #load-status { font-size: 0.78rem; color: #555; }

    .back-link {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 999;
      font-size: 0.72rem;
      color: #444;
      text-decoration: none;
      background: rgba(8,11,15,0.8);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: color 0.2s;
    }

    .back-link:hover { color: #aaa; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">🌍 Earthquakes &amp; Volcanoes</div>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-eq"></div> Earthquake (M4+, since 2021)</div>
      <div class="legend-item"><div class="dot dot-vol"></div> Volcano</div>
    </div>
    <div class="filters">
      <button class="filter-btn on" id="btn-eq" onclick="toggleLayer('eq')">Earthquakes</button>
      <button class="filter-btn on vol" id="btn-vol" onclick="toggleLayer('vol')">Volcanoes</button>
    </div>
    <div class="stat-chip">
      EQ: <span id="eq-count">—</span> &nbsp; Vol: <span id="vol-count">—</span>
    </div>
  </div>

  <div id="map"></div>
  <a class="back-link" href="/">← DexterBain.com</a>

  <div id="loading">
    <div class="spinner"></div>
    <div>Loading earthquake &amp; volcano data…</div>
    <div id="load-status"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([20, 10], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);

    const eqLayer  = L.layerGroup().addTo(map);
    const volLayer = L.layerGroup().addTo(map);
    let showEq = true, showVol = true;

    function toggleLayer(type) {
      if (type === 'eq') {
        showEq = !showEq;
        document.getElementById('btn-eq').classList.toggle('on', showEq);
        showEq ? map.addLayer(eqLayer) : map.removeLayer(eqLayer);
      } else {
        showVol = !showVol;
        document.getElementById('btn-vol').classList.toggle('on', showVol);
        showVol ? map.addLayer(volLayer) : map.removeLayer(volLayer);
      }
    }

    function magColor(mag) {
      if (mag >= 7) return '#f87171';
      if (mag >= 6) return '#fb923c';
      if (mag >= 5) return '#fbbf24';
      return '#22d3ee';
    }

    function magRadius(mag) {
      return Math.max(2, (mag - 3) * 2.2);
    }

    function setStatus(msg) {
      document.getElementById('load-status').textContent = msg;
    }

    async function loadEarthquakes() {
      setStatus('Fetching earthquake data…');
      try {
        const res = await fetch(
          'https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2021-01-01&minmagnitude=4&limit=5000'
        );
        const data = await res.json();
        let count = 0;
        data.features.forEach(eq => {
          const [lng, lat] = eq.geometry.coordinates;
          const mag = eq.properties.mag;
          const place = eq.properties.place || 'Unknown';
          const time = new Date(eq.properties.time).toLocaleDateString();

          L.circleMarker([lat, lng], {
            radius: magRadius(mag),
            color: magColor(mag),
            fillColor: magColor(mag),
            fillOpacity: 0.75,
            weight: 0,
          })
          .bindPopup(`<div class="eq-popup"><b>Earthquake</b><br>Magnitude: <b>${mag}</b><br>${place}<br><span style="color:#666">${time}</span></div>`)
          .addTo(eqLayer);
          count++;
        });
        document.getElementById('eq-count').textContent = count.toLocaleString();
        setStatus(`Loaded ${count.toLocaleString()} earthquakes. Fetching volcanoes…`);
      } catch (e) {
        document.getElementById('eq-count').textContent = 'error';
        setStatus('Earthquake data failed. Trying volcanoes…');
      }
    }

    async function loadVolcanoes() {
      try {
        const res = await fetch('https://volcanoes.usgs.gov/vsc/api/volcanoApi/volcanoesGVP');
        const data = await res.json();
        let count = 0;
        data.forEach(v => {
          if (!v.latitude || !v.longitude) return;
          L.circleMarker([v.latitude, v.longitude], {
            radius: 4,
            color: '#f87171',
            fillColor: '#f87171',
            fillOpacity: 0.85,
            weight: 0,
          })
          .bindPopup(`<div class="vol-popup"><b>🌋 ${v.volcanoName || 'Volcano'}</b><br>${v.subregion || v.region || 'Unknown location'}</div>`)
          .addTo(volLayer);
          count++;
        });
        document.getElementById('vol-count').textContent = count.toLocaleString();
      } catch (e) {
        document.getElementById('vol-count').textContent = 'error';
      }
    }

    (async () => {
      await loadEarthquakes();
      await loadVolcanoes();
      document.getElementById('loading').classList.add('hidden');
    })();
  </script>
</body>
</html>
